<!-- Módulo Almacén / Inventario — SPA Aislado -->
<div id="mod-inventario" class="modulo-wrapper d-flex flex-column h-100">

  <!-- Cabecera + controles -->
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h2 class="h5 fw-bold mb-0" style="color:var(--text);">
        <i class="bi bi-box-seam text-warning me-1"></i>Inventario
      </h2>
      <p class="text-muted small mb-0">Catálogo de artículos — stock calculado automáticamente</p>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-sm btn-outline-secondary" onclick="window.cargarInventario()" title="Actualizar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <!-- Import -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-success dropdown-toggle" data-bs-toggle="dropdown">
          <i class="bi bi-file-earmark-excel"></i> <span class="d-none d-md-inline">Excel</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" onclick="window.exportarInventarioExcel()"><i class="bi bi-download me-2 text-success"></i>Exportar todo</a></li>
          <li><a class="dropdown-item" onclick="window.descargarPlantillaInventario()"><i class="bi bi-file-earmark-arrow-down me-2 text-primary"></i>Descargar plantilla</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><label class="dropdown-item" style="cursor:pointer;"><i class="bi bi-upload me-2 text-warning"></i>Importar Excel<input type="file" id="inputFileInventario" accept=".xlsx,.xls" style="display:none" onchange="window.importarExcelInventario(event)"></label></li>
        </ul>
      </div>
      <button class="btn btn-sm btn-primary" onclick="window.abrirModalInventario()">
        <i class="bi bi-plus-lg"></i> <span class="d-none d-md-inline">Nuevo</span>
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="d-flex flex-wrap gap-2 mb-3 align-items-center p-2 rounded border" style="background:var(--surface);">
    <div class="input-group input-group-sm" style="max-width:280px;">
      <span class="input-group-text border-0 bg-transparent"><i class="bi bi-search text-muted"></i></span>
      <input type="text" id="inv-buscar" class="form-control border-0 bg-transparent shadow-none" placeholder="Código, descripción, marca…" oninput="window.filtrarInventario()">
    </div>
    <select id="inv-fil-familia" class="form-select form-select-sm" style="max-width:160px;" onchange="window.filtrarInventario()">
      <option value="">Todas las familias</option>
    </select>
    <select id="inv-fil-almacen" class="form-select form-select-sm" style="max-width:160px;" onchange="window.filtrarInventario()">
      <option value="">Todos los almacenes</option>
    </select>
    <span id="inv-contador" class="text-muted small ms-auto"></span>
  </div>

  <!-- Tabla -->
  <div class="card p-0 shadow-sm flex-grow-1" style="overflow:auto;">
    <table class="table table-custom table-hover m-0" id="tabla-inventario">
      <thead>
        <tr>
          <th>Código</th>
          <th>Descripción</th>
          <th>Familia</th>
          <th>Almacén</th>
          <th>Unidad</th>
          <th class="text-end">Costo Ref.</th>
          <th class="text-center">Stock</th>
          <th class="text-center"><i class="bi bi-three-dots-vertical"></i></th>
        </tr>
      </thead>
      <tbody id="tbody-inventario">
        <tr><td colspan="8" class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Paginación -->
  <div class="d-flex justify-content-between align-items-center mt-2 px-1" id="inv-paginacion"></div>
</div>

<!-- ═══ MODAL ADD / EDIT ═══════════════════════════════════════════ -->
<div class="modal fade" id="modal-inv-articulo" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="modal-inv-titulo"><i class="bi bi-box-fill me-1"></i>Nuevo Artículo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="form-inv-articulo" onsubmit="window.guardarArticuloInv(event)">
        <input type="hidden" id="inv-edit-id">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-12">
              <label class="fw-semibold small">Descripción <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="inv-f-descripcion" required placeholder="Nombre completo del artículo">
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Familia</label>
              <input type="text" class="form-control" id="inv-f-familia" list="inv-list-familias" placeholder="Ej: FILTROS">
              <datalist id="inv-list-familias"></datalist>
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Sub-familia</label>
              <input type="text" class="form-control" id="inv-f-subfamilia" placeholder="Ej: ACEITE MOTOR">
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Almacén</label>
              <input type="text" class="form-control" id="inv-f-almacen" list="inv-list-almacenes" placeholder="Ej: ALMACÉN PRINCIPAL">
              <datalist id="inv-list-almacenes"></datalist>
            </div>
            <div class="col-md-3">
              <label class="fw-semibold small">Unidad</label>
              <input type="text" class="form-control" id="inv-f-unidad" placeholder="UND, LT, KG…">
            </div>
            <div class="col-md-3">
              <label class="fw-semibold small">Moneda</label>
              <select class="form-select" id="inv-f-moneda">
                <option value="PEN">PEN (S/)</option>
                <option value="USD">USD ($)</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="fw-semibold small">Costo Referencial</label>
              <input type="number" class="form-control" id="inv-f-costo" step="0.0001" placeholder="0.00">
            </div>
            <div class="col-md-3">
              <label class="fw-semibold small">Marca</label>
              <input type="text" class="form-control" id="inv-f-marca" placeholder="Ej: WIX, MANN">
            </div>
            <div class="col-md-12"><hr class="my-1"></div>
            <div class="col-md-4">
              <label class="fw-semibold small">Stock Regularizado</label>
              <input type="number" class="form-control" id="inv-f-stock-reg" step="0.0001" placeholder="0">
              <div class="form-text">Cantidad de inicio / snapshot</div>
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Fecha Regularización</label>
              <input type="date" class="form-control" id="inv-f-fecha-reg">
              <div class="form-text">Movimientos desde esta fecha</div>
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Proveedor (ID)</label>
              <input type="text" class="form-control" id="inv-f-proveedor-id" list="inv-list-proveedores" placeholder="PROV-0001">
              <datalist id="inv-list-proveedores"></datalist>
            </div>
            <div class="col-md-12">
              <label class="fw-semibold small">Observaciones</label>
              <textarea class="form-control" id="inv-f-obs" rows="2" placeholder="Notas adicionales…"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
