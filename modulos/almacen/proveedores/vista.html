<!-- Módulo Almacén / Proveedores — SPA Aislado -->
<div id="mod-proveedores" class="modulo-wrapper d-flex flex-column h-100">

  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h2 class="h5 fw-bold mb-0" style="color:var(--text);">
        <i class="bi bi-building-fill text-primary me-1"></i>Proveedores
      </h2>
      <p class="text-muted small mb-0">Proveedores de repuestos e insumos</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="window.cargarProveedores()" title="Actualizar"><i class="bi bi-arrow-clockwise"></i></button>
      <!-- Importar -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-info fw-bold dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-upload"></i> <span class="d-none d-md-inline">Importar</span>
        </button>
        <ul class="dropdown-menu shadow">
          <li><a class="dropdown-item fw-bold text-success" href="#" onclick="window.descargarPlantillaProveedores()"><i class="bi bi-file-earmark-spreadsheet me-1"></i>1. Descargar Plantilla</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item fw-bold text-primary" href="#" onclick="document.getElementById('inputFileProveedores').click()"><i class="bi bi-cloud-upload me-1"></i>2. Subir Excel Lleno</a></li>
        </ul>
      </div>
      <input type="file" id="inputFileProveedores" accept=".xlsx,.xls" style="display:none;" onchange="window.importarExcelProveedores(event)">
      <!-- Exportar -->
      <button class="btn btn-sm btn-outline-success fw-bold" onclick="window.exportarExcelProveedores()">
        <i class="bi bi-download"></i> <span class="d-none d-md-inline">Exportar</span>
      </button>
      <button class="btn btn-sm btn-primary" onclick="window.abrirModalProveedor()">
        <i class="bi bi-plus-lg"></i><span class="d-none d-md-inline ms-1">Nuevo Proveedor</span>
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="d-flex flex-wrap gap-2 mb-3 align-items-center p-2 rounded border" style="background:var(--surface);">
    <input type="text" id="prov-buscar" class="form-control form-control-sm" style="max-width:280px;" placeholder="Nombre, RUC, marca…" oninput="window.filtrarProveedores()">
    <select id="prov-fil-estado" class="form-select form-select-sm" style="max-width:130px;" onchange="window.filtrarProveedores()">
      <option value="">Todos</option>
      <option value="Activo">Activos</option>
      <option value="Inactivo">Inactivos</option>
    </select>
    <div class="form-check ms-2 mb-0 d-flex align-items-center me-2">
      <input class="form-check-input me-2" type="checkbox" id="prov-select-all" style="cursor: pointer; transform: scale(1.1);" onchange="window._provToggleSelAll(this.checked)">
      <label class="form-check-label small fw-bold text-muted" for="prov-select-all">Todos</label>
    </div>
    <button id="prov-btn-eliminar-masivo" class="btn btn-sm btn-danger fw-bold" style="display:none"
            onclick="window.eliminarMasivoProveedores()">
      <i class="bi bi-trash me-1"></i>Eliminar 0 seleccionados
    </button>
    <span id="prov-contador" class="text-muted small ms-auto"></span>
  </div>

  <!-- KPI Row Bento -->
  <div id="prov-kpi-row" class="bento-kpi-row"></div>

  <!-- TABLA DE PROVEEDORES -->
  <div style="display:flex;flex:1 1 0;min-height:0;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:12px;">
    <div class="ent-table-wrap" style="flex:1 1 0; overflow: auto; -webkit-overflow-scrolling: touch;">
      <table id="tabla-proveedores" style="width: 100%; min-width: 950px; border-collapse: collapse; font-size: 0.82rem;">
        <thead style="position: sticky; top: 0; background: var(--surface); z-index: 10; border-bottom: 2px solid var(--border);">
          <tr>
            <th style="width: 40px; text-align: center; padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase;"></th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Asesor/a</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Razón Social</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Documento</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;" class="d-none d-md-table-cell">Contacto</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Marcas</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: center;">Estado</th>
            <th style="width: 160px; padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: right;">Acciones</th>
          </tr>
        </thead>
        <tbody id="prov-tbody">
          <tr><td colspan="8" style="text-align:center;padding:3rem;color:#94a3b8;"><div class="spinner-border spinner-border-sm me-2"></div>Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Paginador -->
  <div id="prov-paginador" class="d-flex align-items-center gap-1 flex-wrap px-1 py-2 flex-shrink-0"></div>
</div>

<!-- ═══ MODAL ADD/EDIT PROVEEDOR ══════════════════════════════════ -->
<div class="modal fade" id="modal-proveedor" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="modal-prov-titulo"><i class="bi bi-building-fill me-1"></i>Nuevo Proveedor</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="form-proveedor" onsubmit="window.guardarProveedor(event)">
        <input type="hidden" id="prov-edit-id">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="fw-semibold small">Nombre <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="prov-f-nombre" required placeholder="Nombre o razón comercial">
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Estado</label>
              <select class="form-select" id="prov-f-estado">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
              </select>
            </div>
            <div class="col-md-7">
              <label class="fw-semibold small">Razón Social</label>
              <input type="text" class="form-control" id="prov-f-razon" placeholder="Razón Social completa">
            </div>
            <div class="col-md-2">
              <label class="fw-semibold small">Tipo Doc.</label>
              <select class="form-select" id="prov-f-tipo-doc">
                <option value="RUC">RUC</option>
                <option value="DNI">DNI</option>
                <option value="CE">C.E.</option>
                <option value="Otro">Otro</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="fw-semibold small">N° Documento</label>
              <div class="input-group">
                <input type="text" class="form-control" id="prov-f-num-doc" placeholder="20123456789" onkeydown="if(event.key==='Enter'){event.preventDefault();window.consultarDocProveedor();}">
                <button class="btn btn-primary" type="button" onclick="window.consultarDocProveedor()" title="Consultar SUNAT/RENIEC">
                  <i class="bi bi-search"></i>
                </button>
              </div>
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Teléfono</label>
              <input type="text" class="form-control" id="prov-f-telefono" placeholder="+51 999 999 999">
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Email</label>
              <input type="email" class="form-control" id="prov-f-email" placeholder="proveedor@email.com">
            </div>
            <div class="col-md-4">
              <label class="fw-semibold small">Dirección</label>
              <input type="text" class="form-control" id="prov-f-dir" placeholder="Dirección física…">
            </div>
            <div class="col-md-12">
              <label class="fw-semibold small">Marcas que provee</label>
              <div class="d-flex gap-2 mb-1">
                <input type="text" class="form-control form-control-sm" id="prov-f-marca-input" placeholder="Ej: WIX" style="max-width:180px;"
                  onkeydown="if(event.key==='Enter'){event.preventDefault();window._provAgregarMarca();}">
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="window._provAgregarMarca()"><i class="bi bi-plus"></i> Agregar</button>
              </div>
              <div id="prov-marcas-tags" class="d-flex flex-wrap gap-1 mt-1"></div>
            </div>
            <div class="col-md-12">
              <label class="fw-semibold small">Observaciones</label>
              <textarea class="form-control" id="prov-f-obs" rows="2" placeholder="Notas adicionales…"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
