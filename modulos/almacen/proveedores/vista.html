<!-- Módulo Almacén / Proveedores — SPA Aislado -->
<style>
.prov-card { display: flex; align-items: center; gap: .75rem; padding: .8rem .9rem; background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; position: relative; overflow: hidden; min-height: 72px; }
.prov-avatar { width: 48px; height: 48px; border-radius: 50%; background: #2563eb; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.05rem; flex-shrink: 0; }
.prov-info { flex: 1; min-width: 0; }
.prov-name { font-weight: 800; font-size: .88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.prov-sub { font-size: .69rem; color: var(--subtext); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.prov-lic { display: inline-block; font-size: .6rem; font-weight: 800; padding: 1px 7px; border-radius: 99px; background: #eff6ff; color: #2563eb; text-transform: uppercase; }
.prov-actions { display: flex; flex-direction: row; gap: 6px; flex-shrink: 0; }
.prov-btn { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: .9rem; border: none; flex-shrink: 0; cursor: pointer; text-decoration: none; }
.prov-panel-full { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 700px; height: 92vh; background: #fff; border-radius: 28px 28px 0 0; z-index: 1059; display: flex; flex-direction: column; overflow: hidden; transition: transform .28s ease; box-shadow: 0 -12px 48px rgba(0,0,0,.18); }
.prov-panel-full.open { transform: translateX(-50%) translateY(0); }
@media (max-width: 767.98px) {
    .prov-panel-full { max-width: 100%; left: 0; transform: translateY(100%); border-radius: 28px 28px 0 0; }
    .prov-panel-full.open { transform: translateY(0); }
}
</style>
<div id="mod-proveedores" class="modulo-wrapper d-flex flex-column h-100">

  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h2 class="h5 fw-bold mb-0" style="color:var(--text);">
        <i class="bi bi-building-fill text-primary me-1"></i>Proveedores
      </h2>
      <p class="text-muted small mb-0">Proveedores de repuestos e insumos</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="window.cargarProveedores()" title="Actualizar"><i class="bi bi-arrow-clockwise"></i></button>
      <input type="file" id="inputFileProveedores" accept=".xlsx,.xls" style="display:none;" onchange="window.importarExcelProveedores(event)">
    </div>
  </div>

  <!-- Botón Flotante (FAB) -->
  <div class="dropup" style="position:fixed; bottom:104px; right:1rem; z-index:1000;">
    <button class="btn btn-success shadow-lg" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; background:#10b981; border:none;">
      <i class="bi bi-plus-lg"></i>
    </button>
    <ul class="dropdown-menu dropdown-menu-end shadow-lg mb-2" style="border-radius:12px; border:none;">
      <li><a class="dropdown-item fw-bold text-primary py-2" href="#" onclick="window.abrirModalProveedor()"><i class="bi bi-building-add me-2"></i>Registrar Proveedor</a></li>
      <li><hr class="dropdown-divider"></li>
      <li><a class="dropdown-item fw-bold text-success py-2" href="#" onclick="window.descargarPlantillaProveedores()"><i class="bi bi-file-earmark-spreadsheet me-2"></i>Descargar Plantilla</a></li>
      <li><a class="dropdown-item fw-bold text-info py-2" href="#" onclick="document.getElementById('inputFileProveedores').click()"><i class="bi bi-cloud-upload me-2"></i>Importar Excel Lleno</a></li>
      <li><hr class="dropdown-divider"></li>
      <li><a class="dropdown-item fw-bold text-secondary py-2" href="#" onclick="window.exportarExcelProveedores()"><i class="bi bi-download me-2"></i>Exportar Proveedores</a></li>
    </ul>
  </div>

  <!-- Filtros -->
  <div class="d-flex flex-wrap gap-2 mb-3 align-items-center p-2 rounded border" style="background:var(--surface);">
    <input type="text" id="prov-buscar" class="form-control form-control-sm" style="max-width:280px;" placeholder="Nombre, RUC, marca…" oninput="window.filtrarProveedores()">
    <select id="prov-fil-estado" class="form-select form-select-sm" style="max-width:130px;" onchange="window.filtrarProveedores()">
      <option value="">Todos</option>
      <option value="Activo">Activos</option>
      <option value="Inactivo">Inactivos</option>
    </select>
    <div class="form-check ms-2 mb-0 d-flex align-items-center me-2">
      <input class="form-check-input me-2" type="checkbox" id="prov-select-all" style="cursor: pointer; transform: scale(1.1);" onchange="window._provToggleSelAll(this.checked)">
      <label class="form-check-label small fw-bold text-muted" for="prov-select-all">Todos</label>
    </div>
    <button id="prov-btn-eliminar-masivo" class="btn btn-sm btn-danger fw-bold" style="display:none"
            onclick="window.eliminarMasivoProveedores()">
      <i class="bi bi-trash me-1"></i>Eliminar 0 seleccionados
    </button>
    <span id="prov-contador" class="text-muted small ms-auto"></span>
  </div>

  <!-- KPI Row Bento -->
  <div id="prov-kpi-row" class="bento-kpi-row"></div>

  <!-- TABLA DE PROVEEDORES (Desktop) -->
  <div class="d-none d-md-flex" style="flex:1 1 0;min-height:0;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:12px;">
    <div class="ent-table-wrap" style="flex:1 1 0; overflow: auto; -webkit-overflow-scrolling: touch;">
      <table id="tabla-proveedores" style="width: 100%; min-width: 950px; border-collapse: collapse; font-size: 0.82rem;">
        <thead style="position: sticky; top: 0; background: var(--surface); z-index: 10; border-bottom: 2px solid var(--border);">
          <tr>
            <th style="width: 40px; text-align: center; padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase;"></th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Proveedor / Asesor</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Razón Social</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Documento</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;" class="d-none d-md-table-cell">Contacto</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Marcas</th>
            <th style="padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: center;">Estado</th>
            <th style="width: 160px; padding: 0.75rem 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: right;">Acciones</th>
          </tr>
        </thead>
        <tbody id="prov-tbody">
          <tr><td colspan="8" style="text-align:center;padding:3rem;color:#94a3b8;"><div class="spinner-border spinner-border-sm me-2"></div>Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- GRID MÓVIL DE PROVEEDORES (Mobile) -->
  <div id="prov-grid-mobile" class="d-flex d-md-none flex-column gap-2" style="flex:1 1 0; overflow-y:auto; padding-bottom:5rem;">
      <div style="text-align:center;padding:3rem;color:#94a3b8;"><div class="spinner-border spinner-border-sm me-2"></div>Cargando...</div>
  </div>

  <!-- Paginador -->
  <div id="prov-paginador" class="d-flex align-items-center gap-1 flex-wrap px-1 py-2 flex-shrink-0"></div>
</div>

<!-- ═══ MODAL ADD/EDIT PROVEEDOR ══════════════════════════════════ -->
<div id="prov-backdrop" onclick="window._provCerrarModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1049;"></div>
<div id="modal-proveedor" class="prov-panel-full">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem .75rem;flex-shrink:0;border-bottom:1.5px solid #e2e8f0;background:#fff;">
    <div style="display:flex;align-items:center;gap:.6rem;">
      <div style="width:38px;height:38px;border-radius:14px;background:#dcfce7;display:flex;align-items:center;justify-content:center;">
        <i class="bi bi-building-fill" style="color:#16a34a;font-size:1.1rem;"></i>
      </div>
      <div>
        <div id="modal-prov-titulo" style="font-size:.95rem;font-weight:900;color:#0f172a;line-height:1.1;">Nuevo Proveedor</div>
        <div style="font-size:.6rem;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.08em;">Directorio de Proveedores</div>
      </div>
    </div>
    <button type="button" onclick="window._provCerrarModal()" style="width:34px;height:34px;border-radius:10px;background:#f1f5f9;border:none;color:#64748b;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
  <div style="flex:1;overflow-y:auto;padding:1rem;">
    <form id="form-proveedor" onsubmit="window.guardarProveedor(event)">
      <input type="hidden" id="prov-edit-id">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="fw-semibold small">Nombre <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="prov-f-nombre" required placeholder="Nombre o razón comercial">
        </div>
        <div class="col-md-4">
          <label class="fw-semibold small">Estado</label>
          <select class="form-select" id="prov-f-estado">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
          </select>
        </div>
        <div class="col-md-7">
          <label class="fw-semibold small">Razón Social</label>
          <input type="text" class="form-control" id="prov-f-razon" placeholder="Razón Social completa">
        </div>
        <div class="col-md-2">
          <label class="fw-semibold small">Tipo Doc.</label>
          <select class="form-select" id="prov-f-tipo-doc">
            <option value="RUC">RUC</option>
            <option value="DNI">DNI</option>
            <option value="CE">C.E.</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="fw-semibold small">N° Documento</label>
          <div class="input-group">
            <input type="text" class="form-control" id="prov-f-num-doc" placeholder="20123456789" onkeydown="if(event.key==='Enter'){event.preventDefault();window.consultarDocProveedor();}">
            <button class="btn btn-primary" type="button" onclick="window.consultarDocProveedor()" title="Consultar SUNAT/RENIEC">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
        <div class="col-md-4">
          <label class="fw-semibold small">Teléfono</label>
          <input type="text" class="form-control" id="prov-f-telefono" placeholder="+51 999 999 999">
        </div>
        <div class="col-md-4">
          <label class="fw-semibold small">Email</label>
          <input type="email" class="form-control" id="prov-f-email" placeholder="proveedor@email.com">
        </div>
        <div class="col-md-4">
          <label class="fw-semibold small">Dirección</label>
          <input type="text" class="form-control" id="prov-f-dir" placeholder="Dirección física…">
        </div>
        <div class="col-md-12">
          <label class="fw-semibold small">Marcas que provee</label>
          <div class="d-flex gap-2 mb-1">
            <input type="text" class="form-control form-control-sm" id="prov-f-marca-input" placeholder="Ej: WIX" style="max-width:180px;"
              onkeydown="if(event.key==='Enter'){event.preventDefault();window._provAgregarMarca();}">
            <button type="button" class="btn btn-sm btn-outline-primary" onclick="window._provAgregarMarca()"><i class="bi bi-plus"></i> Agregar</button>
          </div>
          <div id="prov-marcas-tags" class="d-flex flex-wrap gap-1 mt-1"></div>
        </div>
        <div class="col-md-12">
          <label class="fw-semibold small">Observaciones</label>
          <textarea class="form-control" id="prov-f-obs" rows="2" placeholder="Notas adicionales…"></textarea>
        </div>
      </div>
      <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
        <button type="button" class="btn btn-secondary rounded-3" onclick="window._provCerrarModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary rounded-3"><i class="bi bi-save me-1"></i>Guardar</button>
      </div>
    </form>
  </div>
</div>
