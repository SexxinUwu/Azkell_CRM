<!-- Módulo Almacén / Kardex — SPA Aislado -->
<div id="mod-kardex" class="modulo-wrapper d-flex flex-column h-100">

  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h2 class="h5 fw-bold mb-0" style="color:var(--text);">
        <i class="bi bi-journal-text text-info me-1"></i>Kardex
      </h2>
      <p class="text-muted small mb-0">Historial de movimientos por artículo</p>
    </div>
    <button class="btn btn-sm btn-outline-success" onclick="window.exportarKardexExcel()" id="btn-export-kardex" style="display:none;" title="Exportar Excel">
      <i class="bi bi-file-earmark-excel"></i><span class="d-none d-md-inline ms-1">Exportar</span>
    </button>
  </div>

  <!-- Búsqueda de artículo -->
  <div class="p-3 rounded border mb-3" style="background:var(--surface);">
    <label class="fw-semibold small mb-1 d-block">Buscar artículo por código o descripción</label>
    <div class="d-flex gap-2">
      <input type="text" id="kdx-buscar-art" class="form-control" list="kdx-art-list" placeholder="INV-0001 o descripción parcial…" style="max-width:420px;">
      <datalist id="kdx-art-list"></datalist>
      <button class="btn btn-info text-white" onclick="window._kdxCargarKardex()">
        <i class="bi bi-search me-1"></i>Ver Kardex
      </button>
    </div>
  </div>

  <!-- Info del artículo (elementos ocultos, referenciados por JS) -->
  <div id="kdx-info-art" style="display:none!important;">
    <span id="kdx-art-nombre"></span>
    <span id="kdx-art-codigo"></span>
    <span id="kdx-stock-base"></span>
    <span id="kdx-fecha-reg"></span>
    <span id="kdx-total-entradas"></span>
    <span id="kdx-stock-actual"></span>
  </div>

  <!-- KPI Row Bento (visible tras consulta) -->
  <div id="kdx-kpi-row" class="bento-kpi-row" style="display:none;"></div>

  <!-- Encabezado del artículo seleccionado -->
  <div id="kdx-art-header" style="display:none;margin-bottom:.75rem;">
    <div style="background:#fff;border:1px solid #eef2f6;border-radius:18px;padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem;">
      <div style="width:42px;height:42px;background:#eff6ff;color:#2563eb;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">
        <i class="bi bi-journal-text"></i>
      </div>
      <div>
        <div style="font-weight:800;font-size:.95rem;" id="kdx-art-header-nombre">—</div>
        <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;" id="kdx-art-header-info">—</div>
      </div>
    </div>
  </div>

  <!-- Timeline de movimientos -->
  <div class="flex-grow-1" style="overflow-y:auto;min-height:0;">
    <div id="kdx-placeholder" class="text-center py-5 text-muted">
      <i class="bi bi-journal-text fs-3 d-block mb-2"></i>
      Selecciona un artículo para ver su kardex
    </div>
    <div id="kdx-timeline" class="kdx-timeline" style="background:#fff;border:1px solid #eef2f6;border-radius:20px;overflow:hidden;display:none;"></div>
  </div>
</div>
