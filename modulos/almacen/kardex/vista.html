<!-- Módulo Almacén / Kardex — SPA Aislado -->
<div id="mod-kardex" class="modulo-wrapper d-flex flex-column h-100">

  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h2 class="h5 fw-bold mb-0" style="color:var(--text);">
        <i class="bi bi-journal-text text-info me-1"></i>Kardex
      </h2>
      <p class="text-muted small mb-0">Historial de movimientos por artículo</p>
    </div>
    <button class="btn btn-sm btn-outline-success" onclick="window.exportarKardexExcel()" id="btn-export-kardex" style="display:none;" title="Exportar Excel">
      <i class="bi bi-file-earmark-excel"></i><span class="d-none d-md-inline ms-1">Exportar</span>
    </button>
  </div>

  <!-- Búsqueda de artículo -->
  <div class="p-3 rounded border mb-3" style="background:var(--surface);">
    <label class="fw-semibold small mb-1 d-block">Buscar artículo por código o descripción</label>
    <div class="d-flex gap-2">
      <input type="text" id="kdx-buscar-art" class="form-control" list="kdx-art-list" placeholder="INV-0001 o descripción parcial…" style="max-width:420px;">
      <datalist id="kdx-art-list"></datalist>
      <button class="btn btn-info text-white" onclick="window._kdxCargarKardex()">
        <i class="bi bi-search me-1"></i>Ver Kardex
      </button>
    </div>
  </div>

  <!-- Info del artículo seleccionado -->
  <div id="kdx-info-art" style="display:none;" class="mb-3">
    <div class="row g-2">
      <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3" style="background:var(--surface);">
          <div class="small text-muted mb-1">Artículo</div>
          <div class="fw-bold" id="kdx-art-nombre">—</div>
          <div class="text-muted small" id="kdx-art-codigo">—</div>
        </div>
      </div>
      <div class="col-md-2">
        <div class="card border-0 shadow-sm p-3 text-center" style="background:var(--surface);">
          <div class="small text-muted mb-1">Stock Base</div>
          <div class="fw-bold fs-5" id="kdx-stock-base">—</div>
          <div class="text-muted small" id="kdx-fecha-reg">al inicio</div>
        </div>
      </div>
      <div class="col-md-2">
        <div class="card border-0 shadow-sm p-3 text-center" style="background:var(--surface);">
          <div class="small text-muted mb-1">Entradas</div>
          <div class="fw-bold fs-5 text-success" id="kdx-total-entradas">0</div>
        </div>
      </div>
      <div class="col-md-2">
        <div class="card border-0 shadow-sm p-3 text-center" style="background:var(--surface);">
          <div class="small text-muted mb-1">Stock Actual</div>
          <div class="fw-bold fs-5 text-primary" id="kdx-stock-actual">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabla movimientos -->
  <div class="card p-0 shadow-sm flex-grow-1" style="overflow:auto;" id="kdx-tabla-card">
    <div class="text-center py-5 text-muted" id="kdx-placeholder">
      <i class="bi bi-journal-text fs-3 d-block mb-2 text-muted"></i>
      Selecciona un artículo para ver su kardex
    </div>
    <table class="table table-custom table-hover m-0" id="tabla-kardex" style="display:none;">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Tipo</th>
          <th>Documento</th>
          <th>Contraparte</th>
          <th class="text-end">Cantidad</th>
          <th class="text-end">Costo Unit.</th>
          <th class="text-end">Importe</th>
          <th class="text-end fw-bold">Saldo</th>
        </tr>
      </thead>
      <tbody id="tbody-kardex"></tbody>
    </table>
  </div>
</div>
