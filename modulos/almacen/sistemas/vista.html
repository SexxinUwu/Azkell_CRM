<!-- Módulo Almacén / Sistemas y Sub-Sistemas — SPA Aislado -->
<div id="mod-sistemas" class="modulo-wrapper d-flex flex-column h-100">

  <!-- Cabecera -->
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h2 class="h5 fw-bold mb-0" style="color:var(--text);">
        <i class="bi bi-diagram-3-fill text-warning me-1"></i>Sistemas
      </h2>
      <p class="text-muted small mb-0">Gestión de sistemas y sub-sistemas para clasificación de artículos</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="window.cargarSistemas()" title="Actualizar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <button class="btn btn-sm btn-primary" onclick="window.abrirModalSistema()">
        <i class="bi bi-plus-lg"></i> <span class="d-none d-md-inline">Nuevo Sistema</span>
      </button>
    </div>
  </div>

  <!-- Búsqueda -->
  <div class="d-flex gap-2 mb-3">
    <div class="input-group input-group-sm" style="max-width:300px;">
      <span class="input-group-text border-0 bg-transparent"><i class="bi bi-search text-muted"></i></span>
      <input type="text" id="sis-buscar" class="form-control border-0 bg-transparent shadow-none" placeholder="Buscar sistema…" oninput="window.filtrarSistemas()">
    </div>
    <span id="sis-contador" class="text-muted small ms-auto align-self-center"></span>
  </div>

  <!-- Tabla -->
  <div class="flex-grow-1" style="overflow-y:auto;min-height:0;">
    <div class="card p-0">
      <table class="table table-custom m-0" id="tabla-sistemas">
        <thead>
          <tr>
            <th>Sistema</th>
            <th>Sub-Sistemas</th>
            <th style="width:80px;">Estado</th>
            <th style="width:100px;"><i class="bi bi-three-dots-vertical"></i></th>
          </tr>
        </thead>
        <tbody id="cuerpo-tabla-sistemas">
          <tr><td colspan="4" class="text-center py-4"><div class="spinner-border spinner-border-sm me-2"></div>Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Nuevo / Editar Sistema -->
<div class="modal fade" id="modal-sistema" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="modal-sis-titulo"><i class="bi bi-diagram-3-fill me-1"></i>Nuevo Sistema</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="form-sistema" onsubmit="window.guardarSistema(event)">
        <input type="hidden" id="sis-edit-id">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="fw-semibold small">Nombre del Sistema <span class="text-danger">*</span></label>
              <input type="text" class="form-control text-uppercase" id="sis-f-nombre" required placeholder="Ej: MOTOR, FRENOS, ELECTRICIDAD">
            </div>
            <div class="col-md-3">
              <label class="fw-semibold small">Orden</label>
              <input type="number" class="form-control" id="sis-f-orden" placeholder="1" min="0">
            </div>
            <div class="col-md-3">
              <label class="fw-semibold small">Estado</label>
              <select class="form-select" id="sis-f-activo">
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
              </select>
            </div>

            <!-- Sub-Sistemas: chips dinámicos -->
            <div class="col-12">
              <label class="fw-semibold small">Sub-Sistemas</label>
              <div class="border rounded p-2 mb-1" id="sis-subs-wrap" style="background:var(--surface);min-height:44px;cursor:text;" onclick="document.getElementById('sis-subs-input').focus()">
                <div id="sis-subs-chips" class="d-inline-flex flex-wrap gap-1 me-1"></div>
                <input type="text" id="sis-subs-input" class="border-0 bg-transparent"
                  style="outline:none;min-width:180px;font-size:0.875rem;color:var(--text);"
                  placeholder="Escribir sub-sistema y Enter para agregar…"
                  onkeydown="window._sisSubsKeydown(event)"
                  autocomplete="off">
              </div>
              <small class="text-muted">Ej: ACEITE MOTOR, REFRIGERACIÓN, TURBO</small>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
