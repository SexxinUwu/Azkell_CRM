<!-- Módulo Almacén / Entradas — Azkell Fleet v2 (Bento UI) -->
<style>
/* ─── Tabs segmented (reutilizado de Inventario) ────────── */
#ent-tabs-wrap {
    background: var(--bg, #f1f5f9);
    border-radius: 14px;
    padding: 4px;
    gap: 3px;
    display: flex;
    margin: .75rem 1rem .25rem;
    display: none; /* solo si se activan tabs en futuro */
}

/* ─── Mobile-First ──────────────────────────────────────── */
@media (max-width: 767.98px) {
    .topbar { display: none !important; }
    .main-area { padding: 0 !important; overflow: hidden !important; }
    #ent-desktop-header { display: none !important; }
    #ent-m-header   { display: flex !important; }
    #ent-search-compact { display: flex !important; }
    #ent-kpi-row {
        display: flex !important; flex-wrap: nowrap !important;
        overflow-x: auto; gap: .55rem;
        padding: .25rem 1rem .6rem !important;
        scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    #ent-kpi-row::-webkit-scrollbar { display: none; }
    .bento-kpi { min-width: 130px; flex-shrink: 0; }
    #moduloEntradas { padding-bottom: 80px; }
    #ent-fab-wrap { display: flex !important; }
    /* Ocultar barra de controles del escritorio */
    .ent-controls, .ent-filters { display: none !important; }
    /* Panel detalle: bottom sheet en mobile */
    #ent-panel-detalle {
        position: fixed !important; bottom: -100vh !important; left: 0 !important;
        right: 0 !important; width: 100vw !important; max-width: 100vw !important;
        height: 88vh !important; border-radius: 22px 22px 0 0 !important;
        border-left: none !important; border-top: 1px solid var(--border) !important;
        transition: bottom .35s cubic-bezier(.4,0,.2,1) !important;
        box-shadow: 0 -12px 48px rgba(0,0,0,.2) !important; z-index: 1055 !important;
    }
    #ent-panel-detalle.open { bottom: 0 !important; width: 100% !important; }
    /* Tabla: tipografía más pequeña para caber en pantalla */
    #moduloEntradas table { font-size: .75rem; }
    #moduloEntradas thead th,
    #moduloEntradas tbody td { padding: 8px 8px; }
    /* Ocultar columnas secundarias en mobile */
    #moduloEntradas .col-hide-mob { display: none !important; }
}

/* ─── Tabla moderna ─────────────────────────────────────── */
#moduloEntradas {
    display: flex; flex-direction: column; flex: 1 1 0; min-height: 0; overflow: hidden;
}
.ent-controls {
    display: flex; align-items: center; gap: 8px;
    padding: 0.6rem 1.25rem; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
.ent-filters {
    display: flex; align-items: center; gap: 8px;
    padding: 0.45rem 1.25rem; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
#moduloEntradas .ent-table-wrap { flex: 1 1 0; overflow-y: auto; background: var(--surface); }
#moduloEntradas table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
#moduloEntradas thead th {
    background: var(--bg); color: var(--subtext);
    font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 10px 12px;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; z-index: 2; white-space: nowrap;
}
#moduloEntradas tbody tr {
    border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.12s;
}
#moduloEntradas tbody tr:hover { background: var(--bg); }
#moduloEntradas tbody tr.ent-row-active { background: rgba(22,163,74,.06); border-left: 3px solid #16a34a; }
#moduloEntradas tbody td { padding: 10px 12px; color: var(--text); }
#moduloEntradas .td-placeholder { text-align:center; color:var(--subtext); font-size:0.82rem; padding:2rem; }
/* Panel detalle desktop */
#moduloEntradas .ent-detail-panel {
    width: 0; flex-shrink: 0; overflow: hidden;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width 0.25s; max-width: 380px;
}
#moduloEntradas .ent-detail-panel.open { width: 380px; }
#moduloEntradas .ent-detail-scroll { flex:1; overflow-y:auto; padding:1.25rem; }
#moduloEntradas .ent-detail-footer {
    padding:.75rem 1rem; border-top:1px solid var(--border);
    display:flex; gap:.5rem; flex-wrap:wrap;
}
#moduloEntradas .ent-sec { border:1px solid var(--border); border-radius:10px; margin-top:1rem; overflow:hidden; }
#moduloEntradas .ent-sec-hd {
    background:var(--bg); padding:8px 12px; font-size:.72rem; font-weight:800;
    text-transform:uppercase; letter-spacing:.06em; color:var(--subtext);
    border-bottom:1px solid var(--border);
}
#moduloEntradas .ent-field { display:flex; padding:8px 12px; border-bottom:1px solid var(--border); font-size:.82rem; }
#moduloEntradas .ent-field:last-child { border-bottom:none; }
#moduloEntradas .ent-field-lbl { width:40%; color:var(--subtext); font-weight:600; font-size:.78rem; }
#moduloEntradas .ent-field-val { width:60%; color:var(--text); font-weight:600; word-break:break-word; }
</style>

<div id="moduloEntradas" class="modulo-wrapper d-flex flex-column h-100">

  <!-- ═══ HEADER MOBILE ════════════════════════════════════════════ -->
  <div id="ent-m-header" style="display:none;align-items:center;justify-content:space-between;
       padding:.7rem 1rem 0;flex-shrink:0;">
    <div style="font-size:1.15rem;font-weight:900;color:var(--text);">
      <i class="bi bi-arrow-down-circle-fill text-success me-2"></i>Entradas
    </div>
    <div class="d-flex align-items-center gap-2">
      <button class="btn border-0 p-1" onclick="window.cargarEntradas()" style="background:transparent;">
        <i class="bi bi-arrow-clockwise" style="font-size:1.2rem;color:var(--text);"></i>
      </button>
      <div onclick="window._invAvatarPopup && window._invAvatarPopup()"
           style="width:34px;height:34px;border-radius:10px;background:#16a34a;display:flex;
                  align-items:center;justify-content:center;font-weight:800;font-size:.78rem;
                  color:#fff;cursor:pointer;flex-shrink:0;" id="ent-m-avatar">SA</div>
    </div>
  </div>

  <!-- ═══ KPI ROW ══════════════════════════════════════════════════ -->
  <div id="ent-kpi-row" class="bento-kpi-row" style="padding:.65rem 1rem .25rem;"></div>

  <!-- ═══ BARRA BÚSQUEDA COMPACTA (mobile) ════════════════════════ -->
  <div id="ent-search-compact" style="display:none;padding:.3rem 1rem .65rem;align-items:center;gap:.6rem;flex-shrink:0;">
    <div style="flex:1;display:flex;align-items:center;
                background:#f1f5f9;border-radius:99px;
                box-shadow:0 2px 8px rgba(0,0,0,.06);
                overflow:hidden;height:46px;padding:0 .9rem;gap:.4rem;">
      <i class="bi bi-search" style="color:#94a3b8;font-size:.95rem;flex-shrink:0;"></i>
      <input type="text" id="ent-search-mobile"
             style="flex:1;border:none;background:transparent;outline:none;
                    font-size:.92rem;color:var(--text);padding:0;"
             placeholder="Código, proveedor, doc…"
             oninput="(function(v){
               var d=document.getElementById('ent-buscar');if(d)d.value=v;
               var btn=document.getElementById('ent-search-clear');
               if(btn)btn.style.display=v?'flex':'none';
               window.filtrarEntradas();
             })(this.value);">
      <button id="ent-search-clear"
              onclick="(function(){
                var i=document.getElementById('ent-search-mobile');if(i){i.value='';i.focus();}
                var d=document.getElementById('ent-buscar');if(d)d.value='';
                document.getElementById('ent-search-clear').style.display='none';
                window.filtrarEntradas();
              })()"
              style="display:none;width:22px;height:22px;border-radius:50%;background:#ef4444;
                     border:none;color:#fff;font-size:.65rem;flex-shrink:0;
                     align-items:center;justify-content:center;cursor:pointer;">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <!-- Filtro fechas mobile (colapsable) -->
    <button onclick="window._entToggleFiltrosMobile()"
            style="width:46px;height:46px;border-radius:50%;background:#f1f5f9;border:none;
                   color:var(--subtext);font-size:1.1rem;flex-shrink:0;display:flex;align-items:center;
                   justify-content:center;cursor:pointer;" title="Filtrar por fecha">
      <i class="bi bi-funnel-fill"></i>
    </button>
  </div>
  <!-- Filtros fecha mobile (expandible) -->
  <div id="ent-filtros-mobile" style="display:none;padding:0 1rem .65rem;gap:.5rem;flex-wrap:wrap;align-items:center;">
    <input type="date" class="form-control form-control-sm" id="ent-fil-desde-mob"
           style="flex:1;min-width:130px;border-radius:12px;" title="Desde"
           onchange="(function(){
             var d=document.getElementById('ent-fil-desde');if(d)d.value=this.value;
             window.filtrarEntradas();
           }).call(this)">
    <input type="date" class="form-control form-control-sm" id="ent-fil-hasta-mob"
           style="flex:1;min-width:130px;border-radius:12px;" title="Hasta"
           onchange="(function(){
             var h=document.getElementById('ent-fil-hasta');if(h)h.value=this.value;
             window.filtrarEntradas();
           }).call(this)">
    <button onclick="window._entLimpiarFechas()"
            style="width:36px;height:36px;border-radius:10px;background:#fee2e2;border:none;
                   color:#ef4444;font-size:.9rem;display:flex;align-items:center;justify-content:center;">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <!-- ═══ HEADER ESCRITORIO ════════════════════════════════════════ -->
  <div id="ent-desktop-header">
    <div class="ent-controls">
      <div class="input-group input-group-sm" style="max-width:260px;">
        <span class="input-group-text bg-transparent border-end-0">
          <i class="bi bi-search" style="color:var(--subtext)"></i>
        </span>
        <input type="text" class="form-control border-start-0 ps-0" id="ent-buscar"
               placeholder="Código, proveedor, documento…" oninput="window.filtrarEntradas()">
      </div>
      <input type="date" class="form-control form-control-sm" id="ent-fil-desde" style="max-width:150px" onchange="window.filtrarEntradas()">
      <input type="date" class="form-control form-control-sm" id="ent-fil-hasta" style="max-width:150px" onchange="window.filtrarEntradas()">
      <button class="btn btn-xs btn-outline-secondary" onclick="window._entLimpiarFechas()" title="Limpiar">
        <i class="bi bi-x-lg"></i>
      </button>
      <span id="ent-contador" class="text-muted small ms-1"></span>
      <div style="flex:1"></div>
      <button class="btn btn-sm btn-outline-secondary" onclick="window.cargarEntradas()" title="Actualizar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="ent-filters">
      <div style="flex:1"></div>
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-success dropdown-toggle" data-bs-toggle="dropdown">
          <i class="bi bi-file-earmark-excel"></i><span class="ms-1">Excel</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="#" onclick="window.exportarEntradasExcel();return false;"><i class="bi bi-download me-2 text-success"></i>Exportar</a></li>
          <li><a class="dropdown-item" href="#" onclick="window.descargarPlantillaEntradas();return false;"><i class="bi bi-file-earmark-arrow-down me-2 text-primary"></i>Plantilla</a></li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <label class="dropdown-item" style="cursor:pointer;">
              <i class="bi bi-upload me-2 text-warning"></i>Importar Excel
              <input type="file" id="inputFileEntradas" accept=".xlsx,.xls" style="display:none" onchange="window.importarExcelEntradas(event)">
            </label>
          </li>
        </ul>
      </div>
      <button class="btn btn-sm btn-success" style="border-radius:12px;font-weight:700;" onclick="window.abrirModalEntrada()">
        <i class="bi bi-plus-lg me-1"></i>Nueva Entrada
      </button>
    </div>
  </div>

  <!-- ═══ CONTENEDOR PRINCIPAL ═════════════════════════════════════ -->
  <div style="display:flex;flex:1 1 0;min-height:0;overflow:hidden;">

    <!-- TABLA -->
    <div class="ent-table-wrap">
      <table id="tabla-entradas">
        <thead>
          <tr>
            <th>Código</th>
            <th>Fecha</th>
            <th class="col-hide-mob">Proveedor</th>
            <th class="col-hide-mob">Doc. Referencia</th>
            <th class="text-center">Arts.</th>
            <th class="text-end">Total PEN</th>
            <th style="width:80px;"></th>
          </tr>
        </thead>
        <tbody id="tbody-entradas">
          <tr><td colspan="7" class="td-placeholder"><div class="spinner-border spinner-border-sm me-2"></div>Cargando...</td></tr>
        </tbody>
      </table>
      <div id="ent-paginacion" class="d-flex align-items-center gap-2 py-2 px-3"></div>
    </div>

    <!-- PANEL DETALLE LATERAL -->
    <div class="ent-detail-panel" id="ent-panel-detalle">
      <div style="display:flex;align-items:center;justify-content:space-between;
                  padding:0 1rem;height:48px;border-bottom:1px solid var(--border);flex-shrink:0;">
        <span style="font-size:.88rem;font-weight:800;color:var(--text);" id="ent-detalle-titulo">Detalle Entrada</span>
        <button class="btn btn-sm" onclick="window._entCerrarDetalle()" style="color:var(--subtext);">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="ent-detail-scroll" id="ent-detalle-scroll"></div>
      <div class="ent-detail-footer" id="ent-detalle-footer" style="display:none;"></div>
    </div>

  </div>

</div>

<!-- Backdrop panel detalle (mobile) -->
<div id="ent-det-backdrop" onclick="window._entCerrarDetalle()"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);
            backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:1054;"></div>

<!-- ═══ FAB — solo mobile ════════════════════════════════════════ -->
<div id="ent-fab-wrap" style="display:none;position:fixed;bottom:80px;right:1rem;z-index:1041;">
  <button onclick="window.abrirModalEntrada()"
          style="width:60px;height:60px;border-radius:18px;background:#16a34a;border:none;color:#fff;
                 font-size:1.5rem;box-shadow:0 6px 24px rgba(22,163,74,.5);
                 display:flex;align-items:center;justify-content:center;
                 transition:transform .25s cubic-bezier(.4,0,.2,1);">
    <i class="bi bi-plus-lg"></i>
  </button>
</div>

<!-- ═══ MODAL NUEVA ENTRADA ══════════════════════════════════════ -->
<div class="modal fade" id="modal-entrada" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content" style="border-radius:20px;border:none;">
      <div class="modal-header" style="border-bottom:1px solid var(--border);padding:1rem 1.5rem;">
        <h5 class="modal-title fw-bold" style="font-size:.95rem;">
          <i class="bi bi-arrow-down-circle-fill text-success me-2"></i>Nueva Entrada de Artículos
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" style="padding:1.25rem 1.5rem;">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="fw-semibold small text-muted" style="font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;">Fecha <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="ent-f-fecha" style="border-radius:12px;min-height:44px;">
          </div>
          <div class="col-md-3">
            <label class="fw-semibold small text-muted" style="font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;">Proveedor <span class="text-danger">*</span></label>
            <div class="position-relative">
              <input type="text" id="ent-f-proveedor-txt" class="form-control" placeholder="Buscar proveedor…"
                style="border-radius:12px;min-height:44px;"
                autocomplete="off" oninput="window._cbFiltrar('ent-f-proveedor')"
                onfocus="window._cbFiltrar('ent-f-proveedor')" onblur="window._cbHide('ent-f-proveedor')">
              <input type="hidden" id="ent-f-proveedor">
              <div id="ent-f-proveedor-dd" class="cb-dropdown"></div>
            </div>
          </div>
          <div class="col-md-3">
            <label class="fw-semibold small text-muted" style="font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;">Doc. Referencia</label>
            <input type="text" class="form-control" id="ent-f-doc-ref" placeholder="Factura, guía, O/C…" style="border-radius:12px;min-height:44px;">
          </div>
          <div class="col-md-3">
            <label class="fw-semibold small text-muted" style="font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;">Moneda</label>
            <select class="form-select" id="ent-f-moneda" onchange="window._entActualizarTC()" style="border-radius:12px;min-height:44px;">
              <option value="PEN">PEN (S/)</option>
              <option value="USD">USD ($)</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="fw-semibold small text-muted" style="font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;">Tipo de Cambio</label>
            <input type="number" class="form-control" id="ent-f-tc" step="0.001" placeholder="3.700" style="border-radius:12px;min-height:44px;">
          </div>
          <div class="col-md-6">
            <label class="fw-semibold small text-muted" style="font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;">Observaciones</label>
            <input type="text" class="form-control" id="ent-f-obs" placeholder="Notas, condiciones de compra…" style="border-radius:12px;min-height:44px;">
          </div>
        </div>
        <hr class="my-3" style="border-color:var(--border);">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="fw-bold mb-0" style="font-size:.85rem;"><i class="bi bi-list-ul me-1"></i>Artículos</h6>
          <button type="button"
                  style="padding:.45rem 1rem;border-radius:12px;border:1.5px solid #16a34a;
                         background:transparent;color:#16a34a;font-weight:700;font-size:.8rem;cursor:pointer;"
                  onclick="window._entAgregarItem()">
            <i class="bi bi-plus-lg me-1"></i>Agregar artículo
          </button>
        </div>
        <div class="table-responsive" style="border-radius:12px;overflow:hidden;border:1px solid var(--border);">
          <table class="table table-sm mb-0" id="tabla-ent-items" style="font-size:.83rem;">
            <thead style="background:var(--bg);">
              <tr>
                <th style="min-width:260px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--subtext);">Artículo</th>
                <th style="width:90px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--subtext);">Cantidad</th>
                <th style="width:120px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--subtext);">Costo Unit.</th>
                <th style="width:110px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--subtext);">Importe</th>
                <th style="width:40px;"></th>
              </tr>
            </thead>
            <tbody id="tbody-ent-items"></tbody>
            <tfoot style="background:var(--bg);">
              <tr>
                <td colspan="3" class="text-end fw-bold" style="padding:10px 12px;">Total:</td>
                <td id="ent-total-display" class="text-end fw-bold" style="padding:10px 12px;color:#16a34a;">S/ 0.00</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
      <div class="modal-footer" style="border-top:1px solid var(--border);padding:.85rem 1.5rem;gap:.5rem;">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                style="border-radius:12px;font-weight:700;min-height:44px;padding:.5rem 1.25rem;">Cancelar</button>
        <button type="button" onclick="window.guardarEntrada()"
                style="border-radius:12px;border:none;background:#16a34a;color:#fff;font-weight:700;
                       font-size:.9rem;min-height:44px;padding:.5rem 1.5rem;cursor:pointer;
                       display:flex;align-items:center;gap:.4rem;">
          <i class="bi bi-save"></i>Registrar Entrada
        </button>
      </div>
    </div>
  </div>
</div>
