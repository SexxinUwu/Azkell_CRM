<style>
@media (max-width: 767.98px) {
    #gps-panel-lista { flex: 1 1 100% !important; width: 100% !important; max-width: 100% !important; }
}
</style>
<div id="moduloUbicacionGPS" class="modulo-wrapper" style="display: flex;">

    <!-- Barra de controles -->
    <div class="controls-row d-flex justify-content-between align-items-center mb-2">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-geo-alt-fill fs-4 text-primary"></i>
            <h5 class="m-0 fw-bold text-dark-theme" data-i18n="gps.title">Ubicación GPS Flota</h5>
            <span id="badge-wialon-ubicacion" class="badge bg-success ms-1" style="display:none;"><i class="bi bi-broadcast"></i> <span data-i18n="gps.active">Activo</span></span>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <span id="gps-unit-count-badge" class="badge bg-secondary">0 unidades</span>
            <button class="btn-reload-cache" onclick="recargarWialon(true)" title="Actualizar GPS">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <!-- Cuerpo: lista izquierda + panel detalle derecha -->
    <div class="d-flex gap-3 flex-grow-1" style="min-height: 0; overflow: hidden;">

        <!-- Panel izquierdo: lista de unidades — full width en móvil, 340px en desktop -->
        <div id="gps-panel-lista" style="flex: 0 0 340px; max-width: 340px; width: 100%; display: flex; flex-direction: column; min-height: 0;">
            <div class="mb-2">
                <div class="input-group input-group-sm">
                    <span class="input-group-text border-end-0 bg-transparent">
                        <i class="bi bi-search" style="color: var(--subtext);"></i>
                    </span>
                    <input type="text" class="form-control border-start-0 ps-0"
                           id="busGPSUnidad"
                           placeholder="Buscar placa o unidad..."
                           oninput="filtrarListaGPS(this.value)">
                </div>
            </div>
            <div id="listaUnidadesGPS" style="flex-grow:1; overflow-y:auto; min-height:0;">
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-satellite fs-3 opacity-50"></i>
                    <p class="mt-2 mb-0" data-i18n="gps.syncing">Sincronizando GPS...</p>
                </div>
            </div>
        </div>

        <!-- Panel derecho: detalle — solo visible en desktop (≥768px) -->
        <div id="paneDetalleGPS" class="card flex-grow-1 p-3 d-none d-md-flex flex-column" style="min-height:0; overflow-y:auto;">
            <div class="text-center text-muted py-5">
                <i class="bi bi-geo-alt fs-2 opacity-40"></i>
                <p class="mt-3 mb-0" data-i18n="gps.selectUnit">Selecciona una unidad de la lista para ver su detalle</p>
            </div>
        </div>

    </div>

    <!-- Offcanvas detalle para móvil (desliza desde abajo) -->
    <div class="offcanvas offcanvas-bottom" tabindex="-1" id="gpsDetalleOffcanvas"
         style="height:92vh; border-radius:18px 18px 0 0; background: var(--bg);">
        <div class="offcanvas-header" style="background: var(--surface); border-bottom: 1px solid var(--border); border-radius:18px 18px 0 0;">
            <div>
                <h6 class="offcanvas-title fw-bold mb-0 text-primary" id="gpsDetalleOffcanvasTitle">—</h6>
                <small class="text-muted" id="gpsDetalleOffcanvasSubtitle"></small>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>
        <div class="offcanvas-body p-3" id="gpsDetalleOffcanvasBody" style="overflow-y: auto; background: var(--bg);">
        </div>
    </div>

</div>
