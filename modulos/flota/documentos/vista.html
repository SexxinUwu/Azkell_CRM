<div id="moduloDocumentosFlota" class="modulo-aislado h-100" style="background-color: var(--surface);">
    
    <!-- Topbar -->
    <div class="topbar w-100 d-flex justify-content-between align-items-center mb-3 sticky-top p-3" style="background-color: var(--surface); z-index:100; border-bottom: 1px solid var(--border);">
        <div class="d-flex flex-column">
            <h4 class="mb-0 fw-bold" style="color: var(--text);">Documentos</h4>
            <span style="font-size: 0.85rem; color: var(--subtext);">Flota / Control de Documentos</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span id="cache-badge-docflota" class="cache-badge"><i class="bi bi-database"></i> <span id="cache-label-docflota">Sin cargar</span></span>
            <button class="btn btn-sm btn-light border shadow-sm rounded btn-reload-cache d-flex align-items-center justify-content-center px-2" style="height: 32px;" onclick="recargarModulo('flota/documentos')" title="Actualizar"><i class="bi bi-arrow-clockwise"></i></button>
            <button class="btn btn-primary fw-bold text-white shadow-sm d-flex align-items-center btn-sm px-3 rounded-pill" onclick="abrirModalDocumentoFlota()"><i class="bi bi-plus-lg me-1"></i> Registrar Doc</button>
        </div>
    </div>

    <div class="container-fluid px-3 pb-4">
        
        <!-- Cards de KPI -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card h-100 border-0 shadow-sm" style="background-color: #2c3e50; color: white; border-radius: 12px;">
                    <div class="card-body text-center p-3">
                        <h2 class="fw-bolder mb-1" id="kpi-doc-total">0</h2>
                        <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;">Documentos</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card h-100 border-0 shadow-sm" style="background-color: #fee2e2; border-radius: 12px; cursor: pointer;" onclick="filtrarDocumentosPorEstado('VENCIDO')">
                    <div class="card-body text-center p-3">
                        <h2 class="fw-bolder mb-1 text-danger" id="kpi-doc-vencido">0</h2>
                        <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 600; color: #ef4444; letter-spacing: 0.5px;">Vencidos</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card h-100 border-0 shadow-sm" style="background-color: #fef3c7; border-radius: 12px; cursor: pointer;" onclick="filtrarDocumentosPorEstado('PROXIMO')">
                    <div class="card-body text-center p-3">
                        <h2 class="fw-bolder mb-1 text-warning" id="kpi-doc-proximo">0</h2>
                        <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 600; color: #f59e0b; letter-spacing: 0.5px;">Próximos a Vencer</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card h-100 border-0 shadow-sm" style="background-color: #d1fae5; border-radius: 12px; cursor: pointer;" onclick="filtrarDocumentosPorEstado('VIGENTE')">
                    <div class="card-body text-center p-3">
                        <h2 class="fw-bolder mb-1 text-success" id="kpi-doc-vigente">0</h2>
                        <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 600; color: #10b981; letter-spacing: 0.5px;">Vigentes</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toolbar de Búsqueda -->
        <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3 bg-white p-2 rounded shadow-sm border border-light">
            <div class="d-flex flex-grow-1 gap-2 align-items-center">
                <div class="input-group" style="max-width: 300px;">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-search"></i></span>
                    <input type="text" id="inputBuscarDocFlota" class="form-control border-start-0 bg-light" placeholder="Buscar placa, constancia..." oninput="filtrarTablaDocFlota()">
                </div>
                <select id="filtroTipoDocFlota" class="form-select bg-light" style="max-width: 200px;" onchange="filtrarTablaDocFlota()">
                    <option value="">Todos los Tipos</option>
                    <option value="Tarjeta de Circulación">Tarjeta de Circulación</option>
                    <option value="SOAT">SOAT</option>
                    <option value="Certificado MATPEL">Certificado MATPEL</option>
                    <option value="Revisión Técnica">Revisión Técnica</option>
                    <option value="Bonificación">Bonificación</option>
                    <option value="Seguro Vehicular">Seguro Vehicular</option>
                    <option value="Seguro Carga">Seguro Carga</option>
                    <option value="Certificado Fumigación">Certificado Fumigación</option>
                    <option value="Extintores">Extintores</option>
                </select>
                <button class="btn btn-light border text-secondary shadow-sm" onclick="filtrarDocumentosPorEstado('')" title="Limpiar Filtros"><i class="bi bi-funnel"></i> Limpiar</button>
            </div>
            <div>
                <button class="btn btn-outline-success btn-sm fw-bold shadow-sm" onclick="exportarExcelDocFlota()"><i class="bi bi-file-earmark-excel"></i> Exportar</button>
            </div>
        </div>

        <!-- Tabla -->
        <div class="card shadow-sm border-0 bg-white" style="border-radius: 12px; overflow: hidden;">
            <div class="table-responsive" style="max-height: calc(100vh - 280px); overflow-y: auto;">
                <table class="table table-hover align-middle mb-0" id="tablaDocFlota" style="font-size: 0.85rem;">
                    <thead style="position: sticky; top: 0; background-color: var(--surface); z-index: 10;">
                        <tr>
                            <th class="border-0 text-secondary" style="font-size: 0.75rem; letter-spacing: 0.5px;">PLACA</th>
                            <th class="border-0 text-secondary" style="font-size: 0.75rem; letter-spacing: 0.5px;">TIPO DOCUMENTO</th>
                            <th class="border-0 text-secondary" style="font-size: 0.75rem; letter-spacing: 0.5px;">CONSTANCIA</th>
                            <th class="border-0 text-secondary" style="font-size: 0.75rem; letter-spacing: 0.5px;">VENCIMIENTO</th>
                            <th class="border-0 text-secondary" style="font-size: 0.75rem; letter-spacing: 0.5px;">FALTAN (DÍAS)</th>
                            <th class="border-0 text-secondary text-center" style="font-size: 0.75rem; letter-spacing: 0.5px;">ESTADO</th>
                            <th class="border-0 text-secondary text-center" style="width: 50px;"></th>
                        </tr>
                    </thead>
                    <tbody id="tbDocFlota">
                        <tr><td colspan="7" class="text-center py-4 text-muted">Cargando documentos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL REGISTRO / EDICIÓN -->
    <div class="modal fade" id="modalDocFlota" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 16px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalDocFlotaTitle">Registrar Documento</h5>
                    <button type="button" class="btn-close shadow-sm bg-light rounded-circle" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formDocFlota" onsubmit="guardarDocumentoFlota(event)">
                        <input type="hidden" name="id" id="docflota_id">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">Placa de la Unidad <span class="text-danger">*</span></label>
                            <input type="text" class="form-control bg-light" name="placa" id="docflota_placa" placeholder="Ej. BDA828" required style="text-transform: uppercase;">
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">Tipo de Documento <span class="text-danger">*</span></label>
                                <select class="form-select bg-light" name="tipo_documento" id="docflota_tipo" required>
                                    <option value="" disabled selected>Seleccione...</option>
                                    <option value="Tarjeta de Circulación">Tarjeta de Circulación</option>
                                    <option value="SOAT">SOAT</option>
                                    <option value="Certificado MATPEL">Certificado MATPEL</option>
                                    <option value="Revisión Técnica">Revisión Técnica</option>
                                    <option value="Bonificación">Bonificación</option>
                                    <option value="Seguro Vehicular">Seguro Vehicular</option>
                                    <option value="Seguro Carga">Seguro Carga</option>
                                    <option value="Certificado Fumigación">Certificado Fumigación</option>
                                    <option value="Extintores">Extintores</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">Entidad Emitente</label>
                                <input type="text" class="form-control bg-light" name="entidad" id="docflota_entidad" placeholder="Ej. RIMAC, MTC">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">N° Constancia / Póliza</label>
                            <input type="text" class="form-control bg-light" name="nro_constancia" id="docflota_constancia" placeholder="Ej. 15M24051767E">
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">Fecha de Emisión</label>
                                <input type="date" class="form-control bg-light" name="fecha_emision" id="docflota_emision">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">Fecha Vencimiento <span class="text-danger">*</span></label>
                                <input type="date" class="form-control bg-light" name="fecha_vencimiento" id="docflota_vencimiento" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">Observaciones / Notas</label>
                            <textarea class="form-control bg-light" name="observaciones" id="docflota_obs" rows="2" placeholder="Notas adicionales sobre el documento..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold rounded-pill shadow" id="btnGuardarDocFlota">Guardar Documento</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- DRAWER EXPEDIENTE POR PLACA -->
    <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="drawerExpedientePlaca" style="width: 400px; border-top-left-radius: 16px; border-bottom-left-radius: 16px; border-left: 0;">
        <div class="offcanvas-header pb-0" style="border-bottom: 1px solid var(--border);">
            <div class="d-flex align-items-center gap-3 pb-3 w-100">
                <div style="width: 48px; height: 48px; border-radius: 12px; background-color: #f1f5f9; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-truck fs-4 text-primary"></i>
                </div>
                <div>
                    <h4 class="mb-0 fw-bold text-dark" id="expediente-placa-title">PLACA</h4>
                    <span class="text-muted" style="font-size: 0.8rem;">Expediente de Documentos</span>
                </div>
                <button type="button" class="btn-close ms-auto bg-light rounded-circle shadow-sm" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
        </div>
        <div class="offcanvas-body" style="background-color: var(--surface);">
            <div id="listaExpedienteDocs" class="d-flex flex-column gap-3">
                <!-- Se inyectan las tarjetas de documentos aquí -->
            </div>
        </div>
    </div>

</div>
