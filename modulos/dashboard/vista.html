<style>
/* ─── DASHBOARD MOBILE ──────────────────────────────────────── */
@media (max-width: 767.98px) {
    #moduloDashboard {
        padding: 0 !important;
        margin: 0 !important;
        background: var(--bg);
    }
    #moduloDashboard .controls-row {
        padding: 1rem 1.25rem 0.5rem 1.25rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        margin-bottom: 0 !important;
    }
    #kpi-metrics-row {
        padding: 1rem 1.25rem 0.5rem 1.25rem;
        margin: 0 !important;
        background: var(--bg);
    }
    #dash-mob-alerts-wrap {
        padding: 0 1.25rem;
        margin-bottom: 1rem;
    }
    .dash-mob-alert-list {
        background: var(--surface);
        border-radius: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        overflow: hidden;
    }
    .dash-mob-alert-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.25rem;
        text-decoration: none;
        color: var(--text);
        border-bottom: 1px solid var(--border);
        transition: background 0.2s;
    }
    .dash-mob-alert-item:active { background: var(--bg); }
    .dash-mob-alert-item:last-child { border-bottom: none; }
    
    .dash-weather-container {
        padding: 0 1.25rem;
        width: 100%;
        margin-bottom: 1.5rem;
    }
    .dash-weather-card {
        background: linear-gradient(135deg, #8E9EAB, #EEF2F3);
        border-radius: 24px !important;
        padding: 1.5rem !important;
        height: 160px !important;
        border: none !important;
        color: #333 !important;
        position: relative;
        overflow: hidden;
    }
    body.dark .dash-weather-card {
        background: linear-gradient(135deg, #374151, #1f2937);
        color: #f3f4f6 !important;
    }
    .dash-weather-icon {
        position: absolute;
        top: -10px;
        right: 0px;
        opacity: 0.2;
    }
    .dash-weather-icon i {
        font-size: 100px !important;
        line-height: 1;
    }
    .dash-weather-temp {
        font-size: 3rem !important;
        font-weight: 300 !important;
        letter-spacing: -2px;
        line-height: 1;
        margin-top: auto;
    }
    .kpi-metric-card {
        border-radius: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        border: none;
        height: 112px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .kpi-metric-card::before {
        height: 4px;
        border-radius: 16px 16px 0 0;
    }
    .kpi-metric-value {
        font-size: 1.8rem;
        font-weight: 900;
    }
    .kpi-metric-label {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--subtext);
    }
    .kpi-metric-icon-wrap {
        border-radius: 12px;
        width: 32px; height: 32px;
        font-size: 1rem;
    }
}
</style>
<div id="moduloDashboard" class="modulo-wrapper" style="display: flex; flex-direction: column;">

    <!-- Header -->
    <div class="controls-row d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-grid-1x2-fill fs-4 text-primary"></i>
            <h5 class="m-0 fw-bold text-dark-theme" data-i18n="dash.title">Centro de Comando</h5>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <span class="badge bg-success shadow-sm" id="badge-dash-status"><i class="bi bi-check-circle"></i> <span data-i18n="dash.system.active">Sistema Activo</span></span>
            <button class="btn btn-outline-primary fw-bold btn-sm shadow-sm btn-reload-cache" onclick="recargarDashboard()" title="Actualizar"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
    </div>

    <!-- ── KPI METRIC CARDS ─────────────────────────────── -->
    <div class="row g-3 mb-4" id="kpi-metrics-row">
        <div class="col-6 col-md-3">
            <div class="kpi-metric-card">
                <div class="kpi-metric-top">
                    <div class="kpi-metric-icon-wrap primary"><i class="bi bi-truck-front-fill"></i></div>
                    <div class="kpi-metric-trend-wrap" id="kpi-trend-flota"></div>
                </div>
                <div class="kpi-metric-value" id="kpi-val-flota">—</div>
                <div class="kpi-metric-label">Flota Activa</div>
                <div class="kpi-metric-sparkline" id="kpi-spark-flota"></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-metric-card success" style="cursor:pointer;" title="Ver inspecciones vigentes" onclick="localStorage.setItem('fleet_insp_nav_filter','VIGENTE');cargarModuloAislado('mantenimiento/inspecciones')">
                <div class="kpi-metric-top">
                    <div class="kpi-metric-icon-wrap success"><i class="bi bi-shield-check"></i></div>
                    <div class="kpi-metric-trend-wrap" id="kpi-trend-vigentes"></div>
                </div>
                <div class="kpi-metric-value" id="kpi-val-vigentes">—</div>
                <div class="kpi-metric-label">Insp. Vigentes</div>
                <div class="kpi-metric-sparkline" id="kpi-spark-vigentes"></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-metric-card warning" style="cursor:pointer;" title="Ver inspecciones por vencer" onclick="localStorage.setItem('fleet_insp_nav_filter','PRÓXIMO A VENCER');cargarModuloAislado('mantenimiento/inspecciones')">
                <div class="kpi-metric-top">
                    <div class="kpi-metric-icon-wrap warning"><i class="bi bi-clock-history"></i></div>
                    <div class="kpi-metric-trend-wrap" id="kpi-trend-porvencer"></div>
                </div>
                <div class="kpi-metric-value" id="kpi-val-porvencer">—</div>
                <div class="kpi-metric-label">Por Vencer (7d)</div>
                <div class="kpi-metric-sparkline" id="kpi-spark-porvencer"></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-metric-card danger" style="cursor:pointer;" title="Ver inspecciones vencidas" onclick="localStorage.setItem('fleet_insp_nav_filter','NO VIGENTE');cargarModuloAislado('mantenimiento/inspecciones')">
                <div class="kpi-metric-top">
                    <div class="kpi-metric-icon-wrap danger"><i class="bi bi-exclamation-triangle-fill"></i></div>
                    <div class="kpi-metric-trend-wrap" id="kpi-trend-vencidas"></div>
                </div>
                <div class="kpi-metric-value" id="kpi-val-vencidas">—</div>
                <div class="kpi-metric-label">Vencidas</div>
                <div class="kpi-metric-sparkline" id="kpi-spark-vencidas"></div>
            </div>
        </div>
    </div>

    <!-- ── ACCIONES RÁPIDAS MÓVIL (d-block d-md-none) ─── -->
    <div class="d-block d-md-none" id="dash-mob-alerts-wrap">
        <div class="dash-mob-alert-list">
            <a href="#" class="dash-mob-alert-item" onclick="event.preventDefault(); localStorage.setItem('fleet_fleetrun_nav_filter','VENCIDO'); cargarModuloAislado('mantenimiento/fleetrun')">
                <div class="d-flex align-items-center gap-3">
                    <div style="width:8px;height:8px;border-radius:50%;background:#ef4444;"></div>
                    <span class="fw-semibold" style="font-size:0.85rem;">MP Fleetrun Vencidos</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="fw-bold text-muted" id="dash-mob-fleet-vencidos">—</span>
                    <i class="bi bi-chevron-right text-muted opacity-50"></i>
                </div>
            </a>
            <a href="#" class="dash-mob-alert-item" onclick="event.preventDefault(); localStorage.setItem('fleet_fleetrun_nav_filter','POR VENCER'); cargarModuloAislado('mantenimiento/fleetrun')">
                <div class="d-flex align-items-center gap-3">
                    <div style="width:8px;height:8px;border-radius:50%;background:#eab308;"></div>
                    <span class="fw-semibold" style="font-size:0.85rem;">MP Fleetrun Por Vencer</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="fw-bold text-muted" id="dash-mob-fleet-porvencer">—</span>
                    <i class="bi bi-chevron-right text-muted opacity-50"></i>
                </div>
            </a>
        </div>
    </div>

    <!-- ── GRÁFICOS + ACTIVIDAD RECIENTE ───────────────── -->
    <div class="row g-3 mb-4">

        <!-- Widget Clima -->
        <div class="col-12 col-md-auto d-flex align-items-stretch">
            <div class="dash-weather-container" id="dash-weather-container">
                <div class="dash-weather-card" id="dash-weather-card">
                    <div class="dash-weather-icon" id="dash-weather-icon">
                        <i class="bi bi-cloud-sun"></i>
                    </div>
                    <div class="d-flex align-items-center gap-1 mb-2" style="font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; opacity:0.8;">
                        <i class="bi bi-geo-alt-fill"></i> <span id="dash-weather-city">Obteniendo...</span>
                    </div>
                    <div class="mb-1" style="font-size:0.85rem; font-weight:500; opacity:0.9;" id="dash-weather-desc">—</div>
                    <div class="d-flex align-items-end gap-3 mt-auto">
                        <div class="dash-weather-temp" id="dash-weather-temp">—°</div>
                        <div class="pb-1" style="font-size:0.85rem; font-weight:500; opacity:0.8;">
                            <span>Min <span id="dash-weather-min">—°</span></span>
                            <span class="ms-2">Max <span id="dash-weather-max">—°</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4 d-none d-md-block">
            <div class="kpi-card h-100 p-3 chart-card-dashboard">
                <h6 class="fw-bold text-primary mb-3"><i class="bi bi-pie-chart-fill"></i> <span data-i18n="dash.maint.health">Salud Mantenimientos</span></h6>
                <div class="chart-container-dashboard">
                    <canvas id="chartDashFleetrunStatus"></canvas>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4 d-none d-md-block">
            <div class="kpi-card h-100 p-3 chart-card-dashboard">
                <h6 class="fw-bold text-success mb-3"><i class="bi bi-bar-chart-fill"></i> <span data-i18n="dash.insp.status">Estado Inspecciones</span></h6>
                <div class="chart-container-dashboard">
                    <canvas id="chartGeneralInspecciones"></canvas>
                </div>
            </div>
        </div>

    </div>

</div>
