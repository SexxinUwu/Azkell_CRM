<div id="moduloDashboard" class="modulo-wrapper" style="display: flex;">

    <!-- Header -->
    <div class="controls-row d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-grid-1x2-fill fs-4 text-primary"></i>
            <h5 class="m-0 fw-bold text-dark-theme" data-i18n="dash.title">Centro de Comando</h5>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <span class="badge bg-success shadow-sm" id="badge-dash-status"><i class="bi bi-check-circle"></i> <span data-i18n="dash.system.active">Sistema Activo</span></span>
            <button class="btn btn-outline-primary fw-bold btn-sm shadow-sm btn-reload-cache" onclick="recargarDashboard()" title="Actualizar"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
    </div>

    <!-- ── KPI METRIC CARDS ─────────────────────────────── -->
    <div class="row g-3 mb-4" id="kpi-metrics-row">
        <div class="col-6 col-md-3">
            <div class="kpi-metric-card">
                <div class="kpi-metric-top">
                    <div class="kpi-metric-icon-wrap primary"><i class="bi bi-truck-front-fill"></i></div>
                    <div class="kpi-metric-trend-wrap" id="kpi-trend-flota"></div>
                </div>
                <div class="kpi-metric-value" id="kpi-val-flota">—</div>
                <div class="kpi-metric-label">Flota Activa</div>
                <div class="kpi-metric-sparkline" id="kpi-spark-flota"></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-metric-card success">
                <div class="kpi-metric-top">
                    <div class="kpi-metric-icon-wrap success"><i class="bi bi-shield-check"></i></div>
                    <div class="kpi-metric-trend-wrap" id="kpi-trend-vigentes"></div>
                </div>
                <div class="kpi-metric-value" id="kpi-val-vigentes">—</div>
                <div class="kpi-metric-label">Insp. Vigentes</div>
                <div class="kpi-metric-sparkline" id="kpi-spark-vigentes"></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-metric-card warning">
                <div class="kpi-metric-top">
                    <div class="kpi-metric-icon-wrap warning"><i class="bi bi-clock-history"></i></div>
                    <div class="kpi-metric-trend-wrap" id="kpi-trend-porvencer"></div>
                </div>
                <div class="kpi-metric-value" id="kpi-val-porvencer">—</div>
                <div class="kpi-metric-label">Por Vencer (7d)</div>
                <div class="kpi-metric-sparkline" id="kpi-spark-porvencer"></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-metric-card danger">
                <div class="kpi-metric-top">
                    <div class="kpi-metric-icon-wrap danger"><i class="bi bi-exclamation-triangle-fill"></i></div>
                    <div class="kpi-metric-trend-wrap" id="kpi-trend-vencidas"></div>
                </div>
                <div class="kpi-metric-value" id="kpi-val-vencidas">—</div>
                <div class="kpi-metric-label">Vencidas</div>
                <div class="kpi-metric-sparkline" id="kpi-spark-vencidas"></div>
            </div>
        </div>
    </div>

    <!-- ── ACCIONES RÁPIDAS MÓVIL (d-block d-md-none) ─── -->
    <div class="d-block d-md-none mb-3">
        <div class="list-group shadow-sm rounded-3 overflow-hidden">
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 px-3" href="#" onclick="event.preventDefault(); cargarModuloAislado('mantenimiento/inspecciones')">
                <span><i class="bi bi-exclamation-triangle-fill text-danger me-2"></i><span class="fw-semibold" style="font-size:0.9rem;">Insp. Vencidas</span></span>
                <span class="d-flex align-items-center gap-3"><span class="fw-bold text-danger fs-6" id="dash-mob-vencidas">—</span><i class="bi bi-chevron-right text-muted"></i></span>
            </a>
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 px-3" href="#" onclick="event.preventDefault(); cargarModuloAislado('mantenimiento/inspecciones')">
                <span><i class="bi bi-clock-history text-warning me-2"></i><span class="fw-semibold" style="font-size:0.9rem;">Insp. Por Vencer (7d)</span></span>
                <span class="d-flex align-items-center gap-3"><span class="fw-bold text-warning fs-6" id="dash-mob-porvencer">—</span><i class="bi bi-chevron-right text-muted"></i></span>
            </a>
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 px-3" href="#" onclick="event.preventDefault(); cargarModuloAislado('mantenimiento/fleetrun')">
                <span><i class="bi bi-speedometer2 text-primary me-2"></i><span class="fw-semibold" style="font-size:0.9rem;">MP Fleetrun Vencidos</span></span>
                <span class="d-flex align-items-center gap-3"><span class="fw-bold text-primary fs-6" id="dash-mob-fleet-vencidos">—</span><i class="bi bi-chevron-right text-muted"></i></span>
            </a>
        </div>
    </div>

    <!-- ── GRÁFICOS + ACTIVIDAD RECIENTE ───────────────── -->
    <div class="row g-3 mb-4">

        <div class="col-12 col-md-4 d-none d-md-block">
            <div class="kpi-card h-100 p-3 chart-card-dashboard">
                <h6 class="fw-bold text-primary mb-3"><i class="bi bi-pie-chart-fill"></i> <span data-i18n="dash.maint.health">Salud Mantenimientos</span></h6>
                <div class="chart-container-dashboard">
                    <canvas id="chartDashFleetrunStatus"></canvas>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4 d-none d-md-block">
            <div class="kpi-card h-100 p-3 chart-card-dashboard">
                <h6 class="fw-bold text-success mb-3"><i class="bi bi-bar-chart-fill"></i> <span data-i18n="dash.insp.status">Estado Inspecciones</span></h6>
                <div class="chart-container-dashboard">
                    <canvas id="chartGeneralInspecciones"></canvas>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="kpi-card h-100 p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold m-0" style="color:var(--text)"><i class="bi bi-activity me-2" style="color:var(--crm-accent)"></i>Actividad Reciente</h6>
                    <button class="btn btn-sm btn-link p-0" style="color:var(--crm-accent);font-size:0.75rem;" onclick="cargarModuloAislado('mantenimiento/inspecciones')">Ver todo →</button>
                </div>
                <div id="dash-activity-feed" style="overflow-y:auto;max-height:220px;">
                    <div class="text-center py-3" style="color:var(--subtext);font-size:0.82rem;">Cargando actividad...</div>
                </div>
            </div>
        </div>

    </div>

    <!-- ── PREDICCIÓN DE VENCIMIENTOS (90 días) ─────────────── -->
    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="kpi-card p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold m-0" style="color:var(--text);"><i class="bi bi-calendar-range text-primary me-2"></i>Vencimientos próximos 90 días</h6>
                    <span class="badge bg-primary" id="dash-pred-total">—</span>
                </div>
                <div style="position:relative; height:120px;">
                    <canvas id="chartPrediccion90d"></canvas>
                </div>
            </div>
        </div>
    </div>

</div>
