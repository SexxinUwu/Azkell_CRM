<!-- ================================================================ -->
<!-- MÓDULO: FINANZAS TALLER — Azkell Fleet                          -->
<!-- Ruta: mantenimiento/finanzas-taller                              -->
<!-- ================================================================ -->
<style>
#moduloFinanzasTaller {
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
}

/* ── Cards superiores ── */
#moduloFinanzasTaller .fin-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.85rem;
    padding: 1rem 1.25rem 0.75rem;
    flex-shrink: 0;
}
@media (max-width: 767.98px) {
    #moduloFinanzasTaller .fin-cards { grid-template-columns: 1fr; }
}
@media (min-width: 768px) and (max-width: 991.98px) {
    #moduloFinanzasTaller .fin-cards { grid-template-columns: repeat(3, 1fr); }
}
#moduloFinanzasTaller .fin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    position: relative;
    overflow: hidden;
}
#moduloFinanzasTaller .fin-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 10px 10px 0 0;
    background: var(--fin-accent, #22C55E);
}
#moduloFinanzasTaller .fin-card .fin-card-label {
    font-size: 0.67rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--subtext);
}
#moduloFinanzasTaller .fin-card .fin-card-value {
    font-size: 1.75rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--fin-accent, #22C55E);
    line-height: 1.1;
}
#moduloFinanzasTaller .fin-card.fin-green  { --fin-accent: #22C55E; }
#moduloFinanzasTaller .fin-card.fin-blue   { --fin-accent: #5865F2; }
#moduloFinanzasTaller .fin-card.fin-orange { --fin-accent: #F97316; }

/* ── Filtros ── */
#moduloFinanzasTaller .fin-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0.65rem 1.25rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    align-items: center;
}
#moduloFinanzasTaller .fin-filters select,
#moduloFinanzasTaller .fin-filters input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-size: 0.82rem;
    padding: 5px 8px;
    min-width: 0;
}
#moduloFinanzasTaller .fin-filters select:focus,
#moduloFinanzasTaller .fin-filters input:focus {
    outline: none;
    border-color: var(--primary, #5865F2);
    box-shadow: 0 0 0 2px rgba(88,101,242,0.15);
}
#moduloFinanzasTaller .fin-filters label {
    font-size: 0.70rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--subtext);
    white-space: nowrap;
    margin-bottom: 0;
}
#moduloFinanzasTaller .fin-filters .fin-filter-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

/* ── Sección de tabla ── */
#moduloFinanzasTaller .fin-table-section {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#moduloFinanzasTaller .fin-table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0.65rem 1.25rem;
    flex-shrink: 0;
}
#moduloFinanzasTaller .fin-table-header h6 {
    margin: 0;
    font-weight: 800;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text);
}
#moduloFinanzasTaller .fin-table-wrap {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    padding: 0 1.25rem 1rem;
}
#moduloFinanzasTaller .fin-table {
    width: 100%;
    border-collapse: collapse;
}
#moduloFinanzasTaller .fin-table thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--subtext);
    padding: 8px 10px;
    white-space: nowrap;
    z-index: 1;
}
#moduloFinanzasTaller .fin-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
}
#moduloFinanzasTaller .fin-table tbody tr:hover {
    background: rgba(88,101,242,0.04);
}
#moduloFinanzasTaller .fin-table tbody td {
    padding: 9px 10px;
    font-size: 0.82rem;
    color: var(--text);
    vertical-align: middle;
}
#moduloFinanzasTaller .fin-table td.fin-money {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right;
}
#moduloFinanzasTaller .fin-table td.fin-total {
    font-weight: 900;
    color: var(--primary, #5865F2);
    text-align: right;
}
#moduloFinanzasTaller .fin-badge-prev {
    display: inline-block;
    background: rgba(88,101,242,0.12);
    color: #5865F2;
    border-radius: 4px;
    font-size: 0.70rem; font-weight: 700;
    padding: 1px 6px;
}
#moduloFinanzasTaller .fin-badge-corr {
    display: inline-block;
    background: rgba(249,115,22,0.12);
    color: #F97316;
    border-radius: 4px;
    font-size: 0.70rem; font-weight: 700;
    padding: 1px 6px;
}
#moduloFinanzasTaller .fin-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--subtext);
    font-size: 0.85rem;
}
</style>

<div id="moduloFinanzasTaller">

    <!-- Cards resumen -->
    <div class="fin-cards" id="finCards">
        <div class="fin-card fin-green">
            <div class="fin-card-label">Costo Total Global</div>
            <div class="fin-card-value" id="finCardTotal">S/. 0.00</div>
        </div>
        <div class="fin-card fin-blue">
            <div class="fin-card-label">Inversión Preventivos</div>
            <div class="fin-card-value" id="finCardPrev">S/. 0.00</div>
        </div>
        <div class="fin-card fin-orange">
            <div class="fin-card-label">Inversión Correctivos</div>
            <div class="fin-card-value" id="finCardCorr">S/. 0.00</div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="fin-filters">
        <div class="fin-filter-group">
            <label for="finFiltroTipo">Tipo OT</label>
            <select id="finFiltroTipo" onchange="finFiltrar()">
                <option value="">Todos los Tipos</option>
                <option value="Preventivo">Preventivo</option>
                <option value="Correctivo">Correctivo</option>
            </select>
        </div>
        <div class="fin-filter-group">
            <label for="finFiltroPLaca">Placa</label>
            <input type="text" id="finFiltroPlaca" placeholder="Ej: ABC-123" oninput="finFiltrar()" style="max-width:110px;">
        </div>
        <div class="fin-filter-group">
            <label for="finFiltroMes">Mes</label>
            <input type="month" id="finFiltroMes" onchange="finFiltrar()">
        </div>
        <div class="fin-filter-group">
            <label for="finFiltroDesdeFecha">Desde</label>
            <input type="date" id="finFiltroDesdeFecha" onchange="finFiltrar()">
        </div>
        <div class="fin-filter-group">
            <label for="finFiltroHastaFecha">Hasta</label>
            <input type="date" id="finFiltroHastaFecha" onchange="finFiltrar()">
        </div>
        <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="finLimpiarFiltros()" title="Limpiar filtros">
            <i class="bi bi-x-circle me-1"></i>Limpiar
        </button>
    </div>

    <!-- Tabla -->
    <div class="fin-table-section">
        <div class="fin-table-header">
            <h6><i class="bi bi-table me-1"></i>Desglose de Costos por OT <span style="color:var(--subtext);font-weight:400;">(Solo Aprobados)</span></h6>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-success" onclick="finExportarExcel()">
                    <i class="bi bi-file-earmark-spreadsheet me-1"></i>Exportar a Excel
                </button>
                <button class="btn btn-sm btn-primary" onclick="finExportarPDF()">
                    <i class="bi bi-file-earmark-pdf me-1"></i>PDF Contable
                </button>
            </div>
        </div>
        <div class="fin-table-wrap">
            <table class="fin-table" id="finTabla">
                <thead>
                    <tr>
                        <th>N° OT</th>
                        <th>Placa</th>
                        <th>Tipo OT</th>
                        <th style="text-align:right;">Costo Mano de Obra</th>
                        <th style="text-align:right;">Costo Repuestos</th>
                        <th style="text-align:right;">Costo Total</th>
                    </tr>
                </thead>
                <tbody id="finTbody">
                    <tr>
                        <td colspan="6" class="fin-empty">
                            <span class="spinner-border spinner-border-sm me-2"></span>
                            Cargando datos…
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
