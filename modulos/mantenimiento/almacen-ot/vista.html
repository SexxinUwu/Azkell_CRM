<!-- Módulo Almacén OT (Req/Salidas) — Azkell Fleet -->
<style>
#moduloAlmacenOT {
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
}

/* Tabs */
#moduloAlmacenOT .aot-tabs {
    display: flex;
    gap: 1.5rem;
    padding: 0 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}
#moduloAlmacenOT .aot-tab {
    padding: 12px 0;
    font-size: 0.83rem;
    font-weight: 700;
    color: var(--subtext);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: color 0.15s;
    white-space: nowrap;
}
#moduloAlmacenOT .aot-tab:hover { color: var(--text); }
#moduloAlmacenOT .aot-tab.active {
    color: var(--primary, #5865F2);
    border-bottom-color: var(--primary, #5865F2);
}
#moduloAlmacenOT .aot-tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    background: var(--surface2, var(--bg));
    border: 1px solid var(--border);
    border-radius: 9px;
    font-size: 0.68rem;
    font-weight: 800;
    margin-left: 5px;
    color: var(--subtext);
    padding: 0 4px;
}
#moduloAlmacenOT .aot-tab.active .aot-tab-badge {
    background: rgba(88,101,242,0.12);
    border-color: rgba(88,101,242,0.3);
    color: var(--primary, #5865F2);
}

/* Controles */
#moduloAlmacenOT .aot-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.6rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}
#moduloAlmacenOT .aot-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.45rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}

/* Tabla */
#moduloAlmacenOT .aot-table-wrap { flex: 1 1 0; overflow-y: auto; background: var(--surface); }
#moduloAlmacenOT table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
#moduloAlmacenOT thead th {
    background: var(--bg);
    color: var(--subtext);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
    white-space: nowrap;
}
#moduloAlmacenOT tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
#moduloAlmacenOT tbody tr:hover { background: var(--bg); }
#moduloAlmacenOT tbody tr.aot-row-active { background: rgba(88,101,242,0.06); border-left: 3px solid var(--primary, #5865F2); }
#moduloAlmacenOT tbody td { padding: 10px 12px; color: var(--text); }
#moduloAlmacenOT .td-placeholder { text-align: center; color: var(--subtext); font-size: 0.82rem; padding: 2rem; }

/* Badges */
#moduloAlmacenOT .aot-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; white-space: nowrap;
}
#moduloAlmacenOT .aot-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.8; }
#moduloAlmacenOT .badge-pendiente  { background: rgba(217,119,6,0.12); color: #d97706; }
#moduloAlmacenOT .badge-despachado { background: rgba(22,163,74,0.12);  color: #16a34a; }
#moduloAlmacenOT .badge-anulado    { background: rgba(220,38,38,0.1);   color: #dc2626; }

/* Panel lateral detalle */
#moduloAlmacenOT .aot-detail-panel {
    width: 0; flex-shrink: 0; overflow: hidden;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width 0.25s; max-width: 380px;
}
#moduloAlmacenOT .aot-detail-panel.open { width: 380px; }
#moduloAlmacenOT .aot-detail-scroll { flex: 1; overflow-y: auto; padding: 1.25rem; }
#moduloAlmacenOT .aot-detail-footer {
    padding: 0.75rem 1rem; border-top: 1px solid var(--border);
    display: flex; gap: 0.5rem; flex-wrap: wrap;
}

/* Secciones detalle */
#moduloAlmacenOT .aot-sec { border: 1px solid var(--border); border-radius: 8px; margin-top: 1rem; overflow: hidden; }
#moduloAlmacenOT .aot-sec-hd {
    background: var(--bg); padding: 8px 12px; font-size: 0.73rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--subtext); border-bottom: 1px solid var(--border);
}
#moduloAlmacenOT .aot-field { display: flex; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
#moduloAlmacenOT .aot-field:last-child { border-bottom: none; }
#moduloAlmacenOT .aot-field-lbl { width: 40%; color: var(--subtext); font-weight: 600; font-size: 0.78rem; }
#moduloAlmacenOT .aot-field-val { width: 60%; color: var(--text); font-weight: 600; word-break: break-word; }

/* Drawer Nueva Solicitud */
#aotNuevoBackdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 1059; }
#aotNuevoBackdrop.open { display: block; }
#moduloAlmacenOT .aot-drawer {
    position: fixed; top: 0; right: 0; width: 560px; max-width: 96vw; height: 100vh;
    background: var(--surface); border-left: 1px solid var(--border);
    box-shadow: -8px 0 30px rgba(0,0,0,0.14);
    transform: translateX(100%); transition: transform 0.28s ease; z-index: 1060;
    display: flex; flex-direction: column;
}
#moduloAlmacenOT .aot-drawer.open { transform: translateX(0); }
#moduloAlmacenOT .aot-drawer-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.25rem; height: 52px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#moduloAlmacenOT .aot-drawer-title { font-size: 0.95rem; font-weight: 800; color: var(--text); }
#moduloAlmacenOT .aot-drawer-body { flex: 1; overflow-y: auto; padding: 1.25rem; }
</style>

<!-- Backdrop -->
<div id="aotNuevoBackdrop" onclick="window.aotCerrarNuevo()"></div>

<div id="moduloAlmacenOT">

    <!-- TABS -->
    <div class="aot-tabs">
        <div class="aot-tab active" id="aot-tab-pend" onclick="window.aotCambiarTab('pend')">
            Solicitudes Pendientes
            <span class="aot-tab-badge" id="aot-badge-pend">0</span>
        </div>
        <div class="aot-tab" id="aot-tab-desp" onclick="window.aotCambiarTab('desp')">
            Salidas (Despachadas)
            <span class="aot-tab-badge" id="aot-badge-desp">0</span>
        </div>
        <div class="aot-tab" id="aot-tab-anulado" onclick="window.aotCambiarTab('anulado')">
            Anuladas
            <span class="aot-tab-badge" id="aot-badge-anulado">0</span>
        </div>
    </div>

    <!-- FILA 1: Buscador + acciones -->
    <div class="aot-controls">
        <div class="input-group input-group-sm" style="max-width:260px;">
            <span class="input-group-text bg-transparent border-end-0">
                <i class="bi bi-search" style="color:var(--subtext)"></i>
            </span>
            <input type="text" class="form-control border-start-0 ps-0"
                id="aot-search"
                placeholder="Buscar por Artículo, N° OT, Placa…"
                oninput="window.aotFiltrar()">
        </div>
        <input type="text" class="form-control form-control-sm" id="aot-fil-ot"
            placeholder="N° OT" style="max-width:110px"
            oninput="window.aotFiltrar()">
        <input type="text" class="form-control form-control-sm" id="aot-fil-placa"
            placeholder="PLACA" style="max-width:100px; text-transform:uppercase"
            oninput="this.value=this.value.toUpperCase(); window.aotFiltrar()">
        <input type="month" class="form-control form-control-sm" id="aot-fil-mes"
            style="max-width:150px" onchange="window.aotFiltrar()">
        <input type="date" class="form-control form-control-sm" id="aot-fil-desde"
            style="max-width:150px" title="Desde" onchange="window.aotFiltrar()">
        <input type="date" class="form-control form-control-sm" id="aot-fil-hasta"
            style="max-width:150px" title="Hasta" onchange="window.aotFiltrar()">
        <div style="flex:1"></div>
        <button class="btn btn-sm btn-outline-secondary" onclick="window.aotCargar()" title="Actualizar">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
    </div>

    <!-- FILA 2: Estado + Exportar + Nueva Solicitud -->
    <div class="aot-filters">
        <select class="form-select form-select-sm" id="aot-fil-estado"
            onchange="window.aotFiltrar()" style="max-width:200px">
            <option value="">Todos los estados</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Despachado">Despachado</option>
            <option value="Anulado">Anulado</option>
        </select>
        <div style="flex:1"></div>
        <button class="btn btn-sm btn-success" onclick="window.aotExportar()">
            <i class="bi bi-file-earmark-excel me-1"></i>Exportar a Excel
        </button>
        <button class="btn btn-sm btn-primary" onclick="window.aotAbrirNuevo()">
            <i class="bi bi-plus-lg me-1"></i>Nueva Solicitud
        </button>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div style="display:flex; flex:1 1 0; min-height:0; overflow:hidden;">

        <!-- TABLA -->
        <div class="aot-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID SOLICITUD</th>
                        <th>N° OT</th>
                        <th>PLACA</th>
                        <th>RESPONSABLE</th>
                        <th>ARTÍCULOS</th>
                        <th>TOTAL</th>
                        <th>ESTADO</th>
                    </tr>
                </thead>
                <tbody id="aot-tbody"></tbody>
            </table>
        </div>

        <!-- PANEL DETALLE LATERAL -->
        <div class="aot-detail-panel" id="aot-panel-detalle">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:0 1rem; height:48px; border-bottom:1px solid var(--border); flex-shrink:0;">
                <span style="font-size:0.88rem; font-weight:800; color:var(--text);" id="aot-detalle-titulo">Detalle Solicitud</span>
                <button class="btn btn-sm" onclick="window.aotCerrarDetalle()" style="color:var(--subtext);">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="aot-detail-scroll" id="aot-detalle-scroll"></div>
            <div class="aot-detail-footer" id="aot-detalle-footer" style="display:none;"></div>
        </div>

    </div>

    <!-- DRAWER: Nueva Solicitud -->
    <div class="aot-drawer" id="aot-drawer-nuevo">
        <div class="aot-drawer-hd">
            <span class="aot-drawer-title">Nueva Solicitud de Materiales</span>
            <button class="btn btn-sm" onclick="window.aotCerrarNuevo()" style="color:var(--subtext)">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="aot-drawer-body">

            <!-- Cabecera del documento -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label fw-bold" style="font-size:0.78rem; color:var(--subtext); text-transform:uppercase; letter-spacing:0.04em;">N° OT *</label>
                    <input type="text" class="form-control form-control-sm" id="aot-f-ot"
                        placeholder="Ej. OT-2026-0001">
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold" style="font-size:0.78rem; color:var(--subtext); text-transform:uppercase; letter-spacing:0.04em;">Fecha *</label>
                    <input type="date" class="form-control form-control-sm" id="aot-f-fecha">
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold" style="font-size:0.78rem; color:var(--subtext); text-transform:uppercase; letter-spacing:0.04em;">Tipo Destino</label>
                    <select class="form-select form-select-sm" id="aot-f-tipo" onchange="window.aotToggleTipo()">
                        <option value="Vehiculo">Vehículo</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>
                <div class="col-6" id="aot-row-placa">
                    <label class="form-label fw-bold" style="font-size:0.78rem; color:var(--subtext); text-transform:uppercase; letter-spacing:0.04em;">Placa</label>
                    <div id="ss-W-aot-placa" class="ss-wrapper" style="position:relative;"><div id="ss-B-aot-placa" class="form-select form-select-sm ss-box border-primary shadow-sm" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;" onclick="window.SS.toggle('aot-placa')"><span id="ss-L-aot-placa" class="ss-lbl" style="color:#6c757d;font-size:0.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">Buscar placa…</span><i class="bi bi-chevron-down" style="flex-shrink:0;font-size:0.7rem;margin-left:4px;"></i></div><input type="hidden" id="aot-f-placa" name="aot-f-placa"><div id="ss-D-aot-placa" class="ss-dropdown" style="display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:3000;background:var(--card,#fff);border:1px solid var(--primary,#5865F2);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.18);"><div style="padding:6px 6px 3px;"><input type="text" id="ss-S-aot-placa" class="form-control form-control-sm ss-search" placeholder="Buscar placa..." oninput="window.SS.filter(this.value,'aot-placa')" autocomplete="off" style="border-color:var(--primary,#5865F2);"></div><div id="ss-O-aot-placa" class="ss-options" style="max-height:200px;overflow-y:auto;"></div></div></div>
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold" style="font-size:0.78rem; color:var(--subtext); text-transform:uppercase; letter-spacing:0.04em;">Responsable</label>
                    <input type="text" class="form-control form-control-sm" id="aot-f-responsable"
                        placeholder="Nombre del responsable / solicitante">
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold" style="font-size:0.78rem; color:var(--subtext); text-transform:uppercase; letter-spacing:0.04em;">Observaciones</label>
                    <input type="text" class="form-control form-control-sm" id="aot-f-obs"
                        placeholder="Motivo, referencia, notas…">
                </div>
            </div>

            <hr style="border-color:var(--border);">

            <!-- Grid de artículos -->
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-bold" style="font-size:0.83rem; color:var(--text);">
                    <i class="bi bi-list-ul me-1"></i>Artículos
                </span>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="window._aotAgregarItem()">
                    <i class="bi bi-plus"></i> Agregar
                </button>
            </div>
            <div style="overflow-x:auto;">
                <table class="table table-sm table-bordered" style="font-size:0.8rem; min-width:480px;">
                    <thead style="background:var(--bg);">
                        <tr>
                            <th style="min-width:220px;">Artículo</th>
                            <th style="width:80px;">Cantidad</th>
                            <th style="width:110px;">Costo Unit.</th>
                            <th style="width:100px;">Importe</th>
                            <th style="width:38px;"></th>
                        </tr>
                    </thead>
                    <tbody id="aot-items-tbody"></tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" style="text-align:right; font-weight:700; font-size:0.82rem; color:var(--subtext);">Total:</td>
                            <td style="font-weight:800; color:#16a34a;" id="aot-items-total">S/. 0.00</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <datalist id="aot-inv-list"></datalist>

            <button class="btn btn-primary w-100 fw-bold mt-3" onclick="window.aotGuardarNuevo()">
                <i class="bi bi-save me-1"></i>Guardar Solicitud
            </button>

        </div>
    </div>

</div>
