<!-- MÓDULO: PRODUCTIVIDAD PERSONAL — Azkell Fleet                   -->
<!-- Ruta: mantenimiento/productividad                                -->
<!-- ================================================================ -->
<style>
#moduloProductividad {
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
}

/* ── Barra de controles ── */
#moduloProductividad .prod-controls {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}
#moduloProductividad .prod-controls-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.6rem;
}
#moduloProductividad .prod-controls-row .prod-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--subtext);
    white-space: nowrap;
}
#moduloProductividad .prod-controls-row input[type="time"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-size: 0.83rem;
    padding: 5px 8px;
    min-width: 110px;
}
#moduloProductividad .prod-controls-row input[type="time"]:focus {
    outline: none;
    border-color: var(--primary, #5865F2);
    box-shadow: 0 0 0 2px rgba(88,101,242,0.15);
}

/* ── Área de tabla ── */
#moduloProductividad .prod-table-wrap {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    padding: 1rem 1.25rem;
}
#moduloProductividad .prod-table {
    width: 100%;
    border-collapse: collapse;
}
#moduloProductividad .prod-table thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    font-size: 0.70rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--subtext);
    padding: 9px 12px;
    white-space: nowrap;
    z-index: 1;
}
#moduloProductividad .prod-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
}
#moduloProductividad .prod-table tbody tr:hover {
    background: rgba(88,101,242,0.04);
}
#moduloProductividad .prod-table tbody td {
    padding: 10px 12px;
    font-size: 0.84rem;
    color: var(--text);
    vertical-align: middle;
}
#moduloProductividad .prod-table td.prod-num {
    font-weight: 700;
    color: var(--primary, #5865F2);
    text-align: center;
}
#moduloProductividad .prod-table td.prod-hrs {
    font-weight: 700;
    color: #22C55E;
    text-align: center;
}
#moduloProductividad .prod-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(88,101,242,0.15);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 800;
    color: var(--primary, #5865F2);
    margin-right: 8px;
    flex-shrink: 0;
}
#moduloProductividad .prod-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--subtext);
    font-size: 0.85rem;
}
</style>

<div id="moduloProductividad">

    <!-- Barra de controles -->
    <div class="prod-controls">

        <!-- Fila 1: buscador + refrigerio + PDF -->
        <div class="prod-controls-row">
            <div class="input-group input-group-sm" style="max-width:220px;">
                <span class="input-group-text border-end-0 bg-transparent">
                    <i class="bi bi-search" style="color:var(--subtext);"></i>
                </span>
                <input type="text" class="form-control border-start-0 ps-0"
                    id="prodBuscador"
                    placeholder="Buscar mecánico..."
                    oninput="prodFiltrar()">
            </div>

            <span class="prod-label">Inicio Refrigerio:</span>
            <input type="time" id="prodRefInicio" value="13:00" onchange="prodRenderTabla()">

            <span class="prod-label">Fin Refrigerio:</span>
            <input type="time" id="prodRefFin" value="14:00" onchange="prodRenderTabla()">

            <button class="btn btn-sm btn-primary ms-auto" onclick="prodExportarPDF()">
                <i class="bi bi-file-earmark-pdf me-1"></i>PDF Productividad
            </button>
        </div>

        <!-- Fila 2: Excel -->
        <div class="prod-controls-row">
            <button class="btn btn-sm btn-success" onclick="prodExportarExcel()">
                <i class="bi bi-file-earmark-spreadsheet me-1"></i>Exportar a Excel
            </button>
            <span style="font-size:0.73rem; color:var(--subtext); margin-left:auto;" id="prodResumen"></span>
        </div>

    </div>

    <!-- Tabla -->
    <div class="prod-table-wrap">
        <table class="prod-table" id="prodTabla">
            <thead>
                <tr>
                    <th>Trabajador / Técnico</th>
                    <th style="text-align:center;">Total Trabajos Asignados</th>
                    <th style="text-align:center;">Horas Efectivas Acumuladas</th>
                </tr>
            </thead>
            <tbody id="prodTbody">
                <tr>
                    <td colspan="3" class="prod-empty">
                        <span class="spinner-border spinner-border-sm me-2"></span>
                        Cargando datos…
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
