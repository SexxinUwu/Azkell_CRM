<!-- ================================================================ -->
<!-- MÓDULO: PRODUCTIVIDAD PERSONAL — Azkell Fleet                   -->
<!-- Ruta: mantenimiento/productividad                                -->
<!-- ================================================================ -->
<style>
#moduloProductividad {
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
}

/* ── Barra de controles ── */
#moduloProductividad .prod-controls {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.6rem;
    padding: 0.6rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}
#moduloProductividad .prod-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--subtext);
    white-space: nowrap;
}
#moduloProductividad .prod-controls input[type="time"],
#moduloProductividad .prod-controls input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-size: 0.83rem;
    padding: 5px 8px;
}
#moduloProductividad .prod-controls input:focus {
    outline: none;
    border-color: var(--primary, #5865F2);
    box-shadow: 0 0 0 2px rgba(88,101,242,0.15);
}

/* ── Contenedor principal ── */
#moduloProductividad .prod-main {
    display: flex;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
}

/* ── Tabla ── */
#moduloProductividad .prod-table-wrap {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    background: var(--surface);
}
#moduloProductividad .prod-table {
    width: 100%;
    border-collapse: collapse;
}
#moduloProductividad .prod-table thead th {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 0.70rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--subtext);
    padding: 10px 12px;
    white-space: nowrap;
    z-index: 1;
}
#moduloProductividad .prod-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
}
#moduloProductividad .prod-row:hover { background: var(--bg); }
#moduloProductividad .prod-row.prod-row-active {
    background: rgba(88,101,242,0.06);
    border-left: 3px solid var(--primary, #5865F2);
}
#moduloProductividad .prod-table tbody td {
    padding: 11px 12px;
    font-size: 0.84rem;
    color: var(--text);
    vertical-align: middle;
}
#moduloProductividad .prod-table td.prod-num {
    font-weight: 700;
    color: var(--primary, #5865F2);
    text-align: center;
}
#moduloProductividad .prod-table td.prod-hrs {
    font-weight: 700;
    color: #22C55E;
    text-align: center;
}
#moduloProductividad .prod-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(88,101,242,0.15);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 800;
    color: var(--primary, #5865F2);
    margin-right: 8px;
    flex-shrink: 0;
}
#moduloProductividad .prod-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--subtext);
    font-size: 0.85rem;
}

/* ── Panel detalle lateral ── */
#moduloProductividad .prod-detail-panel {
    width: 0; flex-shrink: 0; overflow: hidden;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width 0.25s; max-width: 380px;
}
#moduloProductividad .prod-detail-panel.open { width: 380px; }
#moduloProductividad .prod-detail-scroll { flex: 1; overflow-y: auto; padding: 1.25rem; }
</style>

<div id="moduloProductividad">

    <!-- Botón volver a Otros -->
    <div style="padding:.5rem 1.25rem .1rem;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);">
        <button onclick="cargarModuloAislado('mantenimiento/otros')"
                style="background:none;border:none;font-size:.8rem;font-weight:700;color:var(--subtext);cursor:pointer;display:inline-flex;align-items:center;gap:.2rem;padding:.3rem .5rem;border-radius:8px;transition:background .15s,color .15s;"
                onmouseover="this.style.background='var(--bg)';this.style.color='var(--text)'"
                onmouseout="this.style.background='none';this.style.color='var(--subtext)'">
            <i class="bi bi-arrow-left-short" style="font-size:1.1rem;"></i>Otros
        </button>
    </div>

    <!-- Barra de controles -->
    <div class="prod-controls">
        <!-- Buscador -->
        <div class="input-group input-group-sm" style="max-width:200px;">
            <span class="input-group-text border-end-0 bg-transparent">
                <i class="bi bi-search" style="color:var(--subtext);"></i>
            </span>
            <input type="text" class="form-control border-start-0 ps-0"
                id="prodBuscador"
                placeholder="Buscar mecánico..."
                oninput="window.prodFiltrar()">
        </div>

        <!-- Filtro por día -->
        <span class="prod-label">Día:</span>
        <input type="date" id="prodFecha" onchange="window.prodAplicarFiltros()" style="max-width:160px;">

        <!-- Refrigerio -->
        <span class="prod-label">Inicio refrigerio:</span>
        <input type="time" id="prodRefInicio" value="13:00" onchange="window.prodRenderTabla()" style="max-width:110px;">
        <span class="prod-label">Fin:</span>
        <input type="time" id="prodRefFin" value="14:00" onchange="window.prodRenderTabla()" style="max-width:110px;">

        <button class="btn btn-sm btn-outline-secondary ms-1" onclick="window.prodCargar()" title="Actualizar">
            <i class="bi bi-arrow-clockwise"></i>
        </button>

        <div style="flex:1"></div>

        <span style="font-size:0.73rem; color:var(--subtext);" id="prodResumen"></span>
        <button class="btn btn-sm btn-success" onclick="window.prodExportarExcel()">
            <i class="bi bi-file-earmark-spreadsheet me-1"></i>Exportar a Excel
        </button>
        <button class="btn btn-sm btn-primary" onclick="window.prodExportarPDF()">
            <i class="bi bi-file-earmark-pdf me-1"></i>PDF Productividad
        </button>
    </div>

    <!-- Contenedor principal -->
    <div class="prod-main">

        <!-- Tabla resumen -->
        <div class="prod-table-wrap">
            <table class="prod-table" id="prodTabla">
                <thead>
                    <tr>
                        <th>Trabajador / Técnico</th>
                        <th style="text-align:center;">Total Trabajos</th>
                        <th style="text-align:center;">Horas Efectivas</th>
                        <th style="min-width:160px;">Progreso (meta 9h)</th>
                    </tr>
                </thead>
                <tbody id="prodTbody">
                    <tr>
                        <td colspan="4" class="prod-empty">
                            <span class="spinner-border spinner-border-sm me-2"></span>
                            Cargando datos…
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Panel detalle lateral -->
        <div class="prod-detail-panel" id="prod-panel-detalle">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:0 1rem; height:48px; border-bottom:1px solid var(--border); flex-shrink:0;">
                <div>
                    <div style="font-size:0.88rem; font-weight:800; color:var(--text);" id="prod-det-titulo">Detalle</div>
                    <div style="font-size:0.72rem; color:var(--subtext);" id="prod-det-sub"></div>
                </div>
                <button class="btn btn-sm" onclick="window.prodCerrarDetalle()" style="color:var(--subtext);">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="prod-detail-scroll" id="prod-det-scroll"></div>
        </div>

    </div>

</div>
