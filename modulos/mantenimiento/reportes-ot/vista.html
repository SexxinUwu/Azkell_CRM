<!-- Módulo Reportes OT — Azkell Fleet -->
<style>
#moduloReportesOT {
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
}

/* ── Barra de búsqueda libre ─────────────────────────────────── */
#moduloReportesOT .rot-search-bar {
    padding: 0.65rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

/* ── Fila de filtros ──────────────────────────────────────────── */
#moduloReportesOT .rot-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.45rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}

/* ── KPI bar ──────────────────────────────────────────────────── */
#moduloReportesOT .rot-kpi-bar {
    display: flex;
    gap: 1rem;
    padding: 0.65rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}
#moduloReportesOT .rot-kpi {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 16px;
    min-width: 120px;
    display: flex;
    flex-direction: column;
    gap: 2px;
}
#moduloReportesOT .rot-kpi-lbl { font-size: 0.67rem; font-weight: 700; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.05em; }
#moduloReportesOT .rot-kpi-val { font-size: 1.4rem; font-weight: 800; color: var(--text); line-height: 1.2; }

/* ── Tabla ────────────────────────────────────────────────────── */
#moduloReportesOT .rot-table-wrap {
    flex: 1 1 0;
    overflow-y: auto;
    background: var(--surface);
}
#moduloReportesOT table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
}
#moduloReportesOT thead th {
    background: var(--bg);
    color: var(--subtext);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
    white-space: nowrap;
}
#moduloReportesOT tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
}
#moduloReportesOT tbody tr:hover { background: var(--bg); }
#moduloReportesOT tbody tr.rot-row-activa {
    background: rgba(88,101,242,0.06);
    border-left: 3px solid var(--primary, #5865F2);
}
#moduloReportesOT tbody td { padding: 10px 12px; color: var(--text); }
#moduloReportesOT .td-empty { text-align:center; color:var(--subtext); font-size:0.82rem; padding:2rem; }

/* ── Badges de estado ─────────────────────────────────────────── */
#moduloReportesOT .rot-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    white-space: nowrap;
}
#moduloReportesOT .rot-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.8;
}
#moduloReportesOT .rot-b-pendiente   { background: rgba(217,119,6,0.12);  color: #d97706; }
#moduloReportesOT .rot-b-aprobada    { background: rgba(22,163,74,0.12);   color: #16a34a; }
#moduloReportesOT .rot-b-cerrada     { background: rgba(88,101,242,0.12);  color: var(--primary, #5865F2); }
#moduloReportesOT .rot-b-anulado     { background: rgba(220,38,38,0.12);   color: #dc2626; }
#moduloReportesOT .rot-b-en-atencion { background: rgba(22,163,74,0.1);   color: #16a34a; }
#moduloReportesOT .rot-b-espera      { background: rgba(217,119,6,0.1);   color: #d97706; }
#moduloReportesOT .rot-b-tipo-prev   { background: rgba(8,145,178,0.1);   color: #0891b2; border:1px solid rgba(8,145,178,0.25); }
#moduloReportesOT .rot-b-tipo-corr   { background: rgba(220,38,38,0.08);  color: #dc2626; border:1px solid rgba(220,38,38,0.2); }

/* ── Drawer lateral de detalle ────────────────────────────────── */
#rotDrawerBackdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 1059;
}
#rotDrawerBackdrop.open { display: block; }

.rot-drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 500px;
    max-width: 96vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: -8px 0 30px rgba(0,0,0,0.14);
    transform: translateX(100%);
    transition: transform 0.28s ease;
    z-index: 1060;
    display: flex;
    flex-direction: column;
}
.rot-drawer.open { transform: translateX(0); }
.rot-drawer-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.25rem;
    height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.rot-drawer-title { font-size: 0.95rem; font-weight: 800; color: var(--text); }
.rot-drawer-body  { flex: 1; overflow-y: auto; padding: 1.25rem; }
.rot-drawer-footer {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
}

/* Secciones en el drawer */
#moduloReportesOT .rot-sec,
.rot-sec {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 1rem;
    overflow: hidden;
}
.rot-sec-hd {
    background: var(--bg);
    padding: 7px 12px;
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--subtext);
    border-bottom: 1px solid var(--border);
}
.rot-field { display: flex; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
.rot-field:last-child { border-bottom: none; }
.rot-field-lbl { width: 40%; color: var(--subtext); font-weight: 600; font-size: 0.77rem; padding-right: 6px; }
.rot-field-val { width: 60%; color: var(--text); font-weight: 600; word-break: break-word; }

/* OT ID bar en drawer */
.rot-id-bar {
    background: rgba(88,101,242,0.06);
    border: 1px solid rgba(88,101,242,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.rot-id-num { font-size: 1.1rem; font-weight: 800; color: var(--primary, #5865F2); }
.rot-id-lbl { font-size: 0.7rem; font-weight: 700; color: var(--primary, #5865F2); text-transform: uppercase; }

/* Sub-drawers (encima del drawer principal) */
.rot-sub-drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 440px;
    max-width: 96vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: -8px 0 40px rgba(0,0,0,0.22);
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 1062;
    display: flex;
    flex-direction: column;
}
.rot-sub-drawer.open { transform: translateX(0); }
</style>
