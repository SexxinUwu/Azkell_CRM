<style>
  /* Mobile Bottom Sheet for Kits Modal */
  @media (max-width: 767.98px) {
    #kitsModal .modal-dialog {
      margin: 0;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 100%;
      /* Disable bootstrap default fade transform */
      transform: translateY(100%) !important;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
    }
    #kitsModal.show .modal-dialog {
      transform: translateY(0) !important;
    }
    #kitsModal .modal-content {
      border-radius: 28px 28px 0 0;
      border: none;
      height: 90vh; /* Takes most of the screen */
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #kitsModal .modal-body {
      flex: 1 1 auto;
      overflow-y: auto;
    }
  }
</style>

<div class="d-flex flex-column flex-1 min-h-0" style="height:100%; overflow:hidden">

  <!-- ── HEADER ────────────────────────────────────────────────── -->
  <div class="d-flex align-items-center justify-content-between px-3 py-2 flex-shrink-0"
       style="border-bottom:1px solid var(--border); background:var(--surface)">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-tools text-primary" style="font-size:1.1rem"></i>
      <span class="fw-bold" style="font-size:1rem">Kits de Mantenimiento</span>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-reload-cache" title="Actualizar"
              onclick="window.kitsCargarTabla()">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <!-- Importar -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-info fw-bold dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <i class="bi bi-upload"></i> <span class="d-none d-md-inline">Importar</span>
        </button>
        <ul class="dropdown-menu shadow">
          <li><a class="dropdown-item fw-bold text-success" href="#" onclick="window.kitsDescargarPlantilla()"><i class="bi bi-file-earmark-spreadsheet me-1"></i>1. Descargar Plantilla</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item fw-bold text-primary" href="#" onclick="document.getElementById('inputFileKits').click()"><i class="bi bi-cloud-upload me-1"></i>2. Subir Excel Lleno</a></li>
        </ul>
      </div>
      <input type="file" id="inputFileKits" accept=".xlsx,.xls" style="display:none;" onchange="window.kitsImportarExcel(event)">
      <!-- Exportar -->
      <button class="btn btn-sm btn-outline-success fw-bold" onclick="window.kitsExportarExcel()">
        <i class="bi bi-file-earmark-excel"></i> <span class="d-none d-md-inline">Excel</span>
      </button>
      <button class="btn btn-sm btn-primary fw-bold" onclick="window.kitsAbrirModal()">
        <i class="bi bi-plus-lg me-1"></i>Nuevo Ítem de Kit
      </button>
    </div>
  </div>

  <!-- ── FILTROS ───────────────────────────────────────────────── -->
  <div class="d-flex align-items-center gap-2 px-3 py-2 flex-shrink-0"
       style="border-bottom:1px solid var(--border); background:var(--surface); flex-wrap:wrap">
    <div class="position-relative" style="max-width:150px;">
      <input type="text" id="kits-fil-marca-txt" class="form-control form-control-sm" placeholder="Todas las marcas"
        autocomplete="off" oninput="window._cbFiltrarFilter('kits-fil-marca')"
        onfocus="window._cbFiltrar('kits-fil-marca')" onblur="window._cbHideFilter('kits-fil-marca')">
      <input type="hidden" id="kits-fil-marca">
      <div id="kits-fil-marca-dd" class="cb-dropdown"></div>
    </div>
    <div class="position-relative" style="max-width:150px;">
      <input type="text" id="kits-fil-tipo-txt" class="form-control form-control-sm" placeholder="Todo MP"
        autocomplete="off" oninput="window._cbFiltrarFilter('kits-fil-tipo')"
        onfocus="window._cbFiltrar('kits-fil-tipo')" onblur="window._cbHideFilter('kits-fil-tipo')">
      <input type="hidden" id="kits-fil-tipo">
      <div id="kits-fil-tipo-dd" class="cb-dropdown"></div>
    </div>
  </div>

  <!-- ── TABLA ─────────────────────────────────────────────────── -->
  <div class="flex-1 overflow-auto px-2 py-2">
    <table class="table table-sm table-hover align-middle w-100" style="font-size:0.82rem">
      <thead style="position:sticky; top:0; background:var(--surface); z-index:1">
        <tr style="border-bottom:2px solid var(--border)">
          <th></th><th></th>
          <th style="min-width:160px">Ítem</th>
          <th>Cant.</th><th>Unidad</th>
          <th>C.Unit.</th><th>C.Total</th><th></th>
        </tr>
      </thead>
      <tbody id="kits-tbody">
        <tr><td colspan="8" class="text-center py-4" style="color:var(--subtext)">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- ======= MODAL KIT MP ======= -->
<div class="modal fade" id="kitsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content" style="background:var(--surface); color:var(--text)">
      <div class="modal-header" style="border-bottom:1px solid var(--border)">
        <h5 class="modal-title fw-bold" id="kitsModal-titulo">
          <i class="bi bi-tools me-1 text-primary"></i>Configurar Kit de Mantenimiento
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <datalist id="kits-dl-marcas"></datalist>
        <div class="p-3" style="background:var(--bg); border-bottom:1px solid var(--border);">
          <div class="row g-3">
            <div class="col-sm-4">
              <label class="form-label fw-bold" style="font-size:0.8rem">Marca Vehículo *</label>
              <input type="text" class="form-control fw-bold text-uppercase" id="kits-marca"
                     placeholder="Ej: VOLVO" list="kits-dl-marcas" autocomplete="off">
            </div>
            <div class="col-sm-8">
              <label class="form-label fw-bold" style="font-size:0.8rem">Tipo de Mantenimiento *</label>
              <div class="position-relative">
                <input type="text" id="kits-tipomp-txt" class="form-control fw-bold text-uppercase"
                       placeholder="Ej: MP1" autocomplete="off"
                       oninput="window._cbFiltrar('kits-tipomp')"
                       onfocus="window._cbFiltrar('kits-tipomp')"
                       onblur="window._kitsHideCombo('kits-tipomp')">
                <input type="hidden" id="kits-tipomp">
                <div id="kits-tipomp-dd" class="cb-dropdown"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="p-3">
          <div class="d-flex justify-content-between align-items-end mb-2">
            <label class="form-label fw-bold mb-0" style="font-size:0.85rem">Artículos del Kit</label>
            <button type="button" class="btn btn-sm btn-outline-primary fw-bold" onclick="window.kitsAgregarFila()">
              <i class="bi bi-plus-lg me-1"></i>Añadir Ítem
            </button>
          </div>
          <div class="table-responsive" style="padding-bottom: 150px; min-height: 250px; border-radius:12px; border:1px solid var(--border); overflow-x:auto; -webkit-overflow-scrolling:touch;">
            <table class="table table-sm align-middle mb-0" style="font-size:0.8rem; min-width:480px;">
              <thead style="background:var(--bg);">
                <tr>
                  <th style="min-width:200px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--subtext);">Artículo</th>
                  <th style="width:70px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;font-weight:800;color:var(--subtext);">Cant.</th>
                  <th style="width:70px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;font-weight:800;color:var(--subtext);">Unid.</th>
                  <th style="width:90px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;font-weight:800;color:var(--subtext);">C. Unit.</th>
                  <th style="width:90px;padding:10px 12px;font-size:.68rem;text-transform:uppercase;font-weight:800;color:var(--subtext);">Total</th>
                  <th style="width:38px;"></th>
                </tr>
              </thead>
              <tbody id="kits-form-tbody">
                <!-- Filas dinámicas -->
              </tbody>
              <tfoot style="background:var(--bg);">
                <tr>
                  <td colspan="4" style="text-align:right;font-weight:700;padding:10px 12px;font-size:.82rem;color:var(--subtext);">COSTO TOTAL:</td>
                  <td colspan="2" style="font-weight:800;color:#16a34a;padding:10px 12px;font-size:.95rem;">
                    S/ <span id="kits-form-grand-total">0.00</span>
                  </td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="border-top:1px solid var(--border)">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-sm btn-primary fw-bold px-4" onclick="window.kitsGuardar()">
          <i class="bi bi-save me-1"></i>Guardar Kit
        </button>
      </div>
    </div>
  </div>
</div>
