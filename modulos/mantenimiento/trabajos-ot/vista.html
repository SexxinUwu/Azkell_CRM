<!-- Módulo Trabajos Anexos — Azkell Fleet -->
<style>
#moduloTrabajosOT {
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
}

/* Barra de controles */
#moduloTrabajosOT .tot-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.6rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}
#moduloTrabajosOT .tot-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.45rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}

/* Tabla */
#moduloTrabajosOT .tot-table-wrap {
    flex: 1 1 0;
    overflow-y: auto;
    background: var(--surface);
}
#moduloTrabajosOT table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
#moduloTrabajosOT thead th {
    background: var(--bg);
    color: var(--subtext);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
    white-space: nowrap;
}
#moduloTrabajosOT tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
}
#moduloTrabajosOT tbody tr:hover { background: var(--bg); }
#moduloTrabajosOT tbody tr.tot-row-active { background: rgba(88,101,242,0.06); border-left: 3px solid var(--primary, #5865F2); }
#moduloTrabajosOT tbody td { padding: 10px 12px; color: var(--text); }
#moduloTrabajosOT .td-placeholder { text-align: center; color: var(--subtext); font-size: 0.82rem; padding: 2rem; }

/* Badges */
#moduloTrabajosOT .tot-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    white-space: nowrap;
}
#moduloTrabajosOT .tot-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.8;
}
#moduloTrabajosOT .badge-pendiente { background: rgba(217,119,6,0.12);  color: #d97706; }

/* Panel lateral detalle */
#moduloTrabajosOT .tot-detail-panel {
    width: 0;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width 0.25s;
    max-width: 400px;
}
#moduloTrabajosOT .tot-detail-panel.open { width: 400px; }
#moduloTrabajosOT .tot-detail-scroll { flex: 1; overflow-y: auto; padding: 1.25rem; }
#moduloTrabajosOT .tot-detail-footer {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
}

/* Secciones detalle */
#moduloTrabajosOT .tot-sec { border: 1px solid var(--border); border-radius: 8px; margin-top: 1rem; overflow: hidden; }
#moduloTrabajosOT .tot-sec-hd {
    background: var(--bg);
    padding: 8px 12px;
    font-size: 0.73rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--subtext);
    border-bottom: 1px solid var(--border);
}
#moduloTrabajosOT .tot-field { display: flex; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
#moduloTrabajosOT .tot-field:last-child { border-bottom: none; }
#moduloTrabajosOT .tot-field-lbl { width: 42%; color: var(--subtext); font-weight: 600; font-size: 0.78rem; padding-right: 8px; }
#moduloTrabajosOT .tot-field-val { width: 58%; color: var(--text); font-weight: 600; word-break: break-word; }
</style>

<div id="moduloTrabajosOT">

    <!-- FILA 1: Buscador + recarga -->
    <div class="tot-controls">
        <div class="input-group input-group-sm" style="max-width:260px;">
            <span class="input-group-text bg-transparent border-end-0">
                <i class="bi bi-search" style="color:var(--subtext)"></i>
            </span>
            <input type="text" class="form-control border-start-0 ps-0"
                id="tot-search"
                placeholder="Buscar por Personal o Descripción..."
                oninput="window.totFiltrar()">
        </div>
        <input type="text" class="form-control form-control-sm" id="tot-fil-ot"
            placeholder="N° OT" style="max-width:110px"
            oninput="window.totFiltrar()">
        <input type="text" class="form-control form-control-sm" id="tot-fil-placa"
            placeholder="PLACA" style="max-width:100px; text-transform:uppercase"
            oninput="this.value=this.value.toUpperCase(); window.totFiltrar()">
        <input type="month" class="form-control form-control-sm" id="tot-fil-mes"
            style="max-width:150px" onchange="window.totFiltrar()">
        <input type="date" class="form-control form-control-sm" id="tot-fil-desde"
            style="max-width:150px" title="Desde" onchange="window.totFiltrar()">
        <input type="date" class="form-control form-control-sm" id="tot-fil-hasta"
            style="max-width:150px" title="Hasta" onchange="window.totFiltrar()">
        <div style="flex:1"></div>
        <button class="btn btn-sm btn-outline-secondary" onclick="window.totCargar()" title="Actualizar">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
    </div>

    <!-- FILA 2: Exportar -->
    <div class="tot-filters">
        <div style="flex:1"></div>
        <button class="btn btn-sm btn-success" onclick="window.totExportar()">
            <i class="bi bi-file-earmark-excel me-1"></i>Exportar a Excel
        </button>
    </div>

    <!-- CONTENEDOR PRINCIPAL (tabla + detalle) -->
    <div style="display:flex; flex:1 1 0; min-height:0; overflow:hidden;">

        <!-- TABLA -->
        <div class="tot-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID TRABAJO</th>
                        <th>N° OT</th>
                        <th>F/H INICIO</th>
                        <th>TRABAJO REALIZADO</th>
                        <th>PERSONAL</th>
                        <th>F/H SALIDA</th>
                        <th>COSTO</th>
                        <th>TIEMPO (HRS)</th>
                    </tr>
                </thead>
                <tbody id="tot-tbody"></tbody>
            </table>
        </div>

        <!-- PANEL DETALLE LATERAL -->
        <div class="tot-detail-panel" id="tot-panel-detalle">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:0 1rem; height:48px; border-bottom:1px solid var(--border); flex-shrink:0;">
                <span style="font-size:0.88rem; font-weight:800; color:var(--text);" id="tot-detalle-titulo">Detalle Trabajo</span>
                <button class="btn btn-sm" onclick="window.totCerrarDetalle()" style="color:var(--subtext);">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="tot-detail-scroll" id="tot-detalle-scroll"></div>
            <div class="tot-detail-footer" id="tot-detalle-footer" style="display:none;"></div>
        </div>

    </div>

</div>

<!-- ═══ DRAWER: Editar Trabajo ═══ -->
<style>
.tot-edit-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 1059;
}
.tot-edit-backdrop.open { display: block; }
.tot-edit-drawer {
    position: fixed; top: 0; right: 0;
    width: 440px; max-width: 96vw; height: 100vh;
    background: var(--surface); border-left: 1px solid var(--border);
    box-shadow: -8px 0 30px rgba(0,0,0,0.14);
    transform: translateX(100%); transition: transform 0.25s ease;
    z-index: 1060; display: flex; flex-direction: column;
}
.tot-edit-drawer.open { transform: translateX(0); }
.tot-edit-drawer-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.25rem; height: 52px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tot-edit-drawer-body { flex: 1; overflow-y: auto; padding: 1.25rem; }
</style>
<div class="tot-edit-backdrop" id="tot-edit-backdrop" onclick="window.totCerrarDrawerEditar()"></div>
<div class="tot-edit-drawer" id="tot-drawer-editar">
    <div class="tot-edit-drawer-hd">
        <span style="font-size:0.95rem; font-weight:800; color:var(--text);" id="tot-ed-titulo">Editar Trabajo</span>
        <button class="btn btn-sm" onclick="window.totCerrarDrawerEditar()" style="color:var(--subtext)">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
    <div class="tot-edit-drawer-body">
        <input type="hidden" id="tot-ed-ticket">

        <div class="mb-3">
            <label class="form-label fw-bold" style="font-size:0.78rem;color:var(--subtext);text-transform:uppercase;letter-spacing:0.04em;">Descripción del Trabajo *</label>
            <textarea class="form-control form-control-sm" id="tot-ed-desc" rows="3" placeholder="Detalla el trabajo realizado..."></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold" style="font-size:0.78rem;color:var(--subtext);text-transform:uppercase;letter-spacing:0.04em;">Personal / Técnico</label>
            <!-- Valor oculto acumulado -->
            <input type="hidden" id="tot-ed-personal">
            <!-- Multiselect wrapper -->
            <div style="position:relative;" id="tot-ms-wrapper">
                <div id="tot-ms-box" onclick="totMsToggle()"
                    style="background:var(--bg); border:1.5px solid var(--border); border-radius:8px; min-height:40px; padding:6px 36px 6px 10px; cursor:pointer; display:flex; flex-wrap:wrap; gap:5px; align-items:center; transition:border-color .2s;">
                    <span id="tot-ms-placeholder" style="color:var(--subtext); font-size:0.85rem;">Selecciona técnico(s)...</span>
                </div>
                <span style="position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--subtext); pointer-events:none; font-size:0.8rem;">▾</span>
                <div id="tot-ms-dropdown" style="display:none; position:absolute; left:0; right:0; top:calc(100% + 4px); background:var(--surface); border:1.5px solid var(--border); border-radius:8px; z-index:1200; box-shadow:0 8px 24px rgba(0,0,0,0.18); overflow:hidden;">
                    <input type="text" id="tot-ms-search"
                        placeholder="Buscar técnico..."
                        autocomplete="off"
                        oninput="totMsFiltrar(this.value)"
                        style="width:100%; border:none; border-bottom:1px solid var(--border); background:var(--bg); color:var(--text); padding:9px 12px; font-size:0.84rem; outline:none;">
                    <div id="tot-ms-options" style="max-height:190px; overflow-y:auto;"></div>
                    <div style="padding:7px 12px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                        <span id="tot-ms-count" style="font-size:0.76rem; color:var(--subtext);">0 seleccionados</span>
                        <span onclick="totMsLimpiar()" style="font-size:0.76rem; color:#f87171; cursor:pointer;">Limpiar todo</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="form-label fw-bold" style="font-size:0.78rem;color:var(--subtext);text-transform:uppercase;letter-spacing:0.04em;">Fecha y Hora Inicio</label>
                <input type="datetime-local" class="form-control form-control-sm" id="tot-ed-fecha-ini">
            </div>
            <div class="col-6">
                <label class="form-label fw-bold" style="font-size:0.78rem;color:var(--subtext);text-transform:uppercase;letter-spacing:0.04em;">Fecha y Hora Fin</label>
                <input type="datetime-local" class="form-control form-control-sm" id="tot-ed-fecha-fin">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold" style="font-size:0.78rem;color:var(--subtext);text-transform:uppercase;letter-spacing:0.04em;">Costo del Trabajo (S/)</label>
            <input type="number" class="form-control form-control-sm" id="tot-ed-costo" value="0" min="0" step="0.01">
        </div>

        <div class="mb-4" style="display:none;">
            <label class="form-label fw-bold" style="font-size:0.78rem;color:var(--subtext);text-transform:uppercase;letter-spacing:0.04em;">Estado</label>
            <select class="form-select form-select-sm" id="tot-ed-estado">
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>

        <button class="btn btn-primary w-100 fw-bold" onclick="window.totGuardarEdicion()">
            <i class="bi bi-check-lg me-1"></i>Guardar Cambios
        </button>
    </div>
</div>
