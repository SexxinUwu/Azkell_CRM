<!-- Módulo Situaciones — Azkell Fleet -->
<style>
#moduloSituaciones {
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
}
#moduloSituaciones .sit-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.6rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}
#moduloSituaciones .sit-table-wrap {
    flex: 1 1 0;
    overflow-y: auto;
    background: var(--surface);
}
#moduloSituaciones table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
}
#moduloSituaciones thead th {
    background: var(--bg);
    color: var(--subtext);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
    white-space: nowrap;
}
#moduloSituaciones tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
}
#moduloSituaciones tbody tr:hover { background: var(--bg); }
#moduloSituaciones tbody td { padding: 10px 12px; color: var(--text); vertical-align: middle; }
#moduloSituaciones .sit-color-dot {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    vertical-align: middle;
    margin-right: 8px;
    border: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
}
#moduloSituaciones .sit-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
}
#moduloSituaciones .sit-empty {
    padding: 3rem;
    text-align: center;
    color: var(--subtext);
    font-size: 0.85rem;
}
/* Drawer */
#sitDrawerBackdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 1059;
}
#sitDrawerBackdrop.open { display: block; }
#sit-drawer {
    position: fixed;
    top: 0; right: 0;
    width: 400px;
    max-width: 96vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: -8px 0 30px rgba(0,0,0,0.14);
    transform: translateX(100%);
    transition: transform 0.28s ease;
    z-index: 1060;
    display: flex;
    flex-direction: column;
}
#sit-drawer.open { transform: translateX(0); }
#sit-drawer .sit-drawer-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.25rem;
    height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
#sit-drawer .sit-drawer-title { font-size: 0.95rem; font-weight: 800; color: var(--text); }
#sit-drawer .sit-drawer-body { flex: 1; overflow-y: auto; padding: 1.25rem; }
</style>

<div id="sitDrawerBackdrop" onclick="window.sitCerrarDrawer()"></div>

<div id="moduloSituaciones">

    <!-- Botón volver a Administración -->
    <div style="padding:.5rem 1.25rem .1rem;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);">
        <button onclick="cargarModuloAislado('administracion')" style="display:inline-flex;align-items:center;gap:.2rem;padding:.28rem .75rem;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);color:var(--subtext);font-size:.78rem;font-weight:700;cursor:pointer;transition:border-color .15s,color .15s;" onmouseover="this.style.borderColor='#2563eb';this.style.color='#2563eb'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--subtext)'"><i class="bi bi-arrow-left-short" style="font-size:1rem;"></i>Administración</button>
    </div>

    <!-- CONTROLES -->
    <div class="sit-controls">
        <div class="input-group input-group-sm" style="max-width:260px;">
            <span class="input-group-text bg-transparent border-end-0">
                <i class="bi bi-search" style="color:var(--subtext)"></i>
            </span>
            <input type="text" class="form-control border-start-0 ps-0" id="sit-buscador"
                placeholder="Buscar situación..."
                oninput="window.sitBuscar()">
        </div>
        <div style="flex:1"></div>
        <button class="btn btn-sm btn-outline-secondary" onclick="window.init_situaciones()" title="Actualizar">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
        <button class="btn btn-sm btn-primary" onclick="window.sitNueva()">
            <i class="bi bi-plus-lg me-1"></i>Nueva Situación
        </button>
    </div>

    <!-- TABLA -->
    <div class="sit-table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width:40px">#</th>
                    <th>Nombre</th>
                    <th>Vista previa</th>
                    <th style="width:120px"></th>
                </tr>
            </thead>
            <tbody id="sit-tbody"></tbody>
        </table>
    </div>

</div>

<!-- DRAWER: Nueva / Editar Situación -->
<div id="sit-drawer">
    <div class="sit-drawer-hd">
        <span class="sit-drawer-title" id="sit-drawer-titulo">Nueva Situación</span>
        <button class="btn btn-sm" onclick="window.sitCerrarDrawer()" style="color:var(--subtext)">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
    <div class="sit-drawer-body">
        <input type="hidden" id="sit-f-id">

        <div class="mb-3">
            <label class="form-label fw-bold" style="font-size:0.78rem; color:var(--subtext); text-transform:uppercase; letter-spacing:0.04em;">Nombre *</label>
            <input type="text" class="form-control form-control-sm" id="sit-f-nombre" placeholder="Ej: En proceso, Listo, En espera...">
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold" style="font-size:0.78rem; color:var(--subtext); text-transform:uppercase; letter-spacing:0.04em;">Vista previa</label>
            <div id="sit-preview" style="padding:10px 0;">
                <span id="sit-preview-badge" style="display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:700;">
                    <span id="sit-preview-dot" style="width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0;"></span>
                    <span id="sit-preview-text">Nombre</span>
                </span>
            </div>
        </div>

        <button class="btn btn-primary w-100 fw-bold" onclick="window.sitGuardar()">
            <i class="bi bi-check-lg me-1"></i>Guardar
        </button>
    </div>
</div>
