<!-- Módulo Conductores - Aislado en SPA -->
<style>
/* ── Directorio de Personal — Card Grid ────────────────────────── */
#cond-grid {
    display: flex;
    flex-direction: column;
    gap: .45rem;
    padding: .25rem .1rem .75rem;
    flex: 1;
    overflow-y: auto;
    min-height: 0;
}
@media (min-width: 680px) {
    #cond-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: .65rem;
        padding: .25rem .25rem .75rem;
        align-content: start;
    }
    .cond-group-lbl { grid-column: 1 / -1; }
}
@media (min-width: 1100px) {
    #cond-grid { grid-template-columns: repeat(3, 1fr); }
}
.cond-card {
    display: flex; align-items: center; gap: .75rem;
    padding: .8rem .9rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: box-shadow .15s, border-color .15s, transform .15s;
    position: relative; overflow: hidden;
    min-height: 72px;
}
.cond-card:hover  { box-shadow: 0 4px 18px rgba(0,0,0,.08); border-color: #2563eb55; transform: translateY(-1px); }
.cond-card:active { transform: scale(.984); }
.cond-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.05rem; flex-shrink: 0; color: #fff;
    letter-spacing: .02em; text-shadow: 0 1px 3px rgba(0,0,0,.18);
}
.cond-info { flex: 1; min-width: 0; }
.cond-name {
    font-weight: 800; font-size: .88rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 1px; line-height: 1.25;
}
.cond-sub {
    font-size: .69rem; color: var(--subtext); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px;
}
.cond-lic {
    display: inline-block; font-size: .6rem; font-weight: 800;
    padding: 1px 7px; border-radius: 99px;
    background: #eff6ff; color: #2563eb;
    text-transform: uppercase; letter-spacing: .06em;
}
.cond-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.cond-btn {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem; text-decoration: none;
    transition: opacity .12s, transform .1s; border: none; flex-shrink: 0;
}
.cond-btn:hover { opacity: .82; transform: scale(1.06); }
.cond-call { background: #eff6ff; color: #2563eb; }
.cond-wsp  { background: #f0fdf4; color: #16a34a; }
.cond-no-tel {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    color: var(--border); font-size: .85rem;
}
.cond-group-lbl {
    display: flex; align-items: center; gap: .45rem;
    padding: .4rem .5rem .2rem; font-size: .72rem; font-weight: 900;
    text-transform: uppercase; letter-spacing: .08em;
    cursor: pointer; user-select: none; border-radius: 8px; margin-top: .3rem;
}
.cond-group-lbl:hover { background: var(--border); }
.cond-group-cnt { border-radius: 99px; padding: 1px 9px; font-size: .68rem; font-weight: 800; }
</style>

<div id="moduloConductores" class="modulo-wrapper d-flex flex-column h-100 flex-grow-1">

    <!-- Barra de controles -->
    <div class="controls-row d-flex justify-content-between flex-wrap gap-2 mb-3">
        <div class="input-group input-group-sm" style="max-width: 300px;">
            <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-search text-secondary"></i></span>
            <input type="text" class="form-control border-start-0 ps-0" id="buscadorConductores"
                   oninput="window.filtrarConductores()" placeholder="Buscar por Nombre, DNI...">
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <span id="cache-badge-conductores" class="cache-badge"><i class="bi bi-database"></i> <span id="cache-label-conductores">Sin cargar</span></span>
            <button class="btn-reload-cache" onclick="window.init_conductores()" title="Actualizar"><i class="bi bi-arrow-clockwise"></i></button>
            <button class="btn btn-outline-secondary fw-bold btn-sm" onclick="toggleAllCondGroups()"><i class="bi bi-arrows-expand"></i> <span class="d-none d-md-inline">Expandir</span></button>
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-info fw-bold dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-upload"></i> <span class="d-none d-md-inline">Importar</span>
                </button>
                <ul class="dropdown-menu shadow">
                    <li><a class="dropdown-item fw-bold text-success" href="#" onclick="window.descargarPlantillaConductores()"><i class="bi bi-file-earmark-spreadsheet me-1"></i>1. Descargar Plantilla</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item fw-bold text-primary" href="#" onclick="document.getElementById('inputFileConductores').click()"><i class="bi bi-cloud-upload me-1"></i>2. Subir Excel Lleno</a></li>
                </ul>
            </div>
            <input type="file" id="inputFileConductores" accept=".xlsx,.xls" style="display:none;" onchange="window.importarExcelConductores(event)">
            <button class="btn btn-outline-success fw-bold btn-sm" onclick="descargarExcelDinamico('tablaConductores', 'Directorio_Conductores')"><i class="bi bi-file-earmark-excel"></i> <span class="d-none d-md-inline">Excel</span></button>
            <button class="btn btn-primary fw-bold text-white btn-sm" onclick="abrirModalConductor()" data-perm-crear="flota"><i class="bi bi-person-plus-fill"></i> <span class="d-none d-sm-inline">Nuevo</span></button>
        </div>
    </div>

    <!-- Grid de tarjetas de contacto -->
    <div id="cond-grid">
        <div style="text-align:center;padding:3rem 1rem;color:var(--subtext);font-size:.88rem;">
            <div class="spinner-border spinner-border-sm me-2 text-secondary"></div>Cargando personal...
        </div>
    </div>

    <!-- Tabla oculta para exportar Excel (mantiene IDs originales) -->
    <table id="tablaConductores" style="display:none;">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Empresa</th>
                <th>Licencia</th>
                <th>Teléfono</th>
                <th>Estado</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="cuerpoTablaConductores"></tbody>
    </table>

</div>

<!-- Modal Nuevo/Editar Conductor -->
<div class="modal fade" id="modalConductor" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-dark text-white"><h5 class="modal-title fw-bold" id="tituloModalConductor"><i class="bi bi-person-badge"></i> Ficha de Personal</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
<form id="formConductor" onsubmit="guardarConductor(event, this)">
    <input type="hidden" name="idConductor" id="c_id">
    <input type="hidden" name="c_foto_base64" id="c_foto_base64">
    <div class="modal-body">
        <div class="text-center mb-3">
            <img id="c_foto_preview" src="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20120%20120'%3E%3Ccircle%20cx%3D'60'%20cy%3D'60'%20r%3D'60'%20fill%3D'%23e2e8f0'%2F%3E%3Ccircle%20cx%3D'60'%20cy%3D'45'%20r%3D'22'%20fill%3D'%2394a3b8'%2F%3E%3Cellipse%20cx%3D'60'%20cy%3D'105'%20rx%3D'38'%20ry%3D'32'%20fill%3D'%2394a3b8'%2F%3E%3C%2Fsvg%3E" style="width:120px;height:120px;object-fit:cover;border-radius:50%;border:3px solid #cbd5e1;cursor:pointer;" onclick="document.getElementById('c_foto_input').click()" title="Toca para cambiar foto">
            <input type="file" id="c_foto_input" accept="image/*" style="display:none;" onchange="previsualizarFotoConductor(this)">
            <div class="small text-muted mt-1">Toca la imagen para subir foto</div>
        </div>
        <div class="mb-3"><label class="fw-bold text-primary">Nombre Completo</label><input type="text" class="form-control fw-bold" name="c_nombre" id="c_nombre" required></div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="fw-bold">Empresa</label><input type="text" class="form-control text-uppercase" name="c_empresa" id="c_empresa" list="dl-clientes" placeholder="Ej: ROSYMAR PERU SAC"><datalist id="dl-clientes"></datalist></div>
            <div class="col-md-6 mb-3"><label class="fw-bold">Teléfono</label><input type="text" class="form-control" name="c_telefono" id="c_telefono"></div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="fw-bold">DNI</label><input type="text" class="form-control" name="c_dni" id="c_dni"></div>
            <div class="col-md-6 mb-3"><label class="fw-bold">Licencia</label><input type="text" class="form-control text-uppercase" name="c_licencia" id="c_licencia"></div>
        </div>
        <div class="mb-3"><label class="fw-bold">Estado</label><select class="form-select" name="c_estado" id="c_estado"><option value="Activo">Activo</option><option value="Cesado">Cesado</option><option value="Bloqueado">Bloqueado</option></select></div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-warning fw-bold text-dark" id="btnEditarConductor" onclick="activarEdicionConductor()"><i class="bi bi-pencil-square"></i> Editar</button>
        <button type="submit" class="btn btn-primary" id="btnGuardarConductor"><i class="bi bi-save"></i> Guardar Personal</button>
    </div>
</form></div></div></div>
