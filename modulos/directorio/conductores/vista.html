<!-- Módulo Conductores - Aislado en SPA -->

<div id="moduloConductores" class="modulo-wrapper d-flex flex-column h-100 flex-grow-1">
    <div class="controls-row d-flex justify-content-between flex-wrap gap-2 mb-3">
        <div class="input-group input-group-sm" style="max-width: 300px;">
            <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-search text-secondary"></i></span>
            <input type="text" class="form-control border-start-0 ps-0" id="buscadorConductores" onkeyup="filtrarTabla('cuerpoTablaConductores', 'buscadorConductores')" placeholder="Buscar por Nombre, DNI...">
        </div>
        <div class="d-flex align-items-center gap-2">
            <span id="cache-badge-conductores" class="cache-badge"><i class="bi bi-database"></i> <span id="cache-label-conductores" data-i18n="common.sinCargar">Sin cargar</span></span>
            <button class="btn-reload-cache" onclick="recargarModulo('conductores')" title="Actualizar"><i class="bi bi-arrow-clockwise"></i></button>
            <button class="btn btn-outline-secondary fw-bold btn-sm" onclick="toggleAllCondGroups()"><i class="bi bi-arrows-expand"></i> <span data-i18n="common.expand">Expandir</span></button>
            <button class="btn btn-outline-success fw-bold btn-sm" onclick="descargarExcelDinamico('tablaConductores', 'Directorio_Conductores')"><i class="bi bi-file-earmark-excel"></i> <span data-i18n="common.excel">Excel</span></button>
            <button class="btn btn-primary fw-bold text-white btn-sm" onclick="abrirModalConductor()" data-perm-crear="flota"><i class="bi bi-person-plus-fill"></i> <span data-i18n="drivers.new">Nuevo Personal</span></button>
        </div>
    </div>
    <div class="card p-0"><div class="table-container"><table class="table table-custom m-0" id="tablaConductores">
        <thead>
            <tr>
                <th data-i18n="drivers.col.name">Nombre</th>
                <th class="d-none">Empresa</th>
                <th class="d-none">Licencia</th>
                <th data-i18n="drivers.col.contact">Contacto (Tel / WSP)</th>
                <th class="d-none" data-i18n="common.status">Estado</th>
                <th><i class="bi bi-three-dots-vertical"></i></th>
            </tr>
        </thead>
        <tbody id="cuerpoTablaConductores"><tr><td colspan="6" class="text-center py-5" data-i18n="common.loading">Cargando personal...</td></tr></tbody>
    </table></div></div>
</div>

<!-- Modal Nuevo/Editar Conductor -->
<div class="modal fade" id="modalConductor" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-dark text-white"><h5 class="modal-title fw-bold" id="tituloModalConductor"><i class="bi bi-person-badge"></i> <span data-i18n="drivers.modal.title">Ficha de Personal</span></h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
<form id="formConductor" onsubmit="guardarConductor(event, this)">
    <input type="hidden" name="idConductor" id="c_id">
    <input type="hidden" name="c_foto_base64" id="c_foto_base64">
    <div class="modal-body">
        <div class="text-center mb-3">
            <img id="c_foto_preview" src="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20120%20120'%3E%3Ccircle%20cx%3D'60'%20cy%3D'60'%20r%3D'60'%20fill%3D'%23e2e8f0'%2F%3E%3Ccircle%20cx%3D'60'%20cy%3D'45'%20r%3D'22'%20fill%3D'%2394a3b8'%2F%3E%3Cellipse%20cx%3D'60'%20cy%3D'105'%20rx%3D'38'%20ry%3D'32'%20fill%3D'%2394a3b8'%2F%3E%3C%2Fsvg%3E" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px solid #cbd5e1; cursor: pointer;" onclick="document.getElementById('c_foto_input').click()" title="Toca para cambiar foto">
            <input type="file" id="c_foto_input" accept="image/*" style="display: none;" onchange="previsualizarFotoConductor(this)">
            <div class="small text-muted mt-1">Toca la imagen para subir foto</div>
        </div>
        <div class="mb-3"><label class="fw-bold text-primary" data-i18n="drivers.form.full">Nombre Completo</label><input type="text" class="form-control fw-bold" name="c_nombre" id="c_nombre" required></div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="fw-bold" data-i18n="drivers.form.company">Empresa</label><input type="text" class="form-control text-uppercase" name="c_empresa" id="c_empresa" list="dl-clientes" placeholder="Ej: ROSYMAR PERU SAC"><datalist id="dl-clientes"></datalist></div>
            <div class="col-md-6 mb-3"><label class="fw-bold" data-i18n="drivers.form.phone">Teléfono</label><input type="text" class="form-control" name="c_telefono" id="c_telefono"></div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="fw-bold" data-i18n="drivers.form.dni">DNI</label><input type="text" class="form-control" name="c_dni" id="c_dni"></div>
            <div class="col-md-6 mb-3"><label class="fw-bold" data-i18n="drivers.form.license">Licencia</label><input type="text" class="form-control text-uppercase" name="c_licencia" id="c_licencia"></div>
        </div>
        <div class="mb-3"><label class="fw-bold" data-i18n="common.status">Estado</label><select class="form-select" name="c_estado" id="c_estado"><option value="Activo">Activo</option><option value="Cesado">Cesado</option><option value="Bloqueado">Bloqueado</option></select></div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="common.close">Cerrar</button>
        <button type="button" class="btn btn-warning fw-bold text-dark" id="btnEditarConductor" onclick="activarEdicionConductor()"><i class="bi bi-pencil-square"></i> <span data-i18n="common.edit">Editar</span></button>
        <button type="submit" class="btn btn-primary" id="btnGuardarConductor"><i class="bi bi-save"></i> <span data-i18n="common.save">Guardar Personal</span></button>
    </div>
</form></div></div></div>
