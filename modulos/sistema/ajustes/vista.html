<style>
/* ─── AJUSTES MOBILE EDGE-TO-EDGE (DISEÑO IMAGEN 2) ─── */
#moduloAjustes { 
    background: #f1f5f9 !important; 
    min-height: 100%; 
    display: flex; 
    flex-direction: column; 
    padding-bottom: 5rem;
    margin: 0 !important;
    border-radius: 0 !important;
}

/* Forzar que el contenedor padre no tenga márgenes para que sea PANTALLA COMPLETA real */
:root {
    --ajustes-bg: #f1f5f9;
}
@media (max-width: 768px) {
    .topbar { display: none !important; }
    #root-dinamico, .main-area { 
        padding: 0 !important; 
        overflow: hidden !important; 
        display: flex !important;
        flex-direction: column !important;
    }

    #moduloAjustes { margin: 0 !important; border-radius: 0 !important; width: 100% !important; max-width: 100vw !important; padding: 0 !important; flex: 1 1 0; }
}

/* Header nativo */
.ajustes-header-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1rem 0.5rem 1rem;
    background: transparent;
}
.ajustes-header-title {
    font-size: 1.5rem;
    font-weight: 900;
    color: #0f172a;
    margin: 0;
}

/* Tarjeta de Perfil */
.ajustes-profile-card {
    background: #fff;
    padding: 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 0.5rem 1rem 1.5rem 1rem;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
}
.ajustes-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #2563eb;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 800;
    flex-shrink: 0;
}
.ajustes-profile-info { flex: 1; min-width: 0; }
.ajustes-profile-name { font-size: 1.1rem; font-weight: 800; color: #0f172a; margin: 0; line-height: 1.2; }
.ajustes-profile-badge { 
    display: inline-block; 
    background: #dcfce7; 
    color: #16a34a; 
    font-size: 0.65rem; 
    font-weight: 800; 
    padding: 2px 8px; 
    border-radius: 12px; 
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.ajustes-profile-email { font-size: 0.8rem; color: #64748b; margin: 4px 0 0 0; }

/* Secciones y Listas */
.ajustes-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 1.5rem 0.5rem 1.5rem;
}
.ajustes-section-title {
    font-size: 0.75rem;
    font-weight: 800;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0;
}
.ajustes-badge-gray {
    background: #e2e8f0;
    color: #475569;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 800;
}

.ajustes-item {
    background: #fff;
    margin: 0 1rem 1rem 1rem;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    display: flex;
    align-items: center;
    padding: 1.15rem 1.25rem;
    text-decoration: none;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
}
.ajustes-item:active { 
    background: #f8fafc;
    transform: scale(0.98);
}



.ajustes-item-icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    margin-right: 1rem;
    flex-shrink: 0;
}
.icon-blue { background: #eff6ff; color: #3b82f6; }
.icon-pink { background: #fdf2f8; color: #ec4899; }
.icon-green { background: #f0fdf4; color: #22c55e; }
.icon-orange { background: #fff7ed; color: #f97316; }

.ajustes-item-content { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: space-between; }
.ajustes-item-title { font-size: 0.95rem; font-weight: 700; color: #0f172a; margin: 0; }

.ajustes-item-chevron { color: #cbd5e1; font-size: 1rem; margin-left: 0.5rem; }

/* Logout */
.ajustes-logout-card {
    background: #fff;
    padding: 1.15rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-weight: 700;
    font-size: 0.95rem;
    color: #ef4444;
    cursor: pointer;
    transition: background 0.2s;
    margin: 0 1rem 2rem 1rem;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
}
.ajustes-logout-card:active { background: #fef2f2; }

@media (min-width: 768px) {
    .ajustes-header-nav { padding: 0 1rem 1rem 1rem; }
    .ajustes-profile-card, .ajustes-item, .ajustes-logout-card {
        margin-left: 2rem;
        margin-right: 2rem;
    }
    .ajustes-section-header { padding: 0 2.5rem 0.5rem 2.5rem; }
}
</style>
