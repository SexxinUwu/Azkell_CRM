<style>
/* ─── AJUSTES MOBILE EDGE-TO-EDGE ───────────────────────────────── */
#moduloAjustes { background: #f3f4f6; min-height: 100%; display: flex; flex-direction: column; }
@media (min-width: 768px) {
    #moduloAjustes { padding: 1.5rem !important; background: transparent; }
}

.ajustes-header {
    padding: 1.5rem 1.25rem 2.5rem 1.25rem;
    background: linear-gradient(135deg, #2563eb, #1e3a8a);
    color: white;
    border-radius: 0 0 24px 24px;
    margin-bottom: 1rem;
}
.ajustes-profile {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 1rem;
}
.ajustes-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: bold;
    border: 3px solid rgba(255,255,255,0.4);
}
.ajustes-name { font-size: 1.25rem; font-weight: 800; margin: 0; line-height: 1.2; }
.ajustes-role { font-size: 0.85rem; opacity: 0.8; margin: 0; font-weight: 500; }

.ajustes-section {
    margin-bottom: 1.5rem;
    padding: 0 1.25rem;
}
.ajustes-section-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
    padding-left: 0.5rem;
}
.ajustes-card {
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.ajustes-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    text-decoration: none;
    color: #111827;
    border-bottom: 1px solid #f3f4f6;
    transition: background 0.2s;
}
.ajustes-item:active { background: #f9fafb; }
.ajustes-item:last-child { border-bottom: none; }

.ajustes-item-left {
    display: flex;
    align-items: center;
    gap: 1rem;
}
.ajustes-item-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
}
.icon-blue { background: #eff6ff; color: #2563eb; }
.icon-purple { background: #faf5ff; color: #9333ea; }
.icon-green { background: #f0fdf4; color: #16a34a; }
.icon-orange { background: #fff7ed; color: #ea580c; }
.icon-red { background: #fef2f2; color: #dc2626; }
.icon-gray { background: #f3f4f6; color: #4b5563; }

.ajustes-item-text { font-size: 0.95rem; font-weight: 600; }
.ajustes-item-right { color: #9ca3af; display: flex; align-items: center; gap: 0.5rem; }

/* Custom Toggle Switch */
.form-switch .form-check-input {
    width: 2.5em;
    height: 1.25em;
    border-radius: 2em;
}
.form-check-input:checked {
    background-color: #2563eb;
    border-color: #2563eb;
}
</style>

<div id="moduloAjustes" class="modulo-wrapper">
    <div class="ajustes-header shadow-sm">
        <h2 class="m-0 fw-bold fs-4">Ajustes</h2>
        <div class="ajustes-profile">
            <div class="ajustes-avatar" id="ajustes-user-avatar">
                <i class="bi bi-person-fill"></i>
            </div>
            <div>
                <p class="ajustes-name" id="ajustes-user-name">Usuario</p>
                <p class="ajustes-role" id="ajustes-user-role">Administrador</p>
            </div>
        </div>
    </div>

    <!-- PREFERENCIAS -->
    <div class="ajustes-section">
        <div class="ajustes-section-title">Preferencias</div>
        <div class="ajustes-card">
            <div class="ajustes-item">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-blue"><i class="bi bi-moon-fill"></i></div>
                    <span class="ajustes-item-text">Modo Oscuro</span>
                </div>
                <div class="ajustes-item-right">
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="ajustes-theme-switch" onchange="toggleDarkTheme()">
                    </div>
                </div>
            </div>
            <a href="#" class="ajustes-item" onclick="cambiarIdioma()">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-purple"><i class="bi bi-globe"></i></div>
                    <span class="ajustes-item-text">Idioma</span>
                </div>
                <div class="ajustes-item-right">
                    <span id="ajustes-lang-text" style="font-size:0.85rem; font-weight:500;">Español</span>
                    <i class="bi bi-chevron-right"></i>
                </div>
            </a>
            <a href="#" class="ajustes-item" onclick="abrirOffcanvasPersonalizacion()">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-green"><i class="bi bi-palette-fill"></i></div>
                    <span class="ajustes-item-text">Personalización</span>
                </div>
                <div class="ajustes-item-right"><i class="bi bi-chevron-right"></i></div>
            </a>
        </div>
    </div>

    <!-- ADMINISTRACIÓN -->
    <div class="ajustes-section" id="ajustes-admin-section" style="display:none;">
        <div class="ajustes-section-title">Administración</div>
        <div class="ajustes-card">
            <a href="#" class="ajustes-item" onclick="cargarModuloAislado('sistema/usuarios')">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-orange"><i class="bi bi-people-fill"></i></div>
                    <span class="ajustes-item-text">Usuarios y Permisos</span>
                </div>
                <div class="ajustes-item-right"><i class="bi bi-chevron-right"></i></div>
            </a>
            <a href="#" class="ajustes-item" onclick="cargarModuloAislado('flota/marcas')">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-gray"><i class="bi bi-tags-fill"></i></div>
                    <span class="ajustes-item-text">Marcas y Modelos</span>
                </div>
                <div class="ajustes-item-right"><i class="bi bi-chevron-right"></i></div>
            </a>
            <a href="#" class="ajustes-item" onclick="cargarModuloAislado('almacen/categorias')">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-gray"><i class="bi bi-box-seam-fill"></i></div>
                    <span class="ajustes-item-text">Categorías Almacén</span>
                </div>
                <div class="ajustes-item-right"><i class="bi bi-chevron-right"></i></div>
            </a>
            <a href="#" class="ajustes-item" onclick="cargarModuloAislado('sistema/sync')">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-blue"><i class="bi bi-arrow-repeat"></i></div>
                    <span class="ajustes-item-text">Sincronización</span>
                </div>
                <div class="ajustes-item-right"><i class="bi bi-chevron-right"></i></div>
            </a>
            <a href="#" class="ajustes-item" onclick="cargarModuloAislado('sistema/logs')">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-gray"><i class="bi bi-journal-text"></i></div>
                    <span class="ajustes-item-text">Registro de Actividad</span>
                </div>
                <div class="ajustes-item-right"><i class="bi bi-chevron-right"></i></div>
            </a>
        </div>
    </div>

    <!-- CUENTA -->
    <div class="ajustes-section mb-5">
        <div class="ajustes-section-title">Cuenta</div>
        <div class="ajustes-card">
            <a href="#" class="ajustes-item" onclick="cerrarSesion()">
                <div class="ajustes-item-left">
                    <div class="ajustes-item-icon icon-red"><i class="bi bi-box-arrow-right"></i></div>
                    <span class="ajustes-item-text text-danger">Cerrar Sesión</span>
                </div>
            </a>
        </div>
        <div class="text-center mt-4 mb-4">
            <p style="font-size:0.75rem; color:#9ca3af; font-weight:600; margin:0;">AZKELL CRM V2.0</p>
        </div>
    </div>
</div>
