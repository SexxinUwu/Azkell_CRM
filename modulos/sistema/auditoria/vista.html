<style>
#moduloAuditoria { display:flex; flex-direction:column; height:100%; background:var(--bg); }
.audit-header { background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; padding:10px 16px; }
.audit-chips { background:var(--surface); border-bottom:2px solid var(--border); flex-shrink:0; padding:8px 16px; gap:6px; display:flex; flex-wrap:wrap; align-items:center; }
.audit-chip { font-size:0.75rem; padding:3px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--subtext); cursor:pointer; transition:all .15s; white-space:nowrap; }
.audit-chip:hover { border-color:var(--crm-accent); color:var(--crm-accent); }
.audit-chip.active { background:var(--crm-accent); border-color:var(--crm-accent); color:#fff; }
.audit-chip.cre { border-color:#22c55e; color:#16a34a; }
.audit-chip.cre.active { background:#22c55e; color:#fff; }
.audit-chip.mod { border-color:#f59e0b; color:#b45309; }
.audit-chip.mod.active { background:#f59e0b; color:#fff; }
.audit-chip.del { border-color:#ef4444; color:#dc2626; }
.audit-chip.del.active { background:#ef4444; color:#fff; }
.audit-feed { flex:1 1 0; overflow-y:auto; padding:4px 0 60px; }
.audit-day-sep { text-align:center; padding:12px 0 4px; font-size:0.72rem; color:var(--subtext); letter-spacing:1px; text-transform:uppercase; position:relative; }
.audit-day-sep::before, .audit-day-sep::after { content:''; position:absolute; top:50%; width:calc(50% - 60px); height:1px; background:var(--border); }
.audit-day-sep::before { left:16px; } .audit-day-sep::after { right:16px; }
.audit-msg { display:flex; gap:12px; padding:6px 16px 4px; align-items:flex-start; transition:background .1s; }
.audit-msg:hover { background:var(--surface); }
.audit-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; color:#fff; flex-shrink:0; margin-top:2px; user-select:none; }
.audit-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:3px; }
.audit-name { font-size:0.85rem; font-weight:700; color:var(--text); }
.audit-time { font-size:0.7rem; color:var(--subtext); }
.audit-badge { font-size:0.63rem; padding:2px 7px; border-radius:10px; font-weight:700; letter-spacing:.4px; }
.audit-badge-cre { background:rgba(34,197,94,.18); color:#16a34a; }
.audit-badge-mod { background:rgba(245,158,11,.2); color:#b45309; }
.audit-badge-del { background:rgba(239,68,68,.18); color:#dc2626; }
.audit-badge-mod-name { background:rgba(99,102,241,.15); color:#6366f1; }
.audit-detail { background:var(--surface); border-left:3px solid var(--border); border-radius:0 6px 6px 0; padding:5px 10px; font-size:0.82rem; color:var(--text); margin-top:2px; max-width:100%; word-break:break-word; }
/* Estilos de Timeline */
.audit-feed { flex:1 1 0; overflow-y:auto; padding:20px 20px 60px; position:relative; }
.audit-feed::before { content:''; position:absolute; top:20px; bottom:20px; left:48px; width:2px; background:var(--border); z-index:0; }
.audit-msg { display:flex; gap:20px; padding:0 0 24px; align-items:flex-start; position:relative; z-index:1; }
.audit-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:700; color:#fff; flex-shrink:0; border:4px solid var(--bg); box-shadow:0 0 0 1px var(--border); margin-left:14px; position:relative; z-index:2; }
.audit-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px; background:var(--surface); padding:10px 14px; border-radius:12px; border:1px solid var(--border); width:100%; }
.audit-detail { background:transparent; padding:0 14px; font-size:0.82rem; color:var(--text); word-break:break-word; border-left:2px solid var(--border); margin-left:14px; opacity:0.85; }
.audit-content-wrapper { flex:1; min-width:0; }
.audit-day-sep { display:inline-block; padding:6px 16px; background:var(--surface); border:1px solid var(--border); border-radius:20px; font-size:0.72rem; font-weight:bold; color:var(--text); position:relative; z-index:2; margin-left:0px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.05); text-transform:uppercase; letter-spacing:1px; }

</style>

<div id="moduloAuditoria">
    <!-- Header -->
    <div class="audit-header d-flex align-items-center gap-2 justify-content-between">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-journal-text text-primary" style="font-size:1.1rem;"></i>
            <div>
                <div class="fw-bold" style="color:var(--text);font-size:0.88rem;" data-i18n="audit.title">Registro de Actividad</div>
                <div id="audit-subtitle" style="font-size:0.7rem;color:var(--subtext);">Cargando...</div>
            </div>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <input type="text" class="form-control form-control-sm" placeholder="Buscar..." id="auditSearch"
                   style="width:148px;font-size:0.8rem;" oninput="window.filtrarAuditFeed && window.filtrarAuditFeed()">
            <button class="btn-reload-cache" onclick="window.cargarAuditoria && window.cargarAuditoria(true)" title="Actualizar">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <!-- Filter chips -->
    <div class="audit-chips" id="auditChips">
        <button class="audit-chip active" data-filter="all" onclick="window.setAuditFilter('all')">Todos</button>
        <button class="audit-chip cre" data-filter="CREÓ" onclick="window.setAuditFilter('CREÓ')">✅ Creó</button>
        <button class="audit-chip mod" data-filter="MODIFICÓ" onclick="window.setAuditFilter('MODIFICÓ')">📝 Modificó</button>
        <button class="audit-chip del" data-filter="ELIMINÓ" onclick="window.setAuditFilter('ELIMINÓ')">🗑 Eliminó</button>
        <select class="form-select form-select-sm ms-auto" id="auditModuloFilter"
                style="width:130px;font-size:0.75rem;" onchange="window.filtrarAuditFeed && window.filtrarAuditFeed()">
            <option value="">Todos los módulos</option>
            <option value="fleetrun">Fleetrun</option>
            <option value="placas">Placas</option>
            <option value="inspecciones">Inspecciones</option>
            <option value="usuarios">Usuarios</option>
            <option value="status">Status Flota</option>
        </select>
    </div>

    <!-- Feed Discord -->
    <div class="audit-feed" id="auditFeed">
        <div class="text-center py-5 text-muted">
            <span class="spinner-border spinner-border-sm me-2"></span>Cargando historial...
        </div>
    </div>
</div>
