<!-- Módulo Gestión de Usuarios v2 — Discord-style -->
<style>
/* ── Layout principal ─────────────────────────────── */
:root {
  --dc-bg: #f2f3f5;
  --dc-panel-bg: #ffffff;
  --dc-text: #060607;
  --dc-subtext: #4e5058;
  --dc-border: #e3e5e8;
  --dc-hover: rgba(78, 80, 88, 0.08);
  --dc-active: rgba(78, 80, 88, 0.16);
  --dc-primary: #5865f2;
}

#moduloUsuarios { display:flex; flex-direction:column; height:100%; background:var(--dc-bg); font-family: 'Inter', system-ui, -apple-system, sans-serif; }
.gu-header { background:var(--dc-bg); border-bottom:1px solid var(--dc-border); flex-shrink:0; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.gu-tabs { background:var(--dc-bg); border-bottom:1px solid var(--dc-border); flex-shrink:0; padding:0 20px; display:flex; gap:16px; }
.gu-tab { font-size:0.9rem; font-weight:600; padding:12px 4px; border:none; background:transparent; color:var(--dc-subtext); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
.gu-tab:hover { color:var(--dc-text); }
.gu-tab.active { color:var(--dc-primary); border-bottom-color:var(--dc-primary); }
.gu-body { display:flex; flex:1 1 0; min-height:0; overflow:hidden; }

/* ── Lista ────────────────────────────────────────── */
.gu-list { width:320px; flex-shrink:0; border-right:1px solid var(--dc-border); background:var(--dc-bg); overflow-y:auto; display:flex; flex-direction:column; padding: 10px; }
.gu-list-item { display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; transition:background .1s; border-radius: 6px; margin-bottom: 2px; }
.gu-list-item:hover { background:var(--dc-hover); }
.gu-list-item.selected { background:var(--dc-active); }
.gu-role-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.gu-list-info { flex:1; min-width:0; }
.gu-list-name { font-size:0.9rem; font-weight:600; color:var(--dc-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gu-list-sub  { font-size:0.75rem; color:var(--dc-subtext); }
.gu-list-chevron { display:none; }
.gu-add-btn { margin:10px 0; padding:8px 12px; border:none; border-radius:6px; background:transparent; color:var(--dc-subtext); font-size:0.85rem; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; }
.gu-add-btn:hover { background:var(--dc-hover); color:var(--dc-text); }

/* ── Panel derecho (desktop) ──────────────────────── */
.gu-panel { flex:1 1 0; overflow:hidden; display:flex; flex-direction:column; position:relative; background:var(--dc-panel-bg); }
.gu-panel-body { padding:32px 40px 80px; flex:1; overflow-y:auto; }
.gu-panel-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--dc-subtext); text-align:center; padding:40px; gap:16px; }
.gu-panel-empty i { font-size:3.5rem; opacity:.4; }

/* ── Secciones dentro del panel ───────────────────── */
.gu-section-header { font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--dc-subtext); padding:0 0 8px; margin-bottom:16px; }
.gu-field-label { font-size:0.75rem; font-weight:700; color:var(--dc-subtext); text-transform:uppercase; margin-bottom:8px; display:block; }
.dc-input { width:100%; padding:10px 12px; border:none; border-radius:3px; background:#e3e5e8; color:var(--dc-text); font-size:0.95rem; margin-bottom:24px; outline:none; transition:background 0.2s; }
.dc-input:focus { background:#ebebeb; }

.gu-colors { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; align-items:center; margin-bottom: 32px; }
.gu-color-swatch { width:32px; height:32px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .1s,border-color .1s; display:flex; align-items:center; justify-content:center; color:#fff; }
.gu-color-swatch.selected { border-color:var(--dc-primary); transform:scale(1.1); box-shadow: 0 0 0 2px var(--dc-panel-bg) inset; }
.gu-color-swatch:hover { transform:scale(1.1); }
.gu-color-custom { background: var(--dc-bg); color: var(--dc-subtext); border: 1px solid var(--dc-border); }

/* ── Módulo permiso row ───────────────────────────── */
.gu-perm-group { font-size:0.8rem; font-weight:700; text-transform:uppercase; color:var(--dc-subtext); padding:24px 0 12px; }
.gu-perm-row { display:flex; align-items:center; padding:16px 0; border-bottom:1px solid var(--dc-border); gap:16px; }
.gu-perm-row:last-child { border-bottom:none; }
.gu-perm-info { flex:1; }
.gu-perm-name { font-size:0.95rem; font-weight:600; color:var(--dc-text); }
.gu-perm-desc { font-size:0.85rem; color:var(--dc-subtext); margin-top:4px; line-height:1.4; }
.gu-perm-actions { display:flex; gap:16px; align-items:center; flex-shrink:0; }

/* Toggles estilo Discord */
.dc-toggle { display:none; }
.dc-toggle-wrap { display:flex; flex-direction:column; align-items:center; gap:6px; }
.dc-toggle-label { display:inline-block; width:40px; height:24px; border-radius:12px; background:#80848e; cursor:pointer; position:relative; transition:background .15s; flex-shrink:0; }
.dc-toggle:checked + .dc-toggle-label { background:var(--dc-primary); }
.dc-toggle-label::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left .15s; box-shadow:0 1px 3px rgba(0,0,0,.4); }
.dc-toggle:checked + .dc-toggle-label::after { left:19px; }
.dc-toggle-label.danger { background:#80848e; }
.dc-toggle:checked + .dc-toggle-label.danger { background:#da373c; }

/* ── Miembros del rol ─────────────────────────────── */
.gu-member-chip { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--dc-border); }
.gu-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.9rem; font-weight:700; color:#fff; flex-shrink:0; }
.gu-member-name { font-size:0.95rem; font-weight:600; color:var(--dc-text); flex:1; }
.gu-member-cargo { font-size:0.8rem; color:var(--dc-subtext); }

/* ── Actions bar del panel ────────────────────────── */
.gu-panel-actions { display:flex; gap:12px; padding:16px 40px; background:var(--dc-bg); border-top:1px solid var(--dc-border); flex-shrink:0; align-items:center; justify-content:flex-end; }
.btn-gu-danger { background:transparent; border:none; color:#da373c; font-size:0.9rem; font-weight:600; padding:8px 16px; border-radius:3px; cursor:pointer; transition:all .15s; margin-right:auto; }
.btn-gu-danger:hover { text-decoration:underline; }
.btn-gu-save { background:var(--dc-primary); border:none; color:#fff; font-size:0.9rem; font-weight:600; padding:8px 24px; border-radius:3px; cursor:pointer; transition:background .15s; }
.btn-gu-save:hover { background:#4752c4; }

/* ── Mobile ───────────────────────────────────────── */
@media (max-width:767px) {
    .gu-list { width:100%; border-right:none; }
    .gu-panel { display:none; }
    .gu-body { flex-direction:column; }
}
</style>

<div id="moduloUsuarios">
    <!-- Header -->
    <div class="gu-header">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-people-fill" style="font-size:1.1rem;color:var(--dc-primary);"></i>
            <div>
                <div class="fw-bold" style="color:var(--dc-text);font-size:0.88rem;">Gestión de Usuarios</div>
                <div id="gu-subtitle" style="font-size:0.7rem;color:var(--dc-subtext);">Cargando...</div>
            </div>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <div id="top-actions-placeholder"></div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="gu-tabs">
        <button class="gu-tab active" id="gu-tab-roles" onclick="window.guSetTab && window.guSetTab('roles')"><i class="bi bi-shield-fill me-1"></i>Roles <span id="gu-count-roles" class="ms-1 opacity-60"></span></button>
        <button class="gu-tab" id="gu-tab-miembros" onclick="window.guSetTab && window.guSetTab('miembros')"><i class="bi bi-people me-1"></i>Usuarios <span id="gu-count-miembros" class="ms-1 opacity-60"></span></button>
    </div>

    <!-- Body split -->
    <div class="gu-body">
        <!-- Lista izquierda -->
        <div class="gu-list" id="guList">
            <div class="text-center py-5 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Cargando...</div>
        </div>

        <!-- Panel derecho (solo desktop) -->
        <div class="gu-panel" id="guPanel">
            <div class="gu-panel-body">
                <div class="gu-panel-empty" id="guPanelEmpty">
                    <i class="bi bi-shield-lock"></i>
                    <div class="fw-bold" style="font-size:.9rem;">Selecciona un rol o miembro</div>
                    <div style="font-size:.78rem;">Haz clic en la lista para ver y editar sus detalles.</div>
                </div>
                <div id="guPanelContent" style="display:none;"></div>
            </div>
            <div class="gu-panel-actions" id="guPanelActions" style="display:none;"></div>
        </div>
    </div>
</div>
    </div>
</div>
    </div>
</div>


    <!-- FAB Menu Usuarios (Estilo Inventario) -->
    <div id="us-fab-container" style="position:fixed;bottom:24px;right:24px;z-index:1030;display:flex;flex-direction:column;align-items:flex-end;">
      <div id="us-fab-backdrop" onclick="document.getElementById('us-fab-menu').style.display='none'; document.getElementById('us-fab-backdrop').style.display='none'; document.getElementById('us-fab-icon').style.transform='rotate(0deg)';" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);background:rgba(0,0,0,.28);z-index:-1;"></div>
      
      <!-- Menú expandido -->
      <div id="us-fab-menu" style="display:none;flex-direction:column;align-items:flex-end;gap:1rem;margin-bottom:1rem;">
        
        <!-- NUEVO USUARIO -->
        <div style="display:flex;align-items:center;gap:.75rem;">
          <span style="background:#0f172a;color:#fff!important;padding:.45rem .95rem;border-radius:14px;font-size:.7rem;font-weight:800;letter-spacing:.1em;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);-webkit-text-fill-color:#fff;">NUEVO USUARIO</span>
          <button onclick="document.getElementById('us-fab-backdrop').click(); window.guNuevoMiembro && window.guNuevoMiembro()" style="width:56px;height:56px;border-radius:18px;background:#2563eb;border:2px solid #fff;color:#fff!important;font-size:1.3rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(37,99,235,.4);cursor:pointer;transition:transform .15s;">
            <i class="bi bi-person-plus"></i>
          </button>
        </div>

        <!-- NUEVO ROL -->
        <div style="display:flex;align-items:center;gap:.75rem;">
          <span style="background:#0f172a;color:#fff!important;padding:.45rem .95rem;border-radius:14px;font-size:.7rem;font-weight:800;letter-spacing:.1em;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);-webkit-text-fill-color:#fff;">NUEVO ROL</span>
          <button onclick="document.getElementById('us-fab-backdrop').click(); window.guNuevoRol && window.guNuevoRol()" style="width:56px;height:56px;border-radius:18px;background:#10b981;border:2px solid #fff;color:#fff!important;font-size:1.3rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(16,185,129,.4);cursor:pointer;transition:transform .15s;">
            <i class="bi bi-shield-plus"></i>
          </button>
        </div>

      </div>

      <!-- Botón principal (cuadrado redondeado) -->
      <button id="us-fab-btn" onclick="const m = document.getElementById('us-fab-menu'); const b = document.getElementById('us-fab-backdrop'); const i = document.getElementById('us-fab-icon'); if(m.style.display==='none'){ m.style.display='flex'; b.style.display='block'; i.style.transform='rotate(45deg)'; } else { m.style.display='none'; b.style.display='none'; i.style.transform='rotate(0deg)'; }" style="width:60px;height:60px;border-radius:18px;background:#f97316;border:none;color:#fff;font-size:1.5rem;box-shadow:0 6px 24px rgba(249,115,22,.5);display:flex;align-items:center;justify-content:center;transition:transform .25s cubic-bezier(.4,0,.2,1),background .2s;margin-top:.5rem;flex-shrink:0;">
        <i class="bi bi-plus-lg" id="us-fab-icon" style="transition:transform .25s;"></i>
      </button>
    </div>
    <style>
      @media (min-width: 769px) {
         #us-fab-container { display: none !important; }
      }
      @media (max-width: 768px) {
         #us-fab-container { bottom: 90px !important; }
         .top-btn-reg { display: none !important; }
      }
    </style>


<!-- Offcanvas para móvil y paneles -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasGU" style="width:min(460px,100vw); background:var(--dc-bg); border:none; margin:16px; height:calc(100% - 32px); border-radius:8px; box-shadow:-4px 0 30px rgba(0,0,0,0.15); z-index:1045;">
