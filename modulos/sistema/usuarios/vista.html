<!-- Módulo Gestión de Usuarios v2 — Discord-style -->
<style>
/* ── Layout principal ─────────────────────────────── */
#moduloUsuarios { display:flex; flex-direction:column; height:100%; background:var(--bg); }
.gu-header { background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; padding:10px 16px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.gu-tabs { background:var(--surface); border-bottom:2px solid var(--border); flex-shrink:0; padding:0 16px; display:flex; gap:0; }
.gu-tab { font-size:0.82rem; font-weight:600; padding:10px 16px; border:none; background:transparent; color:var(--subtext); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; letter-spacing:.3px; }
.gu-tab:hover { color:var(--text); }
.gu-tab.active { color:var(--crm-accent); border-bottom-color:var(--crm-accent); }
.gu-body { display:flex; flex:1 1 0; min-height:0; overflow:hidden; }

/* ── Lista ────────────────────────────────────────── */
.gu-list { width:280px; flex-shrink:0; border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
.gu-list-item { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; transition:background .1s; border-bottom:1px solid var(--border); position:relative; }
.gu-list-item:hover { background:var(--border); }
.gu-list-item.selected { background:color-mix(in srgb, var(--crm-accent) 12%, transparent); }
.gu-role-dot { width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700; color:#fff; }
.gu-list-info { flex:1; min-width:0; }
.gu-list-name { font-size:0.85rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gu-list-sub  { font-size:0.7rem; color:var(--subtext); }
.gu-list-chevron { color:var(--subtext); font-size:0.8rem; }
.gu-add-btn { margin:10px 12px; padding:8px 12px; border:2px dashed var(--border); border-radius:10px; background:transparent; color:var(--subtext); font-size:0.8rem; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; }
.gu-add-btn:hover { border-color:var(--crm-accent); color:var(--crm-accent); }

/* ── Panel derecho (desktop) ──────────────────────── */
.gu-panel { flex:1 1 0; overflow:hidden; display:flex; flex-direction:column; position:relative; }
.gu-panel-body { padding:20px 24px 80px; flex:1; overflow-y:auto; }
.gu-panel-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--subtext); text-align:center; padding:40px; gap:12px; }
.gu-panel-empty i { font-size:2.5rem; opacity:.25; }

/* ── Secciones dentro del panel ───────────────────── */
.gu-section-header { font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:1.2px; color:var(--subtext); padding:18px 0 8px; border-bottom:1px solid var(--border); margin-bottom:0; }
.gu-field-label { font-size:0.75rem; font-weight:700; color:var(--subtext); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; margin-top:14px; }
.gu-colors { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; align-items:center; }
.gu-color-swatch { width:26px; height:26px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:transform .1s,border-color .1s; }
.gu-color-swatch.selected, .gu-color-swatch:hover { border-color:var(--text); transform:scale(1.15); }
.gu-hex-input { font-size:0.78rem; width:90px; padding:3px 8px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); }

/* ── Módulo permiso row ───────────────────────────── */
.gu-perm-group { font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--subtext); padding:16px 0 4px; }
.gu-perm-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); gap:10px; }
.gu-perm-row:last-child { border-bottom:none; }
.gu-perm-info { flex:1; }
.gu-perm-name { font-size:0.85rem; font-weight:600; color:var(--text); }
.gu-perm-desc { font-size:0.72rem; color:var(--subtext); margin-top:1px; }
.gu-perm-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.gu-perm-label { font-size:0.65rem; font-weight:600; color:var(--subtext); text-align:center; min-width:28px; }
/* Toggles estilo Discord */
.dc-toggle { display:none; }
.dc-toggle-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; }
.dc-toggle-label { display:inline-block; width:36px; height:20px; border-radius:10px; background:#4f545c; cursor:pointer; position:relative; transition:background .15s; flex-shrink:0; }
.dc-toggle:checked + .dc-toggle-label { background:#5865F2; }
.dc-toggle-label::after { content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:#fff; top:2px; left:2px; transition:left .15s; box-shadow:0 1px 3px rgba(0,0,0,.4); }
.dc-toggle:checked + .dc-toggle-label::after { left:18px; }
.dc-toggle-label.readonly { cursor:not-allowed; opacity:.55; }
/* Toggle de admin (danger) */
.dc-toggle:checked + .dc-toggle-label.danger { background:#ED4245; }

/* ── Miembros del rol ─────────────────────────────── */
.gu-member-chip { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
.gu-member-chip:last-child { border-bottom:none; }
.gu-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; color:#fff; flex-shrink:0; }
.gu-member-name { font-size:0.82rem; font-weight:600; color:var(--text); flex:1; }
.gu-member-cargo { font-size:0.7rem; color:var(--subtext); }
.gu-badge-rol { font-size:0.63rem; padding:2px 8px; border-radius:10px; font-weight:700; white-space:nowrap; }

/* ── Actions bar del panel ────────────────────────── */
.gu-panel-actions { display:flex; gap:8px; padding:16px 24px; border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.btn-gu-danger { background:transparent; border:1px solid #ef4444; color:#ef4444; font-size:0.8rem; font-weight:600; padding:6px 14px; border-radius:8px; cursor:pointer; transition:all .15s; }
.btn-gu-danger:hover { background:#ef4444; color:#fff; }
.btn-gu-save { background:var(--crm-accent); border:none; color:#fff; font-size:0.8rem; font-weight:700; padding:6px 18px; border-radius:8px; cursor:pointer; transition:opacity .15s; margin-left:auto; }
.btn-gu-save:hover { opacity:.88; }

/* ── Mobile ───────────────────────────────────────── */
@media (max-width:767px) {
    .gu-list { width:100%; border-right:none; }
    .gu-panel { display:none; }
    .gu-body { flex-direction:column; }
}
</style>

<div id="moduloUsuarios">
    <!-- Header -->
    <div class="gu-header">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-people-fill" style="font-size:1.1rem;color:var(--crm-accent);"></i>
            <div>
                <div class="fw-bold" style="color:var(--text);font-size:0.88rem;">Gestión de Usuarios</div>
                <div id="gu-subtitle" style="font-size:0.7rem;color:var(--subtext);">Cargando...</div>
            </div>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <div id="top-actions-placeholder"></div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="gu-tabs">
        <button class="gu-tab active" id="gu-tab-roles" onclick="window.guSetTab && window.guSetTab('roles')"><i class="bi bi-shield-fill me-1"></i>Roles <span id="gu-count-roles" class="ms-1 opacity-60"></span></button>
        <button class="gu-tab" id="gu-tab-miembros" onclick="window.guSetTab && window.guSetTab('miembros')"><i class="bi bi-people me-1"></i>Miembros <span id="gu-count-miembros" class="ms-1 opacity-60"></span></button>
        <button class="gu-tab" id="gu-tab-simulador" onclick="window.guSetTab && window.guSetTab('simulador')"><i class="bi bi-magic me-1"></i>Simulador Efectivo</button>
    </div>

    <!-- Body split -->
    <div class="gu-body">
        <!-- Lista izquierda -->
        <div class="gu-list" id="guList">
            <div class="text-center py-5 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Cargando...</div>
        </div>

        <!-- Panel derecho (solo desktop) -->
        <div class="gu-panel" id="guPanel">
            <div class="gu-panel-body">
                <div class="gu-panel-empty" id="guPanelEmpty">
                    <i class="bi bi-shield-lock"></i>
                    <div class="fw-bold" style="font-size:.9rem;">Selecciona un rol o miembro</div>
                    <div style="font-size:.78rem;">Haz clic en la lista para ver y editar sus detalles.</div>
                </div>
                <div id="guPanelContent" style="display:none;"></div>
            </div>
            <div class="gu-panel-actions" id="guPanelActions" style="display:none;"></div>
        </div>
    </div>
</div>
    </div>
</div>
    </div>
</div>


    <!-- FAB Menu Usuarios (Estilo Inventario) -->
    <div id="us-fab-container" style="position:fixed;bottom:24px;right:24px;z-index:1030;display:flex;flex-direction:column;align-items:flex-end;">
      <div id="us-fab-backdrop" onclick="document.getElementById('us-fab-menu').style.display='none'; document.getElementById('us-fab-backdrop').style.display='none'; document.getElementById('us-fab-icon').style.transform='rotate(0deg)';" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);background:rgba(0,0,0,.28);z-index:-1;"></div>
      
      <!-- Menú expandido -->
      <div id="us-fab-menu" style="display:none;flex-direction:column;align-items:flex-end;gap:1rem;margin-bottom:1rem;">
        
        <!-- NUEVO USUARIO -->
        <div style="display:flex;align-items:center;gap:.75rem;">
          <span style="background:#0f172a;color:#fff!important;padding:.45rem .95rem;border-radius:14px;font-size:.7rem;font-weight:800;letter-spacing:.1em;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);-webkit-text-fill-color:#fff;">NUEVO USUARIO</span>
          <button onclick="document.getElementById('us-fab-backdrop').click(); window.guNuevoMiembro && window.guNuevoMiembro()" style="width:56px;height:56px;border-radius:18px;background:#2563eb;border:2px solid #fff;color:#fff!important;font-size:1.3rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(37,99,235,.4);cursor:pointer;transition:transform .15s;">
            <i class="bi bi-person-plus"></i>
          </button>
        </div>

        <!-- NUEVO ROL -->
        <div style="display:flex;align-items:center;gap:.75rem;">
          <span style="background:#0f172a;color:#fff!important;padding:.45rem .95rem;border-radius:14px;font-size:.7rem;font-weight:800;letter-spacing:.1em;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);-webkit-text-fill-color:#fff;">NUEVO ROL</span>
          <button onclick="document.getElementById('us-fab-backdrop').click(); window.guNuevoRol && window.guNuevoRol()" style="width:56px;height:56px;border-radius:18px;background:#10b981;border:2px solid #fff;color:#fff!important;font-size:1.3rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(16,185,129,.4);cursor:pointer;transition:transform .15s;">
            <i class="bi bi-shield-plus"></i>
          </button>
        </div>

      </div>

      <!-- Botón principal (cuadrado redondeado) -->
      <button id="us-fab-btn" onclick="const m = document.getElementById('us-fab-menu'); const b = document.getElementById('us-fab-backdrop'); const i = document.getElementById('us-fab-icon'); if(m.style.display==='none'){ m.style.display='flex'; b.style.display='block'; i.style.transform='rotate(45deg)'; } else { m.style.display='none'; b.style.display='none'; i.style.transform='rotate(0deg)'; }" style="width:60px;height:60px;border-radius:18px;background:#f97316;border:none;color:#fff;font-size:1.5rem;box-shadow:0 6px 24px rgba(249,115,22,.5);display:flex;align-items:center;justify-content:center;transition:transform .25s cubic-bezier(.4,0,.2,1),background .2s;margin-top:.5rem;flex-shrink:0;">
        <i class="bi bi-plus-lg" id="us-fab-icon" style="transition:transform .25s;"></i>
      </button>
    </div>
    <style>
      @media (min-width: 769px) {
         #us-fab-container { display: none !important; }
      }
      @media (max-width: 768px) {
         #us-fab-container { bottom: 90px !important; }
         .top-btn-reg { display: none !important; }
      }
    </style>


<!-- Offcanvas para móvil y paneles -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasGU" style="width:min(460px,100vw); background:var(--bg); border:none; margin:16px; height:calc(100% - 32px); border-radius:24px; box-shadow:-4px 0 30px rgba(0,0,0,0.15); z-index:1045;">
    <div class="offcanvas-header" style="background:var(--surface);border-bottom:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px 24px;">
        <h6 class="offcanvas-title fw-bold" id="offcanvasGUTitle" style="color:var(--text);font-size:1.1rem;letter-spacing:0.3px;">Detalle</h6>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" style="opacity:0.6;transition:all 0.2s;"></button>
    </div>
    <div class="offcanvas-body p-0" style="overflow-y:auto;position:relative;">
        <div id="guOffcanvasContent" style="padding:24px 24px 80px;"></div>
        <div id="guOffcanvasActions" style="display:none;position:sticky;bottom:0;background:var(--surface);padding:16px 24px;border-top:1px solid var(--border);border-radius:0 0 24px 24px;justify-content:flex-end;gap:12px;z-index:10;box-shadow:0 -4px 10px rgba(0,0,0,0.02);"></div>
    </div>
</div>
