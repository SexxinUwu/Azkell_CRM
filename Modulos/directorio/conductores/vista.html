<!-- Módulo Conductores - Aislado en SPA -->

<div id="moduloConductores" class="modulo-wrapper d-flex flex-column h-100 flex-grow-1">
    <div class="controls-row d-flex justify-content-between flex-wrap gap-2 mb-3">
        <div class="input-group input-group-sm" style="max-width: 300px;">
            <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-search text-secondary"></i></span>
            <input type="text" class="form-control border-start-0 ps-0" id="buscadorConductores" onkeyup="filtrarTabla('cuerpoTablaConductores', 'buscadorConductores')" placeholder="Buscar por Nombre, DNI...">
        </div>
        <div class="d-flex align-items-center gap-2">
            <span id="cache-badge-conductores" class="cache-badge"><i class="bi bi-database"></i> <span id="cache-label-conductores">Sin cargar</span></span>
            <button class="btn-reload-cache" onclick="recargarModulo('conductores')" title="Actualizar"><i class="bi bi-arrow-clockwise"></i></button>
            <button class="btn btn-outline-secondary fw-bold btn-sm" onclick="toggleAllCondGroups()"><i class="bi bi-arrows-expand"></i> Expandir</button>
            <button class="btn btn-outline-success fw-bold btn-sm" onclick="descargarExcelDinamico('tablaConductores', 'Directorio_Conductores')"><i class="bi bi-file-earmark-excel"></i> Excel</button>
            <button class="btn btn-primary fw-bold text-white btn-sm" onclick="abrirModalConductor()" data-perm-crear="flota"><i class="bi bi-person-plus-fill"></i> Nuevo Conductor</button>
        </div>
    </div>
    <div class="card p-0"><div class="table-container"><table class="table table-custom m-0" id="tablaConductores">
        <thead>
            <tr>
                <th>Nombre del Conductor</th>
                <th class="d-none">Empresa</th>
                <th class="d-none">Licencia</th>
                <th>Contacto (Tel / WSP)</th>
                <th class="d-none">Estado</th>
                <th><i class="bi bi-three-dots-vertical"></i></th>
            </tr>
        </thead>
        <tbody id="cuerpoTablaConductores"><tr><td colspan="6" class="text-center py-5">Cargando Conductores...</td></tr></tbody>
    </table></div></div>
</div>

<!-- Modal Nuevo/Editar Conductor -->
<div class="modal fade" id="modalConductor" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-dark text-white"><h5 class="modal-title fw-bold" id="tituloModalConductor"><i class="bi bi-person-badge"></i> Ficha de Conductor</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
<form id="formConductor" onsubmit="guardarConductor(event, this)">
    <input type="hidden" name="idConductor" id="c_id">
    <input type="hidden" name="c_foto_base64" id="c_foto_base64">
    <div class="modal-body">
        <div class="text-center mb-3">
            <img id="c_foto_preview" src="https://via.placeholder.com/120" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px solid #cbd5e1; cursor: pointer;" onclick="document.getElementById('c_foto_input').click()" title="Toca para cambiar foto">
            <input type="file" id="c_foto_input" accept="image/*" style="display: none;" onchange="previsualizarFotoConductor(this)">
            <div class="small text-muted mt-1">Toca la imagen para subir foto</div>
        </div>
        <div class="mb-3"><label class="fw-bold text-primary">Nombre Completo</label><input type="text" class="form-control fw-bold" name="c_nombre" id="c_nombre" required></div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="fw-bold">Empresa</label><input type="text" class="form-control text-uppercase" name="c_empresa" id="c_empresa" list="dl-clientes" placeholder="Ej: ROSYMAR PERU SAC"></div>
            <div class="col-md-6 mb-3"><label class="fw-bold">Teléfono</label><input type="text" class="form-control" name="c_telefono" id="c_telefono"></div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="fw-bold">DNI</label><input type="text" class="form-control" name="c_dni" id="c_dni"></div>
            <div class="col-md-6 mb-3"><label class="fw-bold">Licencia</label><input type="text" class="form-control text-uppercase" name="c_licencia" id="c_licencia"></div>
        </div>
        <div class="mb-3"><label class="fw-bold">Estado</label><select class="form-select" name="c_estado" id="c_estado"><option value="Activo">Activo</option><option value="Cesado">Cesado</option><option value="Bloqueado">Bloqueado</option></select></div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-warning fw-bold text-dark" id="btnEditarConductor" onclick="activarEdicionConductor()"><i class="bi bi-pencil-square"></i> Editar</button>
        <button type="submit" class="btn btn-primary" id="btnGuardarConductor"><i class="bi bi-save"></i> Guardar Conductor</button>
    </div>
</form></div></div></div>
