<!-- Módulo Almacén / Inventario - Aislado en SPA -->

<div id="moduloAlmacen" class="modulo-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <div>
            <h2 class="h4 fw-bold mb-0" style="color: var(--text);"><i class="bi bi-box-seam text-warning"></i> Gestión de Inventario</h2>
            <p class="text-muted small mb-0">Control de repuestos y almacén generales</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-success shadow-sm" onclick="exportarAlmacenExcel()" title="Exportar a Excel">
                <i class="bi bi-file-earmark-excel"></i> <span class="d-none d-md-inline">Exportar</span>
            </button>
            <button class="btn btn-primary shadow-sm" onclick="abrirModalNuevoRepuesto()" title="Nuevo Repuesto">
                <i class="bi bi-plus-lg"></i> <span class="d-none d-md-inline">Nuevo Repuesto</span>
            </button>
        </div>
    </div>

    <div class="mb-4 d-flex gap-2 align-items-center p-3 rounded shadow-sm border" style="background-color: var(--surface);">
        <div class="input-group input-group-sm w-50">
            <span class="input-group-text border-0 bg-transparent text-muted"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control border-0 bg-transparent shadow-none" id="busquedaAlmacen" placeholder="Buscar repuesto, código, proveedor..." oninput="filtrarTablaAlmacen()">
        </div>
        <div class="d-flex gap-2 flex-wrap" id="box-filtros-almacen"></div>
    </div>

    <div class="card p-0 shadow-sm">
        <div class="table-container">
            <table class="table table-custom m-0" id="tablaAlmacen">
                <thead>
                    <tr>
                        <th onclick="sortTableAlmacen(0)">Código <i class="bi bi-arrow-down-up ms-1 text-muted"></i></th>
                        <th onclick="sortTableAlmacen(1)">Descripción <i class="bi bi-arrow-down-up ms-1 text-muted"></i></th>
                        <th onclick="sortTableAlmacen(2)">Stock Actual <i class="bi bi-arrow-down-up ms-1 text-muted"></i></th>
                        <th onclick="sortTableAlmacen(3)">Stock Mín <i class="bi bi-arrow-down-up ms-1 text-muted"></i></th>
                        <th onclick="sortTableAlmacen(4)">Precio Unit. <i class="bi bi-arrow-down-up ms-1 text-muted"></i></th>
                        <th onclick="sortTableAlmacen(5)">Proveedor <i class="bi bi-arrow-down-up ms-1 text-muted"></i></th>
                        <th class="text-center"><i class="bi bi-three-dots-vertical"></i></th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaAlmacen">
                    <tr><td colspan="7" class="text-center py-5 text-muted">Cargando inventario...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Nuevo/Editar Repuesto -->
<div class="modal fade" id="modalNuevoRepuesto" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title fw-bold" id="tituloModalRepuesto"><i class="bi bi-box-fill"></i> Nuevo Repuesto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="formNuevoRepuesto" onsubmit="guardarRepuesto(event, this)">
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="fw-bold text-primary"><i class="bi bi-code"></i> Código</label>
                            <input type="text" class="form-control" id="a_codigo" name="a_codigo" placeholder="REP-001" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="fw-bold text-primary"><i class="bi bi-file-earmark-text"></i> Descripción</label>
                            <input type="text" class="form-control" id="a_descripcion" name="a_descripcion" placeholder="Descripción del repuesto" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="fw-bold text-primary"><i class="bi bi-box-seam"></i> Stock Actual</label>
                            <input type="number" class="form-control" id="a_stock" name="a_stock" placeholder="0" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="fw-bold text-primary"><i class="bi bi-exclamation-circle"></i> Stock Mínimo</label>
                            <input type="number" class="form-control" id="a_stock_min" name="a_stock_min" placeholder="5" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="fw-bold text-primary"><i class="bi bi-cash-coin"></i> Precio Unitario</label>
                            <input type="number" class="form-control" id="a_precio" name="a_precio" placeholder="0.00" step="0.01" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="fw-bold text-secondary"><i class="bi bi-person-workspace"></i> Proveedor</label>
                            <input type="text" class="form-control" id="a_proveedor" name="a_proveedor" placeholder="Nombre del Proveedor">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="fw-bold text-secondary"><i class="bi bi-tag"></i> Categoría</label>
                            <input type="text" class="form-control" id="a_categoria" name="a_categoria" placeholder="Categoría">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnGuardarRepuesto"><i class="bi bi-save"></i> Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Registrar Movimiento (Entrada/Salida) -->
<div class="modal fade" id="modalMovimientoAlmacen" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background-color: var(--crm-accent); color: white;">
                <h5 class="modal-title fw-bold"><i class="bi bi-arrow-left-right"></i> Registrar Movimiento</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="formMovimientoAlmacen" onsubmit="guardarMovimiento(event, this)">
                <input type="hidden" id="mov_codigo_repuesto">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="fw-bold">Tipo de Movimiento</label>
                        <select class="form-select" id="mov_tipo" name="mov_tipo" required>
                            <option value="">Selecciona...</option>
                            <option value="Entrada">Entrada (+)</option>
                            <option value="Salida">Salida (-)</option>
                            <option value="Ajuste">Ajuste</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold">Cantidad</label>
                        <input type="number" class="form-control" id="mov_cantidad" name="mov_cantidad" placeholder="0" required>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold">Motivo / Referencia</label>
                        <input type="text" class="form-control" id="mov_referencia" name="mov_referencia" placeholder="Ej: Factura, OT, Ajuste">
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold">Observaciones</label>
                        <textarea class="form-control" id="mov_observaciones" name="mov_observaciones" rows="2" placeholder="Detalles adicionales..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Registrar Movimiento</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Offcanvas Kardex / Histórico -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasKardexAlmacen">
    <div class="offcanvas-header bg-dark text-white">
        <h5 class="offcanvas-title fw-bold" id="tituloOffcanvasKardex"><i class="bi bi-clock-history"></i> Kardex</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
        <div class="table-container">
            <table class="table table-sm m-0" id="tablaKardex">
                <thead class="table-light">
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Cantidad</th>
                        <th>Referencia</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaKardex">
                    <tr><td colspan="4" class="text-center py-4 text-muted">Cargando histórico...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
